version: "3.9"

services:
  # ── ARBITER Core ─────────────────────────────────────
  arbiter:
    build: .
    container_name: arbiter-core
    env_file: .env
    ports:
      - "8080:8080"        # API + WebSocket for dashboard
    depends_on:
      - redis
      - postgres
    volumes:
      - ./keys:/app/keys:ro  # RSA keys for Kalshi
      - ./logs:/app/logs
    restart: unless-stopped
    command: python -m arbiter --log-level INFO

  # ── Redis (sub-second price cache) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: arbiter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # ── Postgres (trade logging + audit) ─────────────────
  postgres:
    image: postgres:16-alpine
    container_name: arbiter-postgres
    environment:
      POSTGRES_DB: arbiter
      POSTGRES_USER: arbiter
      POSTGRES_PASSWORD: arbiter_secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
