<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arbiter Ops Console</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#09090B;color:#FAFAFA;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#18181B;border:1px solid #27272A;border-radius:16px;padding:48px;max-width:440px;width:100%;text-align:center}
h1{font-size:28px;margin-bottom:8px;letter-spacing:-0.5px}
p{color:#A1A1AA;margin-bottom:24px;font-size:14px;line-height:1.5}
.status{display:inline-flex;align-items:center;gap:6px;background:#052e16;color:#4ade80;padding:4px 12px;border-radius:20px;font-size:13px;margin-bottom:20px}
.dot{width:8px;height:8px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
a.btn{display:block;background:#6366F1;color:#fff;text-decoration:none;padding:14px 24px;border-radius:10px;font-weight:600;font-size:15px;margin-top:16px;transition:background .2s}
a.btn:hover{background:#4F46E5}
.info{margin-top:20px;font-size:12px;color:#52525B}
input{width:100%;padding:12px 14px;background:#27272A;border:1px solid #3F3F46;border-radius:8px;color:#fff;font-size:14px;margin-bottom:12px;outline:none}
input:focus{border-color:#6366F1}
label{display:block;text-align:left;font-size:13px;color:#A1A1AA;margin-bottom:4px}
#error{color:#ef4444;font-size:13px;display:none;margin-bottom:12px}
#apiSection,#loginSection{display:none}
</style>
</head>
<body>
<div class="card">
<h1>Arbiter</h1>
<div class="status"><span class="dot"></span>Live Trading System</div>
<p>Prediction market arbitrage engine scanning 1,040+ confirmed pairs across Kalshi and Polymarket.</p>

<div id="connectSection">
<label>API Tunnel URL</label>
<input id="apiUrl" type="url" placeholder="https://xxx.trycloudflare.com" value="">
<p style="font-size:12px;margin-bottom:12px">Enter the Cloudflare tunnel URL from your Mac</p>
<a class="btn" href="#" onclick="connectApi();return false">Connect</a>
<div class="info">Current tunnel: <span id="currentTunnel">checking...</span></div>
</div>

<div id="loginSection">
<label>Email</label>
<input id="email" type="email" placeholder="operator@arbiter">
<label>Password</label>
<input id="password" type="password" placeholder="Password">
<div id="error">Invalid credentials</div>
<a class="btn" href="#" onclick="doLogin();return false">Sign In</a>
</div>

<div id="apiSection">
<a class="btn" id="dashLink" href="#">Open Dashboard</a>
<div class="info" id="healthInfo"></div>
</div>
</div>

<script>
const KNOWN_URL='https://championships-nvidia-revised-salon.trycloudflare.com';
const saved=localStorage.getItem('arbiter_api');
if(saved)document.getElementById('apiUrl').value=saved;
else document.getElementById('apiUrl').value=KNOWN_URL;
document.getElementById('currentTunnel').textContent=KNOWN_URL;

async function connectApi(){
  const url=document.getElementById('apiUrl').value.replace(/\/$/,'');
  try{
    const r=await fetch(url+'/health');
    const d=await r.json();
    if(d.status==='ok'){
      localStorage.setItem('arbiter_api',url);
      document.getElementById('dashLink').href=url;
      document.getElementById('healthInfo').innerHTML='Status: '+d.status+' | Mode: '+d.mode+' | Uptime: '+Math.round(d.uptime_seconds/60)+'m';
      document.getElementById('connectSection').style.display='none';
      document.getElementById('apiSection').style.display='block';
    }
  }catch(e){
    alert('Could not connect to '+url+'. Make sure the tunnel is running.');
  }
}

function doLogin(){
  const e=document.getElementById('email').value;
  const p=document.getElementById('password').value;
  if(e==='sparx.sandeep@gmail.com'&&p==='saibaba'){
    document.getElementById('loginSection').style.display='none';
    connectApi();
  }else{
    document.getElementById('error').style.display='block';
  }
}

// Auto-connect on load
connectApi();
</script>
</body>
</html>
