# Logrotate configuration for Arbiter file logs.
#
# Install:
#   sudo cp deploy/logrotate/arbiter.conf /etc/logrotate.d/arbiter
#   sudo logrotate -d /etc/logrotate.d/arbiter   # dry-run
#
# The arbiter logs structured JSON to stdout (captured by journald / docker);
# this config covers any file handler writing into /opt/arbiter/logs/ (e.g.
# TradeLogger or local dev sessions).

/opt/arbiter/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    create 0640 arbiter arbiter
    su arbiter arbiter
    postrotate
        # Signal arbiter.main to reopen handles if it ever uses file logging
        # (no-op today; harmless stub for future use).
        systemctl kill -s HUP arbiter.service 2>/dev/null || true
    endscript
}

/opt/arbiter/evidence/*/*.jsonl {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
