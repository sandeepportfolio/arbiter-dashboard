name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Compile package
        run: python -m compileall arbiter
      - name: Run Python audit tests
        run: python -m pytest -q arbiter
      - name: Smoke test API
        run: |
          python -m arbiter.main --api-only --port 8093 >/tmp/arbiter-api.log 2>&1 &
          ARBITER_PID=$!
          trap "kill $ARBITER_PID" EXIT
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8093/api/health >/dev/null && curl -sf http://127.0.0.1:8093/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/arbiter-api.log
          exit 1

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Run Vitest
        run: npm test
