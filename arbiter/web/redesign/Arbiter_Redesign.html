<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arbiter — Operator desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #FAFAF9; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes cliBlink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.25); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(127,127,127,0.4); }
  button { font-family: inherit; }
  input { font-family: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="theme.js"></script>
<script src="mock-data.js"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="ui-primitives.jsx"></script>
<script type="text/babel" src="page-overview.jsx"></script>
<script type="text/babel" src="page-opportunities.jsx"></script>
<script type="text/babel" src="pages-rest.jsx"></script>
<script type="text/babel" src="modals.jsx"></script>
<script type="text/babel" src="actions.jsx"></script>
<script type="text/babel" src="agent-validate.jsx"></script>
<script type="text/babel" src="mobile.jsx"></script>
<script type="text/babel" src="login.jsx"></script>
<script type="text/babel" src="tweaks.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
  const { useState, useEffect } = React;

  function PageRouter() {
    const { page, t } = window.useApp();
    const map = {
      overview: window.PageOverview,
      opportunities: window.PageOpportunities,
      trades: window.PageTrades,
      pnl: window.PagePnL,
      markets: window.PageMarkets,
      mappings: window.PageMappings,
      scanner: window.PageScanner,
      audit: window.PageAudit,
      deposits: window.PageDeposits,
      settings: window.PageSettings,
    };
    const titles = {
      overview: ['Overview', 'Operator desk · Live'],
      opportunities: ['Opportunities', 'Live scan · 14 tradable'],
      trades: ['Trades', 'Execution ledger · 87 trades'],
      pnl: ['P&L', 'Performance · since inception'],
      markets: ['Markets', 'Mapped universe · 312 markets'],
      mappings: ['Mappings', 'Cross-platform · 28 pending review'],
      scanner: ['Scanner', 'Real-time · 18,420 scans'],
      audit: ['Audit & Readiness', 'System integrity · 7/7 gates'],
      deposits: ['Funds', 'Capital · 2 platforms connected'],
      settings: ['Settings', 'Configuration · operator: Sam'],
    };
    const Page = map[page] || window.PageOverview;
    const [title, sub] = titles[page] || titles.overview;
    return (
      <div style={{ display:'flex', height:'100%', background: t.bg, overflow:'hidden' }}>
        <window.Sidebar/>
        <div style={{ flex: 1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          <window.TopBar title={title} sub={sub}/>
          <div style={{ flex: 1, overflow:'auto' }}>
            <Page/>
          </div>
        </div>
      </div>
    );
  }

  function DesktopApp() {
    return (
      <window.AppProvider>
        <DesktopShell/>
      </window.AppProvider>
    );
  }

  function DesktopShell() {
    const { t } = window.useApp();
    return (
      <div style={{ width: '100%', height: '100%', background: t.bg, color: t.text, fontFamily: window.FONTS.sans, position:'relative' }}>
        <PageRouter/>
        <window.OppDrawer/>
        <window.Modal/>
        <window.ExtraModal/>
        <window.AgentValidateModal/>
        <window.RefetchMappingsModal/>
        <window.CommandPalette/>
        <window.AlertsInbox/>
        <window.UserMenu/>
        <window.ConfirmDialog/>
        <window.ToastHost/>
        <window.TweaksHook/>
      </div>
    );
  }

  function MobileApp() {
    return (
      <window.AppProvider>
        <window.MobileDashboard/>
        <window.Modal/>
        <window.ExtraModal/>
        <window.AgentValidateModal/>
        <window.RefetchMappingsModal/>
        <window.ToastHost/>
      </window.AppProvider>
    );
  }

  function LoginApp() {
    const [signed, setSigned] = useState(false);
    return (
      <window.AppProvider>
        <window.LoginScreen onSignIn={() => setSigned(true)}/>
      </window.AppProvider>
    );
  }

  // Top-level: design canvas with three artboards: Login, Desktop, Mobile.
  function App() {
    const DC = window.DesignCanvas;
    const Section = window.DCSection;
    const Artboard = window.DCArtboard;
    const IOSFrame = window.IOSFrame;

    return (
      <DC initialZoom={0.55} title="Arbiter — Operator desk">
        <Section id="desktop" title="Desktop · Operator workstation">
          <Artboard id="desktop-app" label="Operator desk — full app (10 pages, drawer, modals, ⌘K, alerts)" width={1440} height={900}>
            <DesktopApp/>
          </Artboard>
        </Section>

        <Section id="mobile" title="Mobile · Companion">
          <Artboard id="mobile-app" label="Mobile companion — home, opportunities, trades, account" width={390} height={844}>
            <IOSFrame width={390} height={844}>
              <MobileApp/>
            </IOSFrame>
          </Artboard>
        </Section>

        <Section id="auth" title="Authentication · Sign in">
          <Artboard id="login" label="Sign in — system status + connect" width={1440} height={900}>
            <LoginApp/>
          </Artboard>
        </Section>
      </DC>
    );
  }

  function mount() {
    if (!window.IOSFrame && window.IOSDevice) { window.IOSFrame = window.IOSDevice; }
    if (!window.DesignCanvas || !window.PageOverview || !window.PageOpportunities || !window.MOCK || !window.AreaChart || !window.AppProvider || !window.MobileDashboard || !window.LoginScreen || !window.Modal || !window.ExtraModal || !window.ToastHost || !window.UserMenu || !window.ConfirmDialog || !window.AgentValidateModal || !window.RefetchMappingsModal || !window.IOSFrame) {
      return setTimeout(mount, 50);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  }
  mount();
</script>
</body>
</html>
