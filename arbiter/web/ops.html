function ModeToggle({ mode, setMode }) {
  const { t, toast } = window.useApp();
  const cfg = mode === 'live' ? [t.green, t.greenSoft, 'Live'] : mode === 'standby' ? [t.amber, t.amberSoft, 'Standby'] : [t.red, t.redSoft, 'Killed'];
  const onClick = async () => {
    const next = mode === 'live' ? 'standby' : mode === 'standby' ? 'killed' : 'live';
    // 'killed' arms the safety supervisor; transitioning AWAY from killed
    // resets it. 'standby' is local-only (auto-exec gate); the backend has
    // no standby state, so we only POST when crossing the killed boundary.
    if (next === 'killed' && window.__arbiterKillSwitch) {
      const reason = (window.prompt('Reason for arming kill switch?') || '').trim();
      if (!reason) return;
      const res = await window.__arbiterKillSwitch(true, { reason });
      if (!res.ok) { toast('Kill switch failed: ' + (res.error || 'unknown'), { tone: 'error' }); return; }
    } else if (mode === 'killed' && next !== 'killed' && window.__arbiterKillSwitch) {
      const res = await window.__arbiterKillSwitch(false, { note: 'operator reset from dashboard' });
      if (!res.ok) { toast('Kill switch reset failed: ' + (res.error || 'unknown'), { tone: 'error' }); return; }
    }
    setMode(next);
    if (window.__arbiterTick) window.__arbiterTick();
  };
  return (
    <button onClick={onClick} style={{ padding: '6px 10px', background: cfg[1], border: `1px solid ${cfg[0]}40`, borderRadius: 8, fontSize: 11.5, color: cfg[0], fontWeight: 600, cursor:'pointer', textTransform:'uppercase', letterSpacing:'0.06em' }}>
      {cfg[2]}

  );
}

            <Mini label="Tradable" value={scanTradable.toLocaleString()} mono tone={scanTradable ? 'green' : undefined}/>
            <Mini label="Manual" value={scanManual.toLocaleString()} mono/>
          </div>
          <div style={{ padding: '0 18px 10px', display:'grid', gridTemplateColumns: 'repeat(3, minmax(0, 1fr))', gap: 10 }}>
            <Mini label="Published" value={scanPublished.toLocaleString()} mono/>
            <Mini label="Best edge" value={bestEdge ? window.fmtC(bestEdge) : '—'} mono tone="green"/>

          </div>
          <div style={{ padding: '0 18px 14px' }}>
            <div style={{ fontSize: 10, color: t.textMuted, letterSpacing: '0.08em', marginBottom: 6 }}>BEST EDGE — LIVE SCANS + AUDITED SHADOW SAMPLES</div>
            <div style={{ height: 56 }}>
              <window.EdgeStrip history={scannerHist} scale={[t.bgSubtle, t.accentSoft, t.accent + '90', t.green]}/>

          <div style={{ height: 180 }}>
            <window.BarChart data={M.edgeBuckets} color={t.bgHover} accent={t.accent} labelColor={t.textDim} emptyLabel="No active or audited edge samples yet — the scanner will plot live and shadow spreads here."/>
          </div>

        <window.DataTable columns={[
          { label: 'Time', w: '90px', render: r => <span style={{ fontFamily: window.FONTS.mono, color: t.textDim, fontSize: 11.5 }}>{window.ago(r.timestamp)}</span> },
          { label: 'ID', w: '110px', render: r => <span style={{ fontFamily: window.FONTS.mono, color: t.text, fontSize: 11.5 }}>{r.arb_id}</span> },
          { label: 'Market', render: r => <span style={{ fontSize: 12.5 }}>{r.opportunity.description}</span> },
          { label: 'Status', w: '120px', render: r => <window.StatusBadge status={r.status}/> },
          { label: 'Expected', w: '110px', align: 'right', render: r => <span style={{ fontFamily: window.FONTS.mono, fontSize: 12.5, color: t.textDim }}>{window.fmt$Sign(Number(r.expected_profit || 0))}</span> },
          { label: 'P&L', w: '110px', align: 'right', render: r => <span style={{ fontFamily: window.FONTS.mono, fontSize: 12.5, color: r.realized_pnl >= 0 ? t.green : t.red, fontWeight: 600 }}>{window.fmt$Sign(r.realized_pnl)}</span> },
        ]} rows={execs.slice(0, 5)} onRowClick={(r) => { setPage('trades'); }} emptyTitle="No trades yet" emptyHint="Pending, recovering, closed, and failed arbitrage attempts will show up here from /api/executions." emptyIcon="↗"/>
      </window.Card>
    </div>
  );
}

function KpiCard({ label, value, sub, tone, sparkData, sparkColor, fallbackValue, platformBalances }) {
  const { t } = window.useApp();
  const tones = { green: t.green, red: t.red, amber: t.amber, accent: t.accent };
  const hasPlatformBalances = Array.isArray(platformBalances) && platformBalances.length > 0;
  // If no time series exists yet (scanner history just started, equity has
  // a single point, etc.), feed the sparkline a 2-point flat series so it
  // renders a horizontal baseline instead of vanishing.
  const safeSpark = (() => {
    const arr = Array.isArray(sparkData) ? sparkData : [];
    if (arr.length >= 2) return arr;
    const v = arr.length === 1
      ? (typeof arr[0] === 'object' ? arr[0].v : arr[0])
      : (typeof fallbackValue === 'number' ? fallbackValue : 0);
    return [{ v }, { v }];
  })();
  return (
    <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, padding: 18, overflow:'hidden' }}>
      <div style={{ fontSize: 11, color: t.textMuted, letterSpacing: '0.04em', textTransform: 'uppercase', marginBottom: 8, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{label}</div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap: 12 }}>
        <div style={{ fontSize: 24, fontWeight: 600, color: tones[tone] || t.text, letterSpacing:'-0.018em', fontFamily: window.FONTS.mono, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{value}</div>
        {hasPlatformBalances && <div style={{ width: 64, height: 22, opacity: 0.85, flexShrink: 0 }}>
          <window.Sparkline data={safeSpark} width={64} height={22} stroke={sparkColor} fill={sparkColor + '22'}/>
        </div>}
      </div>
      {hasPlatformBalances ? (
        <div style={{ display:'grid', gap: 6, marginTop: 10 }}>
          {platformBalances.map((row) => (
            <div key={row.name} title={row.title || `${row.name} ${row.value}`} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap: 10, minWidth: 0, padding: '6px 8px', borderRadius: 7, background: t.bgSubtle, border: `1px solid ${t.border}` }}>
              <div style={{ display:'flex', alignItems:'center', gap: 7, minWidth: 0 }}>
                <span style={{ width: 7, height: 7, borderRadius: '50%', background: row.color, flexShrink: 0 }}/>
                <span style={{ fontSize: 11.5, color: t.textDim, whiteSpace:'nowrap' }}>{row.name}</span>
              </div>
              <span style={{ fontSize: 12.5, fontWeight: 600, color: t.text, fontFamily: window.FONTS.mono, whiteSpace:'nowrap' }}>{row.value}</span>
            </div>
          ))}
          {sub && <div style={{ fontSize: 10.5, color: t.textMuted, lineHeight: 1.35 }}>{sub}</div>}
        </div>
      ) : (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap: 10, marginTop: 4 }}>
          <div style={{ fontSize: 11, color: t.textDim, flex: 1, minWidth: 0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{sub}</div>
          <div style={{ width: 64, height: 22, opacity: 0.85, flexShrink: 0 }}>
            <window.Sparkline data={safeSpark} width={64} height={22} stroke={sparkColor} fill={sparkColor + '22'}/>
          </div>
        </div>
      )}
    </div>
  );
}

function Row({ dot, label, value, sub }) {
  const { t } = window.useApp();
  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 3 }}>
        <span style={{ width: 7, height: 7, borderRadius: '50%', background: dot }}/>
        <span style={{ fontSize: 12, color: t.textDim }}>{label}</span>
        <span style={{ marginLeft:'auto', fontSize: 13, fontWeight: 600, color: t.text, fontFamily: window.FONTS.mono }}>{value}</span>
      </div>
      <div style={{ fontSize: 10.5, color: t.textMuted, paddingLeft: 15 }}>{sub}</div>
    </div>
  );
}

function BalanceLegendItem({ dot, label, value, share, pnl, updated, description }) {
  const { t } = window.useApp();
  const title = `${label}: ${value}. ${share} of live capital. Trading P&L ${window.fmt$Sign(Number(pnl || 0))}. ${updated ? 'Updated ' + window.ago(updated) + '. ' : ''}${description}`;
  return (
    <div title={title} style={{ padding: '8px 0', borderBottom: `1px solid ${t.border}`, cursor: 'help' }}>
      <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 4 }}>
        <span style={{ width: 8, height: 8, borderRadius: '50%', background: dot, flexShrink: 0 }}/>
        <span style={{ fontSize: 12, color: t.text, fontWeight: 600 }}>{label}</span>
        <span style={{ marginLeft:'auto', fontSize: 13, fontWeight: 700, color: t.text, fontFamily: window.FONTS.mono }}>{value}</span>
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', gap: 10, paddingLeft: 16, fontSize: 10.5, color: t.textMuted }}>
        <span>{share} of capital · {updated ? `updated ${window.ago(updated)}` : 'awaiting balance refresh'}</span>
        <span style={{ color: Number(pnl || 0) >= 0 ? t.green : t.red, fontFamily: window.FONTS.mono }}>{window.fmt$Sign(Number(pnl || 0))}</span>
      </div>
      <div style={{ paddingLeft: 16, fontSize: 10.5, color: t.textDim, marginTop: 3, lineHeight: 1.35 }}>{description}</div>
    </div>
  );
}

function Mini({ label, value, mono, tone }) {
  const { t } = window.useApp();
  const c = tone === 'green' ? t.green : t.text;
  return (
    <div>
      <div style={{ fontSize: 10, color: t.textMuted, letterSpacing: '0.06em', textTransform:'uppercase', marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 15, fontWeight: 600, color: c, fontFamily: mono ? window.FONTS.mono : window.FONTS.sans, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{value}</div>
    </div>
  );
}

function TimeRange({ value, onChange, ranges }) {
  const { t } = window.useApp();
  const [inner, setInner] = oUseState(value || '24h');
  const active = value || inner;
  const opts = ranges || ['1h','6h','24h','7d','All'];
  const choose = (next) => {
    setInner(next);
    if (onChange) onChange(next);
  };
  return (
    <div style={{ display:'flex', background: t.bgSubtle, borderRadius: 6, padding: 2 }}>
      {opts.map(x => (
        <button key={x} onClick={() => choose(x)} style={{ padding: '4px 10px', background: active === x ? t.bgCard : 'transparent', border: 'none', fontSize: 11, color: active === x ? t.text : t.textDim, fontWeight: active === x ? 500 : 400, borderRadius: 4, cursor:'pointer', boxShadow: active === x ? '0 1px 2px rgba(0,0,0,0.06)' : 'none' }}>{x}</button>
      ))}
    </div>
  );
}

window.PageOverview = PageOverview;
window.TimeRange = TimeRange;

</script>
<script type="text/babel" data-presets="env,react" data-filename="page-opportunities.jsx">
// Opportunities page + opportunity drawer + execute modal.
const { useState: oppUseState, useMemo: oppUseMemo } = React;

function PageOpportunities() {
  const { t, setDrawer, setModal, minEdge, setMinEdge, autoExec, setAutoExec, toast } = window.useApp();
  const M = window.MOCK;
  const [filter, setFilter] = oppUseState('all'); // all | tradable | candidate | review
  const [sort, setSort] = oppUseState('edge');
  const [search, setSearch] = oppUseState('');

  const exportCsv = () => {
    const cols = ['canonical_id','description','yes_platform','yes_price','no_platform','no_price','net_edge_cents','expected_profit','status','suggested_qty','persistence_scans'];
    const escape = (v) => {
      const s = String(v ?? '');
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const rows = [cols.join(',')].concat(filtered.map(r => cols.map(c => escape(r[c])).join(',')));
    const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `opportunities-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast?.(`Exported ${filtered.length} rows`);
  };

  const filtered = oppUseMemo(() => {
    let r = M.opportunities;
    if (filter !== 'all') r = r.filter(o => o.status === filter);
    if (search) r = r.filter(o => o.description.toLowerCase().includes(search.toLowerCase()) || o.canonical_id.toLowerCase().includes(search.toLowerCase()));
    if (sort === 'edge') r = [...r].sort((a, b) => b.net_edge_cents - a.net_edge_cents);
    if (sort === 'profit') r = [...r].sort((a, b) => b.expected_profit - a.expected_profit);
    return r;
  }, [M, filter, sort, search]);

  const counts = {
    all: M.opportunities.length,
    tradable: M.opportunities.filter(o => o.status === 'tradable').length,
    candidate: M.opportunities.filter(o => o.status === 'candidate').length,
    review: M.opportunities.filter(o => o.status === 'review').length,
    illiquid: M.opportunities.filter(o => o.status === 'illiquid' || o.status === 'stale').length,
  };

  return (
    <div style={{ padding: '28px 32px', maxWidth: 1400, margin: '0 auto' }}>
      <window.PageHeader kicker="Live scan" title="Opportunities" sub="Mispriced YES/NO pairs across Kalshi and Polymarket. Click any row to inspect leg-by-leg math.">
        <ThresholdControl/>
        <AutoExecToggle/>
      </window.PageHeader>

      {/* Filter tabs */}
      <div style={{ display:'flex', alignItems:'center', gap: 4, padding: '4px', background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 9, marginBottom: 14, width: 'fit-content' }}>
        {[
          ['all', 'All'], ['tradable', 'Tradable'], ['candidate', 'Candidate'], ['review', 'Review'], ['illiquid', 'Stale / illiquid'],
        ].map(([k, l]) => (
          <button key={k} onClick={() => setFilter(k)} style={{
            padding: '6px 12px', background: filter === k ? t.bgSubtle : 'transparent', border: 'none', fontSize: 12, color: filter === k ? t.text : t.textDim, fontWeight: filter === k ? 600 : 400, borderRadius: 6, cursor:'pointer', display:'flex', alignItems:'center', gap: 6,
          }}>
            {l}
            <span style={{ fontSize: 10, color: filter === k ? t.accent : t.textMuted, fontFamily: window.FONTS.mono }}>{counts[k]}</span>
          </button>
        ))}
      </div>

      {/* Toolbar */}
      <div style={{ display:'flex', gap: 8, marginBottom: 12, alignItems:'center' }}>
        <input placeholder="Filter by description or canonical ID…" value={search} onChange={e => setSearch(e.target.value)} style={{ flex: 1, padding: '8px 12px', background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 7, fontSize: 12.5, color: t.text, outline: 'none' }} />
        <window.Btn variant="secondary" size="sm" hint="Toggle between sorting by net edge (¢) and expected profit ($)" onClick={() => setSort(sort === 'edge' ? 'profit' : 'edge')}>Sort: {sort === 'edge' ? 'Net edge ↓' : 'Expected profit ↓'}</window.Btn>
        <window.Btn variant="secondary" size="sm" icon="↓" disabled={filtered.length === 0} hint="Download the visible opportunities (post-filter, post-search) as a CSV" disabledHint="No active opportunities to export — clear the filter or wait for the scanner to publish one" onClick={exportCsv}>Export CSV</window.Btn>
      </div>

      {/* Table */}
      <window.Card padding={0}>
        <window.DataTable columns={[
          { label: 'Market', render: r => (
            <div>
              <div style={{ fontSize: 12.5, color: t.text, fontWeight: 500, marginBottom: 3 }}>{r.description}</div>
              <div style={{ fontSize: 10.5, color: t.textMuted, fontFamily: window.FONTS.mono }}>{r.canonical_id}</div>
            </div>
          )},
          { label: 'YES Leg', w: '180px', render: r => (
            <div>
              <window.PlatformChip name={r.yes_platform}/>
              <div style={{ fontSize: 12, color: t.text, fontFamily: window.FONTS.mono, marginTop: 4 }}>${r.yes_price.toFixed(2)} <span style={{ color: t.textMuted, fontSize: 10 }}>· {(r.fee_rate_yes*100).toFixed(1)}%</span></div>
            </div>
          )},
          { label: 'NO Leg', w: '180px', render: r => (
            <div>
              <window.PlatformChip name={r.no_platform}/>
              <div style={{ fontSize: 12, color: t.text, fontFamily: window.FONTS.mono, marginTop: 4 }}>${r.no_price.toFixed(2)} <span style={{ color: t.textMuted, fontSize: 10 }}>· {(r.fee_rate_no*100).toFixed(1)}%</span></div>
            </div>
          )},
          { label: 'Net edge', w: '100px', align: 'right', render: r => (
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: r.net_edge_cents >= 2 ? t.green : r.net_edge_cents >= 1 ? t.amber : t.textDim, fontFamily: window.FONTS.mono }}>{window.fmtC(r.net_edge_cents)}</div>
              <div style={{ fontSize: 10, color: t.textMuted, fontFamily: window.FONTS.mono }}>{r.persistence_scans} scans</div>
            </div>
          )},
          { label: 'Expected', w: '100px', align: 'right', render: r => (
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize: 12.5, fontWeight: 500, color: t.text, fontFamily: window.FONTS.mono }}>+{window.fmt$(r.expected_profit)}</div>
              <div style={{ fontSize: 10, color: t.textMuted, fontFamily: window.FONTS.mono }}>{r.suggested_qty} sh</div>
            </div>
          )},
          { label: 'Status', w: '110px', render: r => <window.StatusBadge status={r.status}/> },
          { label: '', w: '90px', align: 'right', render: r => r.status === 'tradable' ? <window.Btn variant="primary" size="sm" hint="Open the execution dialog — review size, then place YES + NO legs simultaneously" onClick={(e) => { e.stopPropagation(); setModal({ kind: 'execute', payload: M.opportunities.indexOf(r) }); }}>Execute →</window.Btn> : <span style={{ fontSize: 11, color: t.textMuted }}>—</span> },
        ]} rows={filtered} onRowClick={(r) => setDrawer({ kind: 'opp', payload: M.opportunities.indexOf(r) })} emptyTitle={search || filter !== 'all' ? 'No matching opportunities' : 'No opportunities right now'} emptyHint={search || filter !== 'all' ? 'Try a different filter or clear the search.' : 'The scanner is running. Cross-platform edges will appear here as soon as one opens.'} emptyIcon="◇"/>
      </window.Card>
    </div>
  );
}

function ThresholdControl() {
  const { t, minEdge, setMinEdge } = window.useApp();
  return (
    <div style={{ display:'flex', alignItems:'center', gap: 8, padding: '5px 10px 5px 12px', background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 7 }}>
      <span style={{ fontSize: 11, color: t.textDim }}>Min edge</span>
      <input type="range" min="0" max="5" step="0.1" value={minEdge} onChange={e => setMinEdge(+e.target.value)} style={{ width: 80, accentColor: t.accent }}/>
      <span style={{ fontSize: 11.5, color: t.text, fontFamily: window.FONTS.mono, fontWeight: 600, width: 30 }}>{minEdge.toFixed(1)}¢</span>
    </div>
  );
}

function AutoExecToggle() {
  const { t, autoExec, setAutoExec } = window.useApp();
  return (
    <button onClick={() => setAutoExec(!autoExec)} style={{ display:'flex', alignItems:'center', gap: 8, padding: '6px 12px', background: autoExec ? t.accentSoft : t.bgCard, border: `1px solid ${autoExec ? t.accent + '50' : t.border}`, borderRadius: 7, fontSize: 12, color: autoExec ? t.accent : t.textDim, fontWeight: 500, cursor:'pointer' }}>
      <span style={{ width: 22, height: 12, borderRadius: 99, background: autoExec ? t.accent : t.borderBright, position:'relative', display:'inline-block' }}>
        <span style={{ position:'absolute', top: 1, left: autoExec ? 11 : 1, width: 10, height: 10, borderRadius:'50%', background:'#fff', transition: 'left 0.15s' }}/>
      </span>
      Auto-execute
    </button>
  );
}

// ── Opportunity drawer ───────────────────────────────────────────────
function OppDrawer() {
  const { t, drawer, setDrawer, setModal, toast } = window.useApp();
  if (!drawer || drawer.kind !== 'opp') return null;
  const o = window.MOCK.opportunities[drawer.payload];
  if (!o) return null;
  const grossYes = (1 - o.yes_price) * o.suggested_qty;
  const grossNo = (1 - o.no_price) * o.suggested_qty;
  const cost = (o.yes_price + o.no_price) * o.suggested_qty;
  const fees = (o.yes_price * o.fee_rate_yes + o.no_price * o.fee_rate_no) * o.suggested_qty;
  const payout = o.suggested_qty;
  const profit = payout - cost - fees;

  return (
    <div onClick={() => setDrawer(null)} style={{ position:'fixed', inset: 0, background: t.overlay, zIndex: 80, display:'flex', justifyContent:'flex-end' }}>
      <div onClick={e => e.stopPropagation()} style={{ width: 520, height: '100%', background: t.bgCard, borderLeft: `1px solid ${t.border}`, display:'flex', flexDirection:'column', boxShadow: t.shadowLg }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${t.border}` }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 10 }}>
            <window.StatusBadge status={o.status}/>
            <button onClick={() => setDrawer(null)} style={{ background:'none', border:'none', color: t.textMuted, fontSize: 18, cursor:'pointer' }}>✕</button>
          </div>
          <div style={{ fontSize: 17, fontWeight: 600, color: t.text, lineHeight: 1.35, marginBottom: 6 }}>{o.description}</div>
          <div style={{ fontSize: 11, color: t.textMuted, fontFamily: window.FONTS.mono }}>{o.canonical_id} · last seen {window.ago(o.last_seen)}</div>
        </div>

        <div style={{ flex: 1, overflow: 'auto', padding: '20px 24px' }}>
          {/* Edge math card */}
          <div style={{ padding: 18, background: t.bgSubtle, borderRadius: 10, marginBottom: 20 }}>
            <div style={{ fontSize: 10.5, color: t.textMuted, letterSpacing: '0.06em', textTransform:'uppercase', marginBottom: 8 }}>NET EDGE BREAKDOWN</div>
            <div style={{ display:'flex', alignItems:'baseline', gap: 4, marginBottom: 12 }}>
              <span style={{ fontSize: 32, fontWeight: 600, color: t.green, fontFamily: window.FONTS.mono, letterSpacing: '-0.02em' }}>{window.fmtC(o.net_edge_cents)}</span>
              <span style={{ fontSize: 12, color: t.textDim }}>per pair · {o.persistence_scans} consecutive scans</span>
            </div>
            <BreakdownLine label="Sum of prices" value={`$${(o.yes_price + o.no_price).toFixed(2)}`} sub={`YES $${o.yes_price.toFixed(2)} + NO $${o.no_price.toFixed(2)}`}/>
            <BreakdownLine label="Gross edge" value={`${((1 - (o.yes_price + o.no_price)) * 100).toFixed(1)}¢`} positive/>
            <BreakdownLine label="Fees" value={`−${(o.fee_rate_yes*o.yes_price*100 + o.fee_rate_no*o.no_price*100).toFixed(2)}¢`} negative/>
            <BreakdownLine label="Net edge" value={window.fmtC(o.net_edge_cents)} positive bold/>
          </div>

          {/* Legs */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
            <LegCard side="YES" platform={o.yes_platform} price={o.yes_price} fee={o.fee_rate_yes} qty={o.suggested_qty} volume={o.yes_volume}/>
            <LegCard side="NO" platform={o.no_platform} price={o.no_price} fee={o.fee_rate_no} qty={o.suggested_qty} volume={o.no_volume}/>
          </div>

          {/* Execution preview */}
          <div style={{ fontSize: 11, fontWeight: 600, color: t.textMuted, letterSpacing: '0.06em', textTransform:'uppercase', marginBottom: 10 }}>EXECUTION PREVIEW</div>
          <div style={{ background: t.bgSubtle, borderRadius: 10, padding: 16, marginBottom: 20, fontSize: 12, fontFamily: window.FONTS.mono, color: t.textDim, lineHeight: 1.8 }}>
            <PreviewRow label="Quantity" value={`${o.suggested_qty} pairs`}/>
            <PreviewRow label="Total cost" value={`−${window.fmt$(cost, 2)}`}/>
            <PreviewRow label="Fees" value={`−${window.fmt$(fees, 4)}`}/>
            <PreviewRow label="Guaranteed payout" value={`+${window.fmt$(payout, 2)}`}/>
            <div style={{ borderTop: `1px solid ${t.border}`, margin: '8px 0' }}/>
            <PreviewRow label="Net profit" value={`+${window.fmt$(profit, 4)}`} bold positive/>
          </div>

          {/* Risk gates */}
          <div style={{ fontSize: 11, fontWeight: 600, color: t.textMuted, letterSpacing: '0.06em', textTransform:'uppercase', marginBottom: 10 }}>RISK GATES</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
            <Gate ok label="Min edge ≥ 1.0¢" detail={`${window.fmtC(o.net_edge_cents)} pass`}/>
            <Gate ok label="Volume ≥ 500" detail={`${(o.yes_volume + o.no_volume).toLocaleString()} on both legs`}/>
            <Gate ok label="Persistence ≥ 3 scans" detail={`${o.persistence_scans} scans seen`}/>
            <Gate ok label="Position ≤ $200" detail={`${window.fmt$(cost, 0)} requested`}/>
          </div>
        </div>

        <div style={{ padding: '16px 24px', borderTop: `1px solid ${t.border}`, display:'flex', gap: 8 }}>
          <window.Btn variant="ghost" onClick={() => setDrawer(null)}>Cancel</window.Btn>

          <window.Btn variant="secondary" icon="◇" hint="Flag this pair for an agent re-check — keeps it in the queue but skips auto-execution" onClick={() => { setDrawer(null); toast('Marked for review', { sub: o.canonical_id }); }}>Mark for review</window.Btn>
          <window.Btn variant="primary" icon="→" hint="Open the execution dialog — review size, then place YES + NO legs simultaneously" onClick={() => { setDrawer(null); setModal({ kind: 'execute', payload: drawer.payload }); }}>Execute trade</window.Btn>
        </div>
      </div>
    </div>
  );
}

function BreakdownLine({ label, value, sub, positive, negative, bold }) {

}

function LegCard({ side, platform, price, fee, qty, volume }) {

function PreviewRow({ label, value, bold, positive }) {

}

function Gate({ ok, label, detail }) {

<script type="text/babel" data-presets="env,react" data-filename="pages-rest.jsx">
// Trades + P&L + Markets + Mappings + Scanner + Audit + Funds + Settings
const { useState: pUseState, useMemo: pUseMemo } = React;

// ── Trades ──────────────────────────────────────────────────────────
function PageTrades() {
  const { t, setModal } = window.useApp();
  const M = window.MOCK;
  const [statusFilter, setStatusFilter] = pUseState('all');
  const rows = pUseMemo(() => {
    const list = Array.isArray(M.executions) ? [...M.executions] : [];
    return list.sort((a, b) => (Number(b.timestamp) || 0) - (Number(a.timestamp) || 0));
  }, [M.executions, M.lastFetch]);
  const isOpenTrade = e => e.status_group === 'open' || ['pending','submitted','recovering'].includes(String(e.status || '').toLowerCase());
  const filtered = rows.filter(e => {
    if (statusFilter === 'all') return true;
    if (statusFilter === 'completed') return e.status_group === 'completed' || ['filled','closed','settled','simulated'].includes(String(e.status || '').toLowerCase());
    if (statusFilter === 'open') return isOpenTrade(e);
    if (statusFilter === 'losses') return !isOpenTrade(e) && Number(e.realized_pnl || 0) < 0;
    return String(e.status || '').toLowerCase() === statusFilter;
  });
  const totalPnl = rows.reduce((s, e) => s + Number(e.realized_pnl || 0), 0);
  const totalExpected = rows.reduce((s, e) => s + Number(e.expected_profit || 0), 0);
  const completed = rows.filter(e => e.status_group === 'completed' || ['filled','closed','settled','simulated'].includes(String(e.status || '').toLowerCase())).length;
  const open = rows.filter(e => e.status_group === 'open' || ['pending','submitted','recovering'].includes(String(e.status || '').toLowerCase())).length;
  const failed = rows.filter(e => e.status_group === 'failed' || ['failed','aborted','rejected'].includes(String(e.status || '').toLowerCase())).length;
  const losses = rows.filter(e => Number(e.realized_pnl || 0) < 0).reduce((s, e) => s + Number(e.realized_pnl || 0), 0);
  const fillRate = rows.length ? completed / rows.length : 0;

  return (
    <div style={{ padding: '28px 32px', maxWidth: 1400, margin: '0 auto' }}>
      <window.PageHeader kicker="Execution ledger" title="Trades" sub={`${rows.length.toLocaleString()} placed trades loaded from the execution ledger, including completed, failed, recovering, and pending arbs.`}/>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 18 }}>
        <window.Card padding={18}><window.Stat label="Total trades" value={rows.length} sub={`${completed} completed · ${open} open · ${failed} failed`} mono/></window.Card>
        <window.Card padding={18}><window.Stat label="Realized P&L" value={window.fmt$Sign(totalPnl)} tone={totalPnl >= 0 ? 'green' : 'red'} sub="Net of fees, all platforms" mono/></window.Card>
        <window.Card padding={18}><window.Stat label="Expected profit" value={window.fmt$Sign(totalExpected)} sub={`${window.fmt$Sign(totalPnl - totalExpected)} vs expected`} tone={totalPnl - totalExpected >= 0 ? 'green' : 'red'} mono/></window.Card>
        <window.Card padding={18}><window.Stat label="Completion rate" value={`${(fillRate*100).toFixed(0)}%`} sub={`${window.fmt$Sign(losses)} realized losses`} tone={losses < 0 ? 'red' : 'green'} mono/></window.Card>
      </div>

      <div style={{ display:'flex', alignItems:'center', gap: 4, padding: 4, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 9, marginBottom: 14, width:'fit-content' }}>
        {['all','completed','open','failed','losses'].map(s => (
          <button key={s} onClick={() => setStatusFilter(s)} style={{ padding: '6px 12px', background: statusFilter === s ? t.bgSubtle : 'transparent', border:'none', fontSize: 12, color: statusFilter === s ? t.text : t.textDim, fontWeight: statusFilter === s ? 600 : 400, borderRadius: 6, cursor:'pointer', textTransform:'capitalize' }}>{s}</button>
        ))}
      </div>

      <window.Card padding={0}>
        <window.DataTable columns={[
          { label: 'Trade ID', w: '120px', render: r => <span style={{ fontFamily: window.FONTS.mono, fontSize: 12, color: t.text, fontWeight: 600 }}>{r.arb_id}</span> },
          { label: 'Time', w: '110px', render: r => <span style={{ fontFamily: window.FONTS.mono, color: t.textDim, fontSize: 11.5 }}>{window.ago(r.timestamp)}</span> },
          { label: 'Market', render: r => (
            <div>
              <div style={{ fontSize: 12.5, color: t.text, marginBottom: 2 }}>{r.opportunity.description}</div>
              <div style={{ fontSize: 10.5, color: t.textMuted, fontFamily: window.FONTS.mono }}>{r.opportunity.canonical_id}</div>
            </div>
          )},
          { label: 'YES', w: '160px', render: r => <LegCell leg={r.leg_yes} platform={r.opportunity.yes_platform}/> },
          { label: 'NO', w: '160px', render: r => <LegCell leg={r.leg_no} platform={r.opportunity.no_platform}/> },
          { label: 'Status', w: '100px', render: r => <window.StatusBadge status={r.status}/> },
          { label: 'Expected', w: '105px', align: 'right', render: r => <span style={{ fontFamily: window.FONTS.mono, fontSize: 12.5, color: Number(r.expected_profit || 0) >= 0 ? t.green : t.red, fontWeight: 600 }}>{window.fmt$Sign(Number(r.expected_profit || 0))}</span> },
          { label: 'Actual P&L', w: '110px', align: 'right', render: r => <span style={{ fontFamily: window.FONTS.mono, fontSize: 12.5, color: r.realized_pnl > 0 ? t.green : r.realized_pnl < 0 ? t.red : t.textDim, fontWeight: 600 }}>{window.fmt$Sign(r.realized_pnl)}</span> },
          { label: 'Delta', w: '100px', align: 'right', render: r => <span style={{ fontFamily: window.FONTS.mono, fontSize: 12, color: Number(r.expected_vs_realized || 0) >= 0 ? t.green : t.red }}>{window.fmt$Sign(Number(r.expected_vs_realized || 0))}</span> },
        ]} rows={filtered} onRowClick={(r) => setModal({ kind: 'trade', payload: r })} emptyTitle="No trades in ledger" emptyHint="Completed, pending, recovering, and failed trades from /api/executions will show here." emptyIcon="↗"/>
      </window.Card>
    </div>
  );
}

function LegCell({ leg, platform }) {

  return (

// ── P&L ─────────────────────────────────────────────────────────────
function PagePnL() {
  const { t } = window.useApp();
  const M = window.MOCK;
  const [range, setRange] = React.useState('All');
  const totalDeposits = M.pnl.total_deposits_all_platforms ?? (M.pnl.total_deposits.kalshi + M.pnl.total_deposits.polymarket);
  const tradingPnl = M.pnl.recorded_trading_pnl.kalshi + M.pnl.recorded_trading_pnl.polymarket;
  const equity = Array.isArray(M.equity) ? M.equity : [];
  const equityRange = window.filterTimeSeries ? window.filterTimeSeries(equity, range) : equity;
  const rangeDelta = window.seriesDelta ? window.seriesDelta(equityRange) : 0;
  const startingCapital = Math.max(1, Math.abs((M.pnl.starting_balances.kalshi || 0) + (M.pnl.starting_balances.polymarket || 0)));
  const lifetimeReturn = tradingPnl / startingCapital;

  return (
    <div style={{ padding: '28px 32px', maxWidth: 1400, margin: '0 auto' }}>
      <window.PageHeader kicker="Performance" title="P&L" sub="Reconciled trading P&L by platform. Deposits are subtracted from balance changes to isolate true trading performance.">
        <window.TimeRange value={range} onChange={setRange} ranges={['24h','7d','30d','All']}/>
      </window.PageHeader>

      <window.Card padding={0} style={{ marginBottom: 18 }}>
        <div style={{ padding: '24px 28px', display:'flex', alignItems:'baseline', gap: 32, borderBottom: `1px solid ${t.border}` }}>
          <div>
            <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 6 }}>Total balance</div>
            <div style={{ fontSize: 36, fontWeight: 600, color: t.text, fontFamily: window.FONTS.mono, letterSpacing:'-0.02em' }}>{window.fmt$(M.pnl.total_balance)}</div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 6 }}>Trading P&L</div>
            <div style={{ fontSize: 24, fontWeight: 600, color: tradingPnl >= 0 ? t.green : t.red, fontFamily: window.FONTS.mono }}>{window.fmt$Sign(tradingPnl)}</div>
            <div style={{ fontSize: 11, color: t.textDim, marginTop: 2 }}>{window.fmtPct(lifetimeReturn)} since inception</div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 6 }}>Total deposits</div>
            <div style={{ fontSize: 24, fontWeight: 600, color: t.text, fontFamily: window.FONTS.mono }}>{window.fmt$(totalDeposits)}</div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 6 }}>Selected range</div>
            <div style={{ fontSize: 24, fontWeight: 600, color: rangeDelta >= 0 ? t.green : t.red, fontFamily: window.FONTS.mono }}>{window.fmt$Sign(rangeDelta)}</div>
          </div>
        </div>
        <div style={{ height: 320, padding: 16 }}>
          <window.AreaChart data={equityRange} width={1320} height={300} stroke={t.accent} grid={t.border}/>
        </div>
      </window.Card>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap: 14 }}>
        <window.Card title="Per-platform P&L" padding={0}>
          <PlatformPnL platform="kalshi" color={t.green}/>
          <PlatformPnL platform="polymarket" color={t.purple} last/>
        </window.Card>
        <window.Card title="Reconciliation" padding={20}>
          <ReconRow label="Reconciliations run" value={M.health.reconciliation.reconciliation_count.toLocaleString()}/>
          <ReconRow label="Outstanding flags" value={M.health.reconciliation.flag_count} ok/>
          <ReconRow label="Audit score" value={(M.health.audit.audit_score * 100).toFixed(2) + '%'} ok/>
          <ReconRow label="Profitability verdict" value={M.health.profitability.verdict} pillTone="amber"/>
          <ReconRow label="Cumulative pnl (audit)" value={window.fmt$Sign(M.health.profitability.cumulative_pnl)}/>
          <div style={{ marginTop: 16, padding: 14, background: t.bgSubtle, borderRadius: 8, fontSize: 11.5, color: t.textDim, lineHeight: 1.55 }}>
            Trading P&L is computed as <span style={{ fontFamily: window.FONTS.mono, color: t.text }}>(current_balance − starting_balance − deposits)</span>, so deposit/withdrawal events do not pollute performance metrics.
          </div>
          {M.health.reconciliation.flag_count > 0 && (
            <window.Btn variant="secondary" size="sm" hint="Reset starting balances to current actuals — clears all reconciliation drift flags" style={{ marginTop: 12, width: '100%' }} onClick={async () => {
              try {
                const r = await fetch((window.__arbiterAPI || '') + '/api/reconciliation/rebaseline', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin' });
                const d = await r.json();
                if (d.status === 'ok') toast('Reconciliation re-baselined', { sub: 'Starting balances reset to current actuals' });
                else toast('Rebaseline failed: ' + (d.error || 'unknown'), { tone: 'error' });
              } catch (e) { toast('Rebaseline failed', { sub: String(e), tone: 'error' }); }
            }}>↻ Re-baseline reconciliation</window.Btn>
          )}
        </window.Card>
      </div>
    </div>
  );
}

function PlatformPnL({ platform, color, last }) {
  const { t } = window.useApp();
  const M = window.MOCK;
  const start = M.pnl.starting_balances[platform];
  const cur = M.pnl.current_balances[platform];
  const dep = M.pnl.total_deposits[platform];
  const pnl = M.pnl.recorded_trading_pnl[platform];
  return (
    <div style={{ padding: '18px 22px', borderBottom: last ? 'none' : `1px solid ${t.border}` }}>
      <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 12 }}>
        <span style={{ width: 8, height: 8, borderRadius:'50%', background: color }}/>

        <span style={{ marginLeft:'auto', fontSize: 16, fontWeight: 600, color: pnl >= 0 ? t.green : t.red, fontFamily: window.FONTS.mono }}>{window.fmt$Sign(pnl)}</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, minmax(0, 1fr))', gap: 12, fontFamily: window.FONTS.mono, fontVariantNumeric: 'tabular-nums' }}>

}
function PnlMini({ label, value, tone }) {
  const { t } = window.useApp();
  const c = tone === 'green' ? t.green : tone === 'red' ? t.red : t.text;
  return (
    <div style={{ minWidth: 0 }}>
      <div style={{ fontSize: 10, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 4, height: 13, lineHeight: '13px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{label}</div>
      <div style={{ fontSize: 13, color: c, fontWeight: 500, fontVariantNumeric:'tabular-nums', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{value}</div>

function ReconRow({ label, value, ok, pillTone }) {

  return (

      {pillTone ? <window.Pill tone={pillTone}>{value}</window.Pill> : <span style={{ fontSize: 13, color: ok ? t.green : t.text, fontWeight: 600, fontFamily: window.FONTS.mono }}>{value}</span>}
    </div>
  );
}

// ── Markets ─────────────────────────────────────────────────────────
function mappingField(row, names) {
  for (const name of names) {
    const value = row && row[name];
    if (value != null && String(value).trim()) return String(value).trim();
  }
  return '';
}

function mappingCategory(row) {
  const tags = Array.isArray(row?.tags) ? row.tags.map(x => String(x).toLowerCase()) : [];
  const text = [
    row?.description, row?.polymarket_question, row?.canonical_id,
    mappingField(row, ['kalshi_market_id', 'kalshi_ticker', 'kalshi']),
    mappingField(row, ['polymarket_slug', 'poly_slug', 'polymarket']),
    tags.join(' '),
  ].filter(Boolean).join(' ').toLowerCase();
  if (tags.includes('sports') || /\b(mlb|nba|nfl|nhl|mls|epl|lal|sea|bun|game|championship|finals)\b/.test(text)) return 'Sports';
  if (tags.includes('politics') || /\b(election|senate|house|president|congress|governor|mayor|cabinet|party)\b/.test(text)) return 'Politics';
  if (tags.includes('crypto') || /\b(bitcoin|btc|ethereum|eth|solana|crypto|stablecoin)\b/.test(text)) return 'Crypto';
  if (tags.includes('economics') || tags.includes('macro') || /\b(cpi|fed|rate|gdp|inflation|unemployment|jobs|treasury)\b/.test(text)) return 'Macro';
  if (tags.includes('entertainment') || /\b(oscar|emmy|grammy|movie|album|box office|streaming)\b/.test(text)) return 'Entertainment';
  if (tags.includes('weather') || /\b(weather|temperature|rain|snow|hurricane|storm)\b/.test(text)) return 'Weather';
  if (tags.includes('science') || /\b(space|nasa|ai|launch|science)\b/.test(text)) return 'Science';
  if (tags.includes('geo') || /\b(war|ceasefire|country|border|treaty)\b/.test(text)) return 'Geo';
  return 'Other';
}

function marketRowsFromMappings(M, status) {
  const rows = Array.isArray(M?.mappings) ? M.mappings : [];
  const opps = Array.isArray(M?.opportunities) ? M.opportunities : [];
  const oppById = new Map(opps.map(o => [o.canonical_id, o]));
  return rows
    .filter(r => !status || (r.status || '').toLowerCase() === status)
    .map((r) => {
      const canonical = r.canonical_id || `${mappingField(r, ['kalshi_market_id', 'kalshi_ticker', 'kalshi'])}::${mappingField(r, ['polymarket_slug', 'poly_slug', 'polymarket'])}`;
      const live = oppById.get(canonical) || null;
      return {
        raw: r,
        kind: 'mapping',
        canonical_id: canonical,
        description: r.description || r.polymarket_question || canonical,
        kalshi_market_id: mappingField(r, ['kalshi_market_id', 'kalshi_ticker', 'kalshi', 'ticker']),
        polymarket_slug: mappingField(r, ['polymarket_slug', 'poly_slug', 'polymarket']),
        status: r.status || 'candidate',
        category: mappingCategory(r),
        tags: Array.isArray(r.tags) ? r.tags : [],
        confidence: Number(r.confidence ?? r.mapping_score ?? r.score ?? 0),
        mapping_score: Number(r.mapping_score ?? r.confidence ?? r.score ?? 0),
        resolution_match_status: r.resolution_match_status || 'pending_operator_review',
        resolution_criteria: r.resolution_criteria || null,
        allow_auto_trade: !!r.allow_auto_trade,
        polarity_flipped: !!r.polarity_flipped,
        live,
        net_edge_cents: live ? Number(live.net_edge_cents || 0) : null,
        expected_profit: live ? Number(live.expected_profit || 0) : null,
        timestamp: live ? live.timestamp : null,
      };
    })
    .sort((a, b) => a.category.localeCompare(b.category) || b.confidence - a.confidence || a.description.localeCompare(b.description));
}
window.marketRowsFromMappings = marketRowsFromMappings;

function PageMarkets() {
  const { t, setModal } = window.useApp();
  const M = window.MOCK;
  const [category, setCategory] = React.useState('All');
  const rows = marketRowsFromMappings(M, 'confirmed');
  const categories = Array.from(rows.reduce((m, row) => m.set(row.category, (m.get(row.category) || 0) + 1), new Map()).entries())
    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  const cards = [['All', rows.length], ...categories];
  const visibleRows = category === 'All' ? rows : rows.filter(row => row.category === category);
  const liveRows = rows.filter(row => row.live);
  return (
    <div style={{ padding: '28px 32px', maxWidth: 1400, margin: '0 auto' }}>
      <window.PageHeader kicker="Mapped universe" title="Markets" sub={`${rows.length.toLocaleString()} confirmed mappings across ${Math.max(1, categories.length).toLocaleString()} categories. ${liveRows.length.toLocaleString()} have a live scanner quote right now; click any mapping to fetch current platform prices.`}>
        <window.Btn variant="secondary" size="sm" icon="↓" hint="Download the full mapped-market list as CSV or JSON" onClick={() => setModal({ kind: 'export', payload: 'markets' })}>Export</window.Btn>
        <window.Btn variant="primary" size="sm" icon="+" hint="Manually add a cross-platform market pair" onClick={() => setModal({ kind: 'newMapping' })}>New mapping</window.Btn>
      </window.PageHeader>

// ── Mappings ────────────────────────────────────────────────────────
function PageMappings() {
  const { t, setModal, toast } = window.useApp();
  const [mappingFilter, setMappingFilter] = React.useState('all');
  const M = window.MOCK;
  const rows = Array.isArray(M.mappings) ? M.mappings : [];
  const candidates = rows.map((r) => ({
    raw: r,
    canonical_id: r.canonical_id || `${r.kalshi_market_id || r.kalshi_ticker || ''}::${r.polymarket_slug || r.poly_slug || ''}`,
    score: Number(r.mapping_score ?? r.score ?? r.confidence ?? 0),
    k: r.kalshi_market_id || r.kalshi_ticker || r.kalshi || '',
    p: r.polymarket_slug || r.poly_slug || r.polymarket || '',
    s: r.status || 'candidate',
    auto: !!r.allow_auto_trade,
    match: r.resolution_match_status || 'pending_operator_review',
    reason: r.auto_promote_reason || '',
  }));
  const statusOf = c => String(c.s || '').toLowerCase();
  const matchOf = c => String(c.match || '').toLowerCase();
  const reasonOf = c => String(c.reason || '').toLowerCase();
  const isPending = c => ['candidate', 'pending', 'review'].includes(statusOf(c));
  const isLive = c => statusOf(c) === 'confirmed' && !!c.auto && matchOf(c) === 'identical';
  const isStale = c => statusOf(c) === 'expired' || matchOf(c) === 'expired' || reasonOf(c).includes('expired') || reasonOf(c).includes('stale');
  const reviewable = candidates.filter(isPending);
  const confirmedCount = candidates.filter(c => statusOf(c) === 'confirmed').length;
  const liveCount = candidates.filter(isLive).length;
  const staleCount = candidates.filter(isStale).length;
  const rejectedCount = candidates.filter(c => statusOf(c) === 'rejected').length;
  const avgScore = candidates.length
    ? candidates.reduce((sum, c) => sum + (Number.isFinite(c.score) ? c.score : 0), 0) / candidates.length
    : 0;
  const discovery = M.discovery || {};
  const discoveryCounts = discovery.counts || {};
  const discoveryStatus = String(discovery.status || 'idle').toLowerCase();
  const discoveryEvents = Array.isArray(discovery.events) ? discovery.events : [];
  const lastDiscoveryEvent = discoveryEvents[discoveryEvents.length - 1];
  const lastRefetchValue = discoveryStatus === 'idle' ? 'ready' : discoveryStatus;
  const lastRefetchSub = discoveryStatus === 'idle'
    ? 'No run since API start'
    : (lastDiscoveryEvent?.message || discovery.message || `${(discoveryCounts.kalshi_markets || 0).toLocaleString()} K · ${(discoveryCounts.polymarket_markets || 0).toLocaleString()} P`);
  const MAPPING_FILTERS = [
    { key:'all', label:'All', count:candidates.length },
    { key:'confirmed', label:'Confirmed', count:confirmedCount },
    { key:'pending', label:'Pending', count:reviewable.length },
    { key:'live', label:'Live', count:liveCount },
    { key:'stale', label:'Stale', count:staleCount },
    { key:'rejected', label:'Rejected', count:rejectedCount },
  ];
  const filteredCandidates = candidates.filter(c => {
    if (mappingFilter === 'confirmed') return statusOf(c) === 'confirmed';
    if (mappingFilter === 'pending') return isPending(c);
    if (mappingFilter === 'live') return isLive(c);
    if (mappingFilter === 'stale') return isStale(c);
    if (mappingFilter === 'rejected') return statusOf(c) === 'rejected';
    return true;
  });
  const StatButton = ({ children, onClick, active }) => (
    <button type="button" onClick={onClick} style={{ background:'transparent', border:'none', padding: 0, textAlign:'left', cursor:'pointer', borderRadius: 10, outline:'none', boxShadow: active ? `0 0 0 2px ${t.accent}` : 'none' }}>
      {children}
    </button>
  );

  return (
    <div style={{ padding: '28px 32px', maxWidth: 1400, margin: '0 auto' }}>
      <window.PageHeader kicker="Cross-platform" title="Mappings" sub="Semantic matches between Kalshi and Polymarket markets, scored by description similarity, dates, and resolution criteria.">
        <window.Btn variant="secondary" size="sm" icon="↻" hint="Pull latest mapping data from the discovery pipeline" onClick={() => setModal({ kind:'refetchMappings' })}>Re-fetch mappings</window.Btn>
        <window.Btn variant="primary" size="sm" icon="◇" hint="Run the backend batch validation/discovery job without auto-promoting new rows" onClick={() => {
          if (reviewable.length) setModal({ kind:'refetchMappings', payload:{ title:'Validate pending mappings', autoPromote:false } });
          else toast('No candidates pending review');
        }}>Validate all pending</window.Btn>
      </window.PageHeader>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 18 }}>
        <StatButton active={mappingFilter === 'confirmed'} onClick={() => setMappingFilter('confirmed')}><window.Card padding={18}><window.Stat label="Confirmed" value={confirmedCount.toLocaleString()} tone="green" sub={`${candidates.filter(c => c.auto).length.toLocaleString()} auto-trade`} mono/></window.Card></StatButton>
        <StatButton active={mappingFilter === 'pending'} onClick={() => setMappingFilter('pending')}><window.Card padding={18}><window.Stat label="Pending review" value={reviewable.length.toLocaleString()} tone="amber" sub="Candidate + review queue" mono/></window.Card></StatButton>
        <StatButton active={mappingFilter === 'live'} onClick={() => setMappingFilter('live')}><window.Card padding={18}><window.Stat label="Live mappings" value={liveCount.toLocaleString()} tone="accent" sub="Confirmed + identical + auto-trade" mono/></window.Card></StatButton>
        <StatButton onClick={() => setModal({ kind:'refetchMappings', payload:{ title:'Discovery history', inspectOnly:true } })}><window.Card padding={18}><window.Stat label="Last refetch" value={lastRefetchValue} sub={lastRefetchSub} mono/></window.Card></StatButton>
      </div>

      <div style={{ display:'flex', alignItems:'center', gap: 8, flexWrap:'wrap', marginBottom: 14 }}>
        {MAPPING_FILTERS.map(f => (
          <button key={f.key} type="button" aria-pressed={mappingFilter === f.key} onClick={() => setMappingFilter(f.key)} style={{ padding:'7px 10px', border:`1px solid ${mappingFilter === f.key ? t.accent : t.border}`, background: mappingFilter === f.key ? t.bgSubtle : 'transparent', borderRadius: 8, color: mappingFilter === f.key ? t.text : t.textDim, fontSize: 12, fontWeight: mappingFilter === f.key ? 600 : 500, cursor:'pointer', display:'flex', alignItems:'center', gap: 7 }}>
            <span>{f.label}</span>
            <span style={{ fontFamily: window.FONTS.mono, fontSize: 10.5, color: mappingFilter === f.key ? t.accent : t.textMuted }}>{Number(f.count || 0).toLocaleString()}</span>
          </button>
        ))}
      </div>

      <window.Card title="Candidate mappings" padding={0} action={<span style={{ fontSize: 11, color: t.textMuted }}>{filteredCandidates.length} visible · {reviewable.length} actionable</span>}>
        <window.DataTable columns={[
          { label: 'Score', w: '90px', render: r => (
            <div style={{ display:'flex', alignItems:'center', gap: 6 }}>
              <div style={{ width: 32, height: 32, borderRadius:'50%', background: r.score >= 0.9 ? t.greenSoft : r.score >= 0.7 ? t.amberSoft : t.redSoft, display:'flex', alignItems:'center', justifyContent:'center', fontSize: 11, fontWeight: 700, color: r.score >= 0.9 ? t.green : r.score >= 0.7 ? t.amber : t.red, fontFamily: window.FONTS.mono }}>{r.score.toFixed(2)}</div>
            </div>
          )},
          { label: 'Kalshi ticker', render: r => <span style={{ fontFamily: window.FONTS.mono, fontSize: 12, color: t.text }}>{r.k}</span> },
          { label: 'Polymarket slug', render: r => <span style={{ fontFamily: window.FONTS.mono, fontSize: 11.5, color: t.textDim }}>{r.p}</span> },
          { label: 'Status', w: '110px', render: r => <window.StatusBadge status={r.s}/> },
          { label: 'Criteria', w: '150px', render: r => <span style={{ fontSize: 11, color: r.match === 'identical' ? t.green : r.match === 'divergent' ? t.red : t.textDim }}>{r.match}</span> },
          { label: '', w: '230px', align:'right', render: r => {
            if (r.s === 'confirmed') return <span style={{ fontSize: 11, color: t.textMuted }}>Active · scanned every 5s</span>;
            if (r.s === 'rejected') return <window.Btn variant="ghost" size="sm" onClick={async (e) => {
              e.stopPropagation();
              const id = r.canonical_id || r.k;
              if (window.__arbiterMappingAction) {
                const res = await window.__arbiterMappingAction(id, 'review', { note: 're-opened from operator desk' });
                if (!res.ok) { toast('Re-open failed', { sub: res.error, tone: 'error' }); return; }
                if (window.__arbiterTick) { try { await window.__arbiterTick(); } catch {} }
              }
              toast('Re-opened for review', { sub: id });
            }} hint="Restore this rejected pair to the review queue for another agent pass">Re-open</window.Btn>;
            // pending / review → show "Validate with agent" + accept/reject quick actions
            return (
              <div style={{ display:'flex', gap: 6, justifyContent:'flex-end' }}>
                <window.Btn variant="ghost" size="sm" onClick={async (e) => {
                  e.stopPropagation();
                  const id = r.canonical_id || r.k;
                  if (window.__arbiterMappingAction) {
                    const res = await window.__arbiterMappingAction(id, 'reject', { note: 'rejected from operator desk' });
                    if (!res.ok) { toast('Reject failed', { sub: res.error, tone: 'error' }); return; }
                    if (window.__arbiterTick) { try { await window.__arbiterTick(); } catch {} }
                  }
                  toast('Mapping rejected', { sub: id });
                }} hint="Mark this pair as not-a-match — removes it from the scanner immediately">Reject</window.Btn>
                <window.Btn variant="secondary" size="sm" icon="◇" hint="Spin up a Claude agent to compare resolution criteria and produce a confidence verdict" onClick={(e) => { e.stopPropagation(); setModal({ kind:'agentValidate', payload: r }); }}>Validate</window.Btn>
              </div>
            );
          }},
        ]} rows={filteredCandidates} onRowClick={(r) => setModal({ kind:'agentValidate', payload: r })} emptyTitle="No mapping candidates" emptyHint={mappingFilter === 'all' ? 'The mapping pipeline will surface candidate cross-platform pairs here for review.' : 'No rows match this mapping filter. Choose another filter or run a discovery pass.'} emptyIcon="⇄"/>
      </window.Card>

      <div style={{ marginTop: 12, padding: '12px 14px', background: t.bgSubtle, border:`1px dashed ${t.border}`, borderRadius: 8, fontSize: 11, color: t.textDim, display:'flex', alignItems:'center', gap: 10 }}>
        <span style={{ width: 6, height: 6, borderRadius:'50%', background: t.accent }}/>
        Click any mapping row to inspect validation history and run a read-only Claude Opus 4.7 verifier pass with every backend step, tool result, metric, and verdict shown.
      </div>
    </div>
  );
}

function PageScanner() {
  const { t, scanner, setScanner, toast } = window.useApp();
  const M = window.MOCK;
  const s = M.health.scanner || {};
  const cfg = (M.settings && M.settings.scanner) || {};
  const activeN = Number(s.active_opportunities || 0) || (Array.isArray(M.opportunities) ? M.opportunities.length : 0);
  const tradableN = Number(s.tradable_opportunities || 0) || (Array.isArray(M.opportunities) ? M.opportunities.filter(o => o.status === 'tradable').length : 0);
  const manualN = Number(s.manual_opportunities || 0);
  const publishedN = Number(s.published || M.health.profitability.published_opportunities || 0);
  const bestEdge = window.bestTelemetryEdge ? window.bestTelemetryEdge(M) : Number(s.best_edge_cents || 0);
  const edgeSamples = window.edgeTelemetrySamples ? window.edgeTelemetrySamples(M) : [];
  const opportunityState = [
    { range:'Active', count: activeN },
    { range:'Tradable', count: tradableN },
    { range:'Manual', count: manualN },
    { range:'Published', count: publishedN },
    { range:'Edge samples', count: edgeSamples.length },
  ];
  return (
    <div style={{ padding: '28px 32px', maxWidth: 1400, margin: '0 auto' }}>
      <window.PageHeader kicker="Real-time" title="Scanner" sub="Continuously polls Kalshi and Polymarket order books, computes net edge, and publishes opportunities crossing the threshold.">
        <window.Btn variant={scanner ? 'danger' : 'accent'} size="sm" hint={scanner ? 'Stop polling order books — opportunities will not refresh until resumed' : 'Resume polling Kalshi + Polymarket for cross-platform edges'} onClick={async () => {
          const next = !scanner;
          if (window.__arbiterScannerControl) {
            const res = await window.__arbiterScannerControl(next ? 'resume' : 'pause');
            if (!res.ok) { toast('Scanner ' + (next ? 'resume' : 'pause') + ' failed', { sub: res.error, tone: 'error' }); return; }
          }
          setScanner(next);
          if (window.__arbiterTick) { try { await window.__arbiterTick(); } catch {} }
        }} icon={scanner ? '⏸' : '▶'}>{scanner ? 'Pause scanner' : 'Resume scanner'}</window.Btn>
      </window.PageHeader>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 18 }}>
        <window.Card padding={18}><window.Stat label="Total scans" value={(s.scan_count || 0).toLocaleString()} sub={`${((M.health.uptime_seconds || 0)/3600).toFixed(1)}h uptime`} mono/></window.Card>
        <window.Card padding={18}><window.Stat label="Avg latency" value={`${s.scan_time_ms || 0}ms`} sub={`${activeN.toLocaleString()} active markets`} mono/></window.Card>
        <window.Card padding={18}><window.Stat label="Published" value={publishedN.toLocaleString()} sub={`${tradableN.toLocaleString()} tradable · best ${bestEdge ? window.fmtC(bestEdge) : '—'}`} tone="green" mono/></window.Card>
        <window.Card padding={18}><window.Stat label="Status" value={scanner ? 'Live' : 'Paused'} tone={scanner ? 'green' : 'amber'} sub={scanner ? 'Heartbeat live' : 'Resume to monitor'} mono/></window.Card>
      </div>

      <window.Card title="Best edge — recent scans" padding={0} style={{ marginBottom: 14 }} action={<span style={{ fontSize: 10.5, color: t.textMuted, fontFamily: window.FONTS.mono }}>{(M.health.scanner.history || []).length} pts</span>}>
        <div style={{ height: 180, padding: 18 }}>
          {(() => {
            const hist = (M.health.scanner.history || []).map((h, i) => ({ t: i, v: h.best_edge_cents || 0 }));
            if (!hist.length) {
              return <div style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'center', color: t.textMuted, fontSize: 12 }}>Awaiting first scan…</div>;
            }
            return <window.AreaChart data={hist} width={1320} height={160} stroke={t.green} grid={t.border} currency={false}/>;
          })()}
        </div>
      </window.Card>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap: 14 }}>
        <window.Card title="Opportunity state" padding={20}>
          <div style={{ height: 200 }}>
            <window.BarChart data={opportunityState} color={t.bgHover} accent={t.accent} labelColor={t.textDim} emptyLabel="No scanner state reported yet."/>
          </div>
        </window.Card>
        <window.Card title="Active scan engine" padding={20}>
          <div style={{ fontFamily: window.FONTS.mono, fontSize: 11, color: t.textDim, lineHeight: 1.7 }}>
            <KV k="Scan interval" v={`${Number(cfg.scan_interval || 0).toFixed(1)}s`}/>
            <KV k="Min edge threshold" v={`${Number(cfg.min_edge_cents || 0).toFixed(2)}¢`}/>
            <KV k="Min volume" v={`${Number(cfg.min_liquidity || s.min_liquidity || 0).toLocaleString()} shares`}/>
            <KV k="Persistence" v={`${Number(cfg.persistence_scans || s.persistence_scans || 0).toLocaleString()} consecutive scans`}/>
            <KV k="Max quote age" v={`${Number(cfg.max_quote_age_seconds || s.max_quote_age_seconds || 0).toFixed(1)}s`}/>
            <KV k="Max position" v={window.fmt$(Number(cfg.max_position_usd || 0))}/>
            <KV k="Slippage budget" v={`${Number(cfg.slippage_tolerance || 0).toFixed(2)}¢`}/>
          </div>
        </window.Card>
      </div>
    </div>
  );
}
function KV({ k, v }) {

      <span style={{ color: t.textDim }}>{k}</span>
      <span style={{ color: t.text, fontWeight: 600 }}>{v}</span>

}

// ── Audit ───────────────────────────────────────────────────────────
function PageAudit() {
  const { t, tradingMode, setTradingMode, setConfirm, toast } = window.useApp();
  const M = window.MOCK;
  const gates = [
    { name: 'Configuration valid', ok: true, detail: 'All required env vars set; API keys reachable.' },
    { name: 'Authentication healthy', ok: true, detail: 'Kalshi token refreshed 8m ago · Polymarket signed via wallet.' },
    { name: 'Profitability verdict', ok: true, detail: `Verdict: profitable · cumulative ${window.fmt$Sign(M.health.profitability.cumulative_pnl)}` },
    { name: 'Reconciliation flags', ok: true, detail: '0 outstanding discrepancies · last run 12s ago.' },
    { name: 'Scanner heartbeat', ok: true, detail: `${M.health.scanner.scan_time_ms}ms p50 · last scan 1s ago.` },
    { name: 'Audit score', ok: true, detail: `${(M.health.audit.audit_score * 100).toFixed(2)}% above 99% threshold.` },
    { name: 'Kill switch armed', ok: true, detail: 'Manual override available · automatic halt on flag count > 5.' },
  ];
  const readinessGates = M.health.readiness.gates || gates.length;
  const readinessPassing = M.health.readiness.passing || (M.health.readiness.ready ? readinessGates : gates.filter(g => g.ok).length);

  return (
    <div style={{ padding: '28px 32px', maxWidth: 1400, margin: '0 auto' }}>
      <window.PageHeader kicker="System integrity" title="Audit & Readiness" sub={`Live trading is gated behind ${readinessGates} health checks. Failure of any blocking gate forces standby mode.`}/>

      <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 28, marginBottom: 18, display:'flex', alignItems:'center', gap: 24 }}>
        <div style={{ width: 96, height: 96, borderRadius: '50%', background: t.greenSoft, border: `3px solid ${t.green}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink: 0 }}>
          <div style={{ fontSize: 36, fontWeight: 600, color: t.green, fontFamily: window.FONTS.mono }}>✓</div>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 4 }}>Status</div>
          <div style={{ fontSize: 24, fontWeight: 600, color: t.text, marginBottom: 4 }}>Live trading authorized</div>
          <div style={{ fontSize: 13, color: t.textDim }}>{readinessPassing}/{readinessGates} readiness gates passing · audit score {(M.health.audit.audit_score * 100).toFixed(2)}% · uptime {(M.health.uptime_seconds/3600).toFixed(1)}h</div>
        </div>
        <window.Btn variant="danger" size="md" hint="Emergency halt — stops scanner, cancels open orders, locks trading. Requires manual re-arm." onClick={() => setConfirm({
          title: 'Engage kill switch?',
          body: 'Halts the scanner, cancels all open orders, and locks trading until manually re-armed.',
          tone: 'danger',
          confirmLabel: 'Engage',
          onConfirm: async () => {
            const reason = (window.prompt('Reason for arming kill switch?') || '').trim();
            if (!reason) { toast('Cancelled — reason required', { tone: 'error' }); return; }
            if (window.__arbiterKillSwitch) {
              const res = await window.__arbiterKillSwitch(true, { reason });
              if (!res.ok) { toast('Kill switch failed', { sub: res.error, tone: 'error' }); return; }
            }
            setTradingMode('killed');
            toast('Kill switch engaged · trading halted', { tone: 'error' });
            if (window.__arbiterTick) { try { await window.__arbiterTick(); } catch {} }
          },
        })}>⏹ Engage kill switch</window.Btn>
      </div>

      <window.Card title="Readiness gates" padding={0}>
        {gates.map((g, i) => (
          <div key={i} style={{ padding: '16px 22px', borderBottom: i < gates.length - 1 ? `1px solid ${t.border}` : 'none', display:'flex', alignItems:'center', gap: 16 }}>
            <div style={{ width: 28, height: 28, borderRadius:'50%', background: g.ok ? t.greenSoft : t.redSoft, color: g.ok ? t.green : t.red, display:'flex', alignItems:'center', justifyContent:'center', fontSize: 14, fontWeight: 700, flexShrink: 0 }}>{g.ok ? '✓' : '✕'}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, color: t.text, fontWeight: 500, marginBottom: 2 }}>{g.name}</div>
              <div style={{ fontSize: 11.5, color: t.textDim }}>{g.detail}</div>
            </div>
            <window.StatusBadge status={g.ok ? 'pass' : 'fail'}/>
          </div>
        ))}
      </window.Card>
    </div>
  );
}

  return (
    <Shell width={560}>
      <div style={{ padding: '20px 24px', borderBottom: `1px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 3 }}>Execute arbitrage</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: t.text }}>{o.description}</div>
        </div>
        <button onClick={() => setModal(null)} style={{ background:'none', border:'none', color: t.textMuted, fontSize: 20, cursor:'pointer' }}>✕</button>
      </div>

      {stage === 'confirm' && (
        <>
          <div style={{ padding: 24 }}>
            <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 10 }}>QUANTITY</div>
            <div style={{ display:'flex', alignItems:'center', gap: 12, marginBottom: 24 }}>
              <input type="range" min="10" max="500" step="10" value={qty} onChange={e => setQty(+e.target.value)} style={{ flex: 1, accentColor: t.accent }}/>
              <div style={{ width: 100, padding: '8px 12px', background: t.bgSubtle, border: `1px solid ${t.border}`, borderRadius: 7, fontFamily: window.FONTS.mono, fontSize: 14, fontWeight: 600, color: t.text, textAlign:'center' }}>{qty} pairs</div>
            </div>

            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap: 12, marginBottom: 20 }}>
              <ConfirmLeg side="YES" platform={o.yes_platform} price={o.yes_price} qty={qty}/>
              <ConfirmLeg side="NO" platform={o.no_platform} price={o.no_price} qty={qty}/>
            </div>

            <div style={{ background: t.bgSubtle, borderRadius: 10, padding: 16, fontFamily: window.FONTS.mono, fontSize: 12.5, color: t.text }}>
              <Row k="Total cost" v={`−${window.fmt$(cost, 2)}`}/>
              <Row k="Fees" v={`−${window.fmt$(fees, 4)}`}/>
              <Row k="Guaranteed payout" v={`+${window.fmt$(qty, 2)}`}/>
              <div style={{ borderTop: `1px solid ${t.border}`, margin: '8px 0' }}/>
              <Row k="Net profit" v={`+${window.fmt$(profit, 4)}`} bold positive/>
            </div>
          </div>
          <div style={{ padding: '16px 24px', borderTop: `1px solid ${t.border}`, background: t.bgSubtle, display:'flex', alignItems:'center', gap: 8 }}>
            <span style={{ fontSize: 11, color: t.textDim }}>⚡ Both legs submitted atomically. Auto-recovery on partial fill.</span>
            <div style={{ flex: 1 }}/>
            <window.Btn variant="ghost" onClick={() => setModal(null)}>Cancel</window.Btn>
            <window.Btn variant="primary" onClick={submit} icon="→" hint="Place YES + NO orders atomically — partial fills will trigger auto-recovery">Submit trade</window.Btn>
          </div>
        </>
      )}

      {stage === 'submitting' && (
        <div style={{ padding: '60px 24px', textAlign:'center' }}>
          <div style={{ width: 50, height: 50, margin: '0 auto 18px', border: `3px solid ${t.border}`, borderTopColor: t.accent, borderRadius:'50%', animation: 'spin 0.8s linear infinite' }}/>
          <div style={{ fontSize: 15, fontWeight: 600, color: t.text, marginBottom: 6 }}>Submitting both legs…</div>
          <div style={{ fontSize: 12, color: t.textDim, fontFamily: window.FONTS.mono }}>YES → {o.yes_platform}  ·  NO → {o.no_platform}</div>
        </div>
      )}

      {stage === 'filled' && (
        <div style={{ padding: '40px 32px', textAlign:'center' }}>
          <div style={{ width: 60, height: 60, margin: '0 auto 16px', borderRadius:'50%', background: t.greenSoft, color: t.green, display:'flex', alignItems:'center', justifyContent:'center', fontSize: 28 }}>✓</div>
          <div style={{ fontSize: 18, fontWeight: 600, color: t.text, marginBottom: 4 }}>Trade filled</div>
          <div style={{ fontSize: 13, color: t.textDim, marginBottom: 24 }}>ARB-09422 · both legs settled within tolerance</div>
          <div style={{ display:'inline-block', padding: 16, background: t.greenSoft, borderRadius: 10, fontFamily: window.FONTS.mono, fontSize: 13, color: t.green, fontWeight: 600 }}>+{window.fmt$(profit, 4)} realized</div>
          <div style={{ marginTop: 28, display:'flex', gap: 8, justifyContent:'center' }}>
            <window.Btn variant="secondary" onClick={() => setModal(null)}>Close</window.Btn>

}

function ConfirmLeg({ side, platform, price, qty }) {
  const { t } = window.useApp();
  return (
    <div style={{ border: `1px solid ${t.border}`, borderRadius: 10, padding: 14 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 8 }}>

}

function Row({ k, v, bold, positive }) {
  const { t } = window.useApp();
  return (
    <div style={{ display:'flex', justifyContent:'space-between', padding: '3px 0', fontWeight: bold ? 700 : 400 }}>
      <span style={{ color: t.textDim }}>{k}</span>
