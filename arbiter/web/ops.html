}

// ── Trade detail ────────────────────────────────────────────────────
function TradeDetailModal() {
  const { t, modal, setModal, toast } = window.useApp();
  const r = modal.payload;
  const expectedProfit = Number(r.expected_profit || r.opportunity?.max_profit_usd || 0);
  const realizedPnl = Number(r.realized_pnl || 0);
  const expectedDelta = Number(r.expected_vs_realized ?? (realizedPnl - expectedProfit));
  const netEdgeCents = Number(r.opportunity?.net_edge_cents || 0);
  const persistence = Number(r.opportunity?.persistence_scans || r.opportunity?.persistence_count || 0);
  const totalNotional = Number(r.expected_cost || ((r.leg_yes.quantity || r.leg_yes.fill_qty || 0) * (r.leg_yes.price || r.leg_yes.fill_price || 0)) + ((r.leg_no.quantity || r.leg_no.fill_qty || 0) * (r.leg_no.price || r.leg_no.fill_price || 0)));
  // Lazy-load the analysis post-mortem from /api/executions/{arb_id}/analysis.
  // The endpoint serves persisted markdown when available, or generates it
  // on the fly from the DB so this works for trades from before the feature
  // shipped. We render the raw markdown in a monospace block — readable and
  // free of any runtime markdown-to-HTML library dependency.
  const [analysisMd, setAnalysisMd] = React.useState(r.analysis_md || '');
  const [analysisLoading, setAnalysisLoading] = React.useState(!r.analysis_md);
  const [analysisError, setAnalysisError] = React.useState('');
  React.useEffect(() => {
    if (!r || !r.arb_id) return;
    if (r.analysis_md) { setAnalysisMd(r.analysis_md); setAnalysisLoading(false); return; }
    let cancelled = false;
    setAnalysisLoading(true); setAnalysisError('');
    fetch(`/api/executions/${encodeURIComponent(r.arb_id)}/analysis`)
      .then(resp => resp.json().then(d => ({ ok: resp.ok, d })))
      .then(({ ok, d }) => {
        if (cancelled) return;
        if (ok && d && d.analysis_md) setAnalysisMd(d.analysis_md);
        else setAnalysisError((d && d.error) || 'no analysis available');
      })
      .catch(e => { if (!cancelled) setAnalysisError(String(e && e.message || e)); })
      .finally(() => { if (!cancelled) setAnalysisLoading(false); });
    return () => { cancelled = true; };
  }, [r && r.arb_id]);
  const tl = [
    { ok: true, label: 'Opportunity detected', t: 'T+0.000s', detail: `Net edge ${window.fmtC(netEdgeCents)} · ${persistence || '—'} persistence scans · expected ${window.fmt$Sign(expectedProfit)}` },
    { ok: true, label: 'Risk gates passed', t: 'T+0.012s', detail: '7/7 gates · auto-execute armed' },
    { ok: r.leg_yes.status === 'filled' || r.leg_yes.status === 'submitted', label: `YES leg → ${r.opportunity.yes_platform}`, t: 'T+0.032s', detail: `${r.leg_yes.fill_qty} @ $${r.leg_yes.fill_price.toFixed(2)} · ${r.leg_yes.status}` },
    { ok: r.leg_no.status === 'filled' || r.leg_no.status === 'submitted', label: `NO leg → ${r.opportunity.no_platform}`, t: 'T+0.041s', detail: `${r.leg_no.fill_qty} @ $${r.leg_no.fill_price.toFixed(2)} · ${r.leg_no.status}` },
    { ok: r.status === 'filled' || r.status === 'closed', label: 'Reconciled', t: 'T+1.840s', detail: (r.status === 'filled' || r.status === 'closed') ? `Trade closed · actual P&L ${window.fmt$Sign(realizedPnl)} · delta ${window.fmt$Sign(expectedDelta)}` : r.status === 'recovering' ? 'Recovery flow in progress' : 'Failed leg refunded' },
  ];

  return (
    <Shell width={620}>
      <div style={{ padding: '20px 24px', borderBottom: `1px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ display:'flex', alignItems:'center', gap: 10, marginBottom: 4 }}>
            <span style={{ fontFamily: window.FONTS.mono, fontSize: 13, fontWeight: 700, color: t.text }}>{r.arb_id}</span>
            <window.StatusBadge status={r.status}/>
          </div>
          <div style={{ fontSize: 13, color: t.textDim }}>{r.opportunity.description}</div>
        </div>
        <button onClick={() => setModal(null)} style={{ background:'none', border:'none', color: t.textMuted, fontSize: 20, cursor:'pointer' }}>✕</button>
      </div>

      <div style={{ padding: 24, overflow:'auto' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap: 12, marginBottom: 24 }}>
          <Tile label="Expected profit" value={window.fmt$Sign(expectedProfit)} tone={expectedProfit >= 0 ? 'green' : 'red'}/>
          <Tile label="Actual P&L" value={window.fmt$Sign(realizedPnl)} tone={realizedPnl >= 0 ? 'green' : 'red'}/>
          <Tile label="Delta vs expected" value={window.fmt$Sign(expectedDelta)} tone={expectedDelta >= 0 ? 'green' : 'red'}/>
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap: 12, marginBottom: 24 }}>
          <Tile label="Submitted" value={window.tsTime(r.timestamp)} sub={window.tsDate(r.timestamp)}/>
          <Tile label="Expected notional" value={window.fmt$(totalNotional)}/>
          <Tile label="Status group" value={r.status_group || r.status}/>
        </div>

        <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 12 }}>EXECUTION TIMELINE</div>
        <div style={{ position:'relative' }}>
          {tl.map((step, i) => (
            <div key={i} style={{ display:'flex', gap: 14, paddingBottom: 18, position:'relative' }}>
              {i < tl.length - 1 && <div style={{ position:'absolute', left: 9, top: 22, bottom: 0, width: 2, background: t.border }}/>}
              <div style={{ width: 20, height: 20, borderRadius:'50%', background: step.ok ? t.green : t.red, color: '#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize: 11, fontWeight: 700, flexShrink: 0, zIndex: 1 }}>{step.ok ? '✓' : '✕'}</div>
              <div style={{ flex: 1, paddingTop: 0 }}>
                <div style={{ display:'flex', alignItems:'center', gap: 10, marginBottom: 2 }}>
                  <span style={{ fontSize: 13, color: t.text, fontWeight: 500 }}>{step.label}</span>
                  <span style={{ fontSize: 10.5, color: t.textMuted, fontFamily: window.FONTS.mono, marginLeft:'auto' }}>{step.t}</span>
                </div>
                <div style={{ fontSize: 11.5, color: t.textDim, fontFamily: window.FONTS.mono }}>{step.detail}</div>
              </div>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 28, fontSize: 11, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 12 }}>TRADE FAILURE / SUCCESS ANALYSIS</div>
        <div style={{ background: t.bgSubtle, border: `1px solid ${t.border}`, borderRadius: 8, padding: 16, fontFamily: window.FONTS.mono, fontSize: 12, lineHeight: 1.55, color: t.text, whiteSpace: 'pre-wrap', wordBreak: 'break-word', maxHeight: 480, overflowY: 'auto' }}>
          {analysisLoading
            ? <span style={{ color: t.textMuted }}>generating analysis…</span>
            : analysisError
              ? <span style={{ color: t.red }}>could not load analysis: {analysisError}</span>
              : (analysisMd || <span style={{ color: t.textMuted }}>no analysis available for this arb yet — backfill or wait for the next terminal write.</span>)}
        </div>
      </div>

      <div style={{ padding: '14px 24px', borderTop: `1px solid ${t.border}`, background: t.bgSubtle, display:'flex', justifyContent:'flex-end', gap: 8 }}>
        <window.Btn variant="ghost" size="sm" hint="Copy the arb_id to clipboard — paste into logs/Slack to look up this trade" onClick={() => { navigator.clipboard?.writeText(r.arb_id).catch(()=>{}); toast('Trade ID copied', { sub: r.arb_id }); }}>Copy ID</window.Btn>
        <window.Btn variant="secondary" size="sm" hint="Open the full trade record (legs, fills, fees, incidents) as raw JSON in a new tab" onClick={() => { try { const json = JSON.stringify(r, null, 2); const w = window.open('', '_blank'); if (w) { w.document.write('<pre style="font-family:ui-monospace,monospace;font-size:12px;padding:16px;">' + json.replace(/[<>&]/g, s => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[s])) + '</pre>'); w.document.title = r.arb_id + ' · raw JSON'; } else { toast('Pop-up blocked'); } } catch { toast('Could not open JSON view'); } }}>View raw JSON</window.Btn>
      </div>
    </Shell>
  );
}

function Tile({ label, value, sub, tone }) {
  const { t } = window.useApp();
  const tones = { green: t.green, red: t.red };
  return (
    <div style={{ background: t.bgSubtle, padding: 14, borderRadius: 8 }}>
      <div style={{ fontSize: 10, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 16, fontWeight: 600, color: tones[tone] || t.text, fontFamily: window.FONTS.mono }}>{value}</div>
      {sub && <div style={{ fontSize: 10.5, color: t.textMuted, marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

// ── Deposit ─────────────────────────────────────────────────────────
function DepositModal() {
  const { t, modal, setModal, toast } = window.useApp();
  const platform = modal.payload;
  const [amount, setAmount] = mUseState(100);
  const [stage, setStage] = mUseState('input'); // input | submitting | done

  const onSubmit = async () => {
    if (!Number.isFinite(amount) || amount === 0) {
      toast('Enter a non-zero amount', { tone: 'error' });
      return;
    }
    setStage('submitting');
    if (window.__arbiterDeposit) {
      const res = await window.__arbiterDeposit({ platform, amount });
      if (!res.ok) {
        toast('Deposit failed: ' + (res.error || 'unknown'), { tone: 'error' });
        setStage('input');
        return;
      }
      // Refresh balances + pnl + deposits so the modal closes onto fresh data.
      if (window.__arbiterTick) { try { await window.__arbiterTick(); } catch {} }
    }
    setStage('done');
  };

  return (
    <Shell width={460}>
      <div style={{ padding: '20px 24px', borderBottom: `1px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ display:'flex', alignItems:'center', gap: 10 }}>
          <window.PlatformChip name={platform}/>
          <div style={{ fontSize: 16, fontWeight: 600, color: t.text }}>Deposit funds</div>
        </div>
        <button onClick={() => setModal(null)} style={{ background:'none', border:'none', color: t.textMuted, fontSize: 20, cursor:'pointer' }}>✕</button>
      </div>

      {stage === 'input' && (
        <>
          <div style={{ padding: 24 }}>
            <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 10 }}>AMOUNT (USD)</div>
            <div style={{ display:'flex', alignItems:'center', background: t.bgSubtle, border: `1px solid ${t.border}`, borderRadius: 9, padding: '4px 14px', marginBottom: 12 }}>
              <span style={{ fontSize: 24, color: t.textDim, fontFamily: window.FONTS.mono }}>$</span>
              <input type="number" value={amount} onChange={e => setAmount(+e.target.value)} style={{ flex: 1, padding: '12px 8px', background:'transparent', border:'none', outline:'none', fontSize: 28, fontWeight: 600, color: t.text, fontFamily: window.FONTS.mono }}/>
            </div>
            <div style={{ display:'flex', gap: 6, marginBottom: 20 }}>
              {[50, 100, 250, 500, 1000].map(v => (
                <button key={v} onClick={() => setAmount(v)} style={{ flex: 1, padding: '6px 8px', background: amount === v ? t.bgSubtle : t.bgCard, border: `1px solid ${t.border}`, borderRadius: 6, fontSize: 11.5, color: amount === v ? t.text : t.textDim, fontWeight: 500, cursor:'pointer', fontFamily: window.FONTS.mono }}>${v}</button>
              ))}
            </div>
            <div style={{ background: t.bgSubtle, borderRadius: 8, padding: 14, fontSize: 11.5, color: t.textDim, lineHeight: 1.55 }}>
              {platform === 'kalshi' ? 'ACH transfer · 1–2 business days · no fee.' : 'USDC bridge · settles in ~30s · 0.05% fee on chain.'}
            </div>
          </div>
          <div style={{ padding: '14px 24px', borderTop: `1px solid ${t.border}`, display:'flex', gap: 8, justifyContent:'flex-end' }}>
            <window.Btn variant="ghost" onClick={() => setModal(null)}>Cancel</window.Btn>
            <window.Btn variant="primary" icon="↓" onClick={onSubmit}>Deposit ${amount}</window.Btn>
          </div>
        </>
      )}

      {stage === 'submitting' && (
        <div style={{ padding: '40px 24px', textAlign:'center' }}>
          <div style={{ width: 48, height: 48, margin: '0 auto 14px', border: `3px solid ${t.border}`, borderTopColor: t.accent, borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}/>
          <div style={{ fontSize: 14, fontWeight: 600, color: t.text, marginBottom: 4 }}>Recording deposit…</div>
          <div style={{ fontSize: 12, color: t.textDim, fontFamily: window.FONTS.mono }}>${Number(amount).toFixed(2)} → {platform}</div>
        </div>
      )}

      {stage === 'done' && (
        <div style={{ padding: '40px 24px', textAlign:'center' }}>
          <div style={{ width: 56, height: 56, margin: '0 auto 14px', borderRadius:'50%', background: t.greenSoft, color: t.green, display:'flex', alignItems:'center', justifyContent:'center', fontSize: 24 }}>✓</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: t.text, marginBottom: 4 }}>Deposit initiated</div>
          <div style={{ fontSize: 12, color: t.textDim, marginBottom: 20, fontFamily: window.FONTS.mono }}>${amount.toFixed(2)} → {platform}</div>
          <window.Btn variant="primary" onClick={() => setModal(null)}>Done</window.Btn>
        </div>
      )}
    </Shell>
  );
}

window.Modal = Modal;

</script>
<script type="text/babel" data-presets="env,react" data-filename="actions.jsx">
// Toast system, confirm dialogs, popovers, extra modals (withdraw, market detail,
// new mapping, edit setting, user menu, notification detail).

const { useState: aUseS, useEffect: aUseE, useRef: aUseR } = React;

// ── Toast host ────────────────────────────────────────────────────
function ToastHost() {
  const { t, toasts } = window.useApp();
  if (!toasts || !toasts.length) return null;
  return (
    <div style={{ position:'fixed', bottom: 24, left: '50%', transform:'translateX(-50%)', zIndex: 300, display:'flex', flexDirection:'column', gap: 8, alignItems:'center', pointerEvents:'none' }}>
      {toasts.map(tt => (
        <div key={tt.id} style={{
          minWidth: 280, maxWidth: 440, padding: '11px 16px',
          background: t.text, color: t.bgCard, borderRadius: 10,
          boxShadow: t.shadowLg, fontSize: 12.5, fontWeight: 500,
          display:'flex', alignItems:'center', gap: 10,
          animation: 'toastIn 0.2s ease-out',
        }}>
          <span style={{
            width: 18, height: 18, borderRadius: '50%',
            background: tt.tone === 'error' ? t.red : tt.tone === 'warn' ? t.amber : t.green,
            color: '#fff', fontSize: 11, fontWeight: 700,
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink: 0,
          }}>{tt.tone === 'error' ? '✕' : tt.tone === 'warn' ? '!' : '✓'}</span>
          <span style={{ flex: 1 }}>{tt.msg}</span>
          {tt.sub && <span style={{ opacity: 0.6, fontSize: 11, fontFamily: window.FONTS.mono }}>{tt.sub}</span>}
        </div>
      ))}
    </div>
  );
}

// ── Confirm dialog ────────────────────────────────────────────────
function ConfirmDialog() {
  const { t, confirm, setConfirm } = window.useApp();
  if (!confirm) return null;
  const c = confirm;
  return (
    <div onClick={() => setConfirm(null)} style={{ position:'fixed', inset: 0, background: t.overlay, zIndex: 96, display:'flex', justifyContent:'center', alignItems:'center', padding: 40 }}>
      <div onClick={e => e.stopPropagation()} style={{ width: 440, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, boxShadow: t.shadowLg, overflow:'hidden' }}>
        <div style={{ padding: 22, display:'flex', gap: 14 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 9, flexShrink: 0,
            background: c.tone === 'danger' ? t.redSoft : t.amberSoft,
            color: c.tone === 'danger' ? t.red : t.amber,
            display:'flex', alignItems:'center', justifyContent:'center', fontSize: 16, fontWeight: 700,
          }}>{c.tone === 'danger' ? '!' : '?'}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: t.text, marginBottom: 6 }}>{c.title}</div>
            <div style={{ fontSize: 12.5, color: t.textDim, lineHeight: 1.5 }}>{c.body}</div>
          </div>
        </div>
        <div style={{ padding: '12px 22px', background: t.bgSubtle, borderTop: `1px solid ${t.border}`, display:'flex', justifyContent:'flex-end', gap: 8 }}>
          <window.Btn variant="ghost" size="sm" onClick={() => setConfirm(null)}>{c.cancelLabel || 'Cancel'}</window.Btn>
          <window.Btn variant={c.tone === 'danger' ? 'danger' : 'primary'} size="sm" onClick={() => { c.onConfirm?.(); setConfirm(null); }}>{c.confirmLabel || 'Confirm'}</window.Btn>
        </div>
      </div>
    </div>
  );
}

// ── Extra modal router ────────────────────────────────────────────
function ExtraModal() {
  const { modal } = window.useApp();
  if (!modal) return null;
  if (modal.kind === 'withdraw') return <WithdrawModal/>;
  if (modal.kind === 'market') return <MarketDetailModal/>;
  if (modal.kind === 'newMapping') return <NewMappingModal/>;
  if (modal.kind === 'editSetting') return <EditSettingModal/>;
  if (modal.kind === 'apiKey') return <ApiKeyModal/>;
  if (modal.kind === 'team') return <TeamModal/>;
  if (modal.kind === 'billing') return <BillingModal/>;
  if (modal.kind === 'notifPrefs') return <NotifPrefsModal/>;
  if (modal.kind === 'notification') return <NotificationModal/>;
  if (modal.kind === 'export') return <ExportModal/>;
  if (modal.kind === 'filter') return <FilterModal/>;
  if (modal.kind === 'profile') return <ProfileModal/>;
  return null;
}

function Shell({ children, width = 480 }) {
  const { t, setModal } = window.useApp();

  const activeOpp = o.live || (Array.isArray(M.opportunities) ? M.opportunities.find(x => x.canonical_id === canonical) : null);

  aUseE(() => {
    let cancelled = false;
    if (!canonical || !window.__arbiterLivePrices) return undefined;
    setLoading(true);
    setError('');
    window.__arbiterLivePrices(canonical).then((res) => {
      if (cancelled) return;
      if (res.ok) setLive(res.data);
      else setError(res.error || 'live price fetch failed');
    }).catch((e) => {
      if (!cancelled) setError(String(e));
    }).finally(() => {
      if (!cancelled) setLoading(false);

    return () => { cancelled = true; };

          <PriceBox platform="polymarket" side="YES" price={polyPrice?.yes_price ?? (activeOpp?.yes_platform === 'polymarket' ? activeOpp.yes_price : null)} fee={polyPrice?.fee_rate ?? (activeOpp?.yes_platform === 'polymarket' ? activeOpp.yes_fee_rate : activeOpp?.no_platform === 'polymarket' ? activeOpp.no_fee_rate : null)} vol={polyPrice?.volume ?? activeOpp?.min_available_liquidity} age={polyPrice?.age_seconds}/>
        </div>
        <div style={{ background: t.bgSubtle, borderRadius: 10, padding: 16, fontFamily: window.FONTS.mono, fontSize: 12.5, marginBottom: 14 }}>
          {loading && <Row k="Live quote" v="Fetching fresh prices..."/>}
          {!loading && error && <Row k="Live quote" v={error}/>}
          <Row k="Criteria match" v={criteriaStatus} bold tone={criteriaStatus === 'identical' ? 'green' : criteriaStatus === 'divergent' ? 'red' : 'amber'}/>

// ── Edit setting (slider/value editor) ───────────────────────────
// Accepts two payload shapes:
//   desktop: { key, label, kind, min, max, step, unit, desc, options:[string] }
//   mobile:  { key, label, kind, min, max, step, value, prefix, onSave, options:[{v,l}] }
// Source of truth for the initial value is settings[cfg.key] when present,
// otherwise cfg.value. On save, both setSettings and cfg.onSave are called.
function EditSettingModal() {
  const { t, modal, setModal, settings, setSettings, toast } = window.useApp();
  const cfg = modal.payload;
  const initial = settings[cfg.key] !== undefined ? settings[cfg.key] : cfg.value;
  const [v, setV] = aUseS(initial);
  const unit = cfg.unit || '';
  const prefix = cfg.prefix || '';
  // Normalize options to {v, l} so both shapes render identically.
  const normOptions = (cfg.options || []).map(o => (typeof o === 'object' && o !== null ? o : { v: o, l: o }));
  return (
    <Shell width={460}>
      <Header kicker="Edit setting" title={cfg.label}/>
      <div style={{ padding: 24 }}>
        {cfg.desc && <div style={{ fontSize: 11.5, color: t.textDim, marginBottom: 18, lineHeight: 1.5 }}>{cfg.desc}</div>}
        {cfg.kind === 'slider' && (
          <>
            <div style={{ display:'flex', alignItems:'center', gap: 12, marginBottom: 12, flexWrap:'wrap' }}>
              <input type="range" min={cfg.min} max={cfg.max} step={cfg.step} value={v ?? cfg.min} onChange={e => setV(+e.target.value)} style={{ flex: 1, minWidth: 140, accentColor: t.accent }}/>
              <div style={{ minWidth: 110, padding: '8px 12px', background: t.bgSubtle, border: `1px solid ${t.border}`, borderRadius: 7, fontFamily: window.FONTS.mono, fontSize: 14, fontWeight: 600, color: t.text, textAlign:'center' }}>{prefix}{v ?? cfg.min}{unit}</div>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize: 10.5, color: t.textMuted, fontFamily: window.FONTS.mono }}>
              <span>{prefix}{cfg.min}{unit}</span><span>{prefix}{cfg.max}{unit}</span>
            </div>
          </>
        )}
        {cfg.kind === 'toggle' && (
          <div style={{ display:'flex', gap: 8 }}>
            {['on','off'].map(opt => (
              <button key={opt} onClick={() => setV(opt)} style={{ flex: 1, padding: '14px', background: v === opt ? t.bgSubtle : t.bgCard, border: `1.5px solid ${v === opt ? t.text : t.border}`, borderRadius: 8, fontSize: 13, color: t.text, fontWeight: 600, cursor:'pointer', textTransform:'uppercase' }}>{opt}</button>
            ))}
          </div>
        )}
        {cfg.kind === 'options' && (
          <div style={{ display:'flex', flexDirection:'column', gap: 6 }}>
            {normOptions.map(opt => (
              <button key={String(opt.v)} onClick={() => setV(opt.v)} style={{ padding: '12px 14px', background: v === opt.v ? t.bgSubtle : t.bgCard, border: `1px solid ${v === opt.v ? t.text : t.border}`, borderRadius: 7, fontSize: 12.5, color: t.text, fontWeight: 500, cursor:'pointer', textAlign:'left' }}>{opt.l}</button>
            ))}
          </div>
        )}
      </div>
      <Footer>
        <window.Btn variant="ghost" size="sm" onClick={() => setModal(null)}>Cancel</window.Btn>
        <window.Btn variant="primary" size="sm" onClick={async () => {
          // Map UI setting key to backend nested payload, then POST.
          const patch = window.__arbiterSettingsPatch?.(cfg.key, v);
          if (patch && window.__arbiterUpdateSettings) {
            const res = await window.__arbiterUpdateSettings(patch);
            if (!res.ok) {
              toast(`Failed to save ${cfg.label}`, { sub: res.error, tone: 'error' });
              return;
            }
            if (window.__arbiterTick) { try { await window.__arbiterTick(); } catch {} }
          }
          setSettings(s => ({ ...s, [cfg.key]: v }));
          cfg.onSave?.(v);
          setModal(null);
          toast(`${cfg.label} updated`, { sub: `${prefix}${v}${unit}` });
        }}>Save</window.Btn>
      </Footer>
    </Shell>
  );
}

<script type="text/babel" data-presets="env,react" data-filename="agent-validate.jsx">
// ─────────────────────────────────────────────────────────────────────
// AgentValidateModal — row-level mapping validation telemetry.
// Loads real audit/discovery/session history from the backend and can run a
// read-only Claude Opus 4.7 verifier pass for the selected candidate.
// ─────────────────────────────────────────────────────────────────────

const { useState: aVUseState, useEffect: aVUseEffect, useRef: aVUseRef } = React;

function useIsMobile(breakpoint = 560) {
  const [m, setM] = aVUseState(() => {
    if (typeof window === 'undefined') return false;
    // Detect by parent artboard width (iOS frame is ~390) — use the modal's host element
    return window.innerWidth < breakpoint;
  });
  aVUseEffect(() => {
    const onR = () => setM(window.innerWidth < breakpoint);
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, [breakpoint]);
  return m;
}

// The modal renders inside whichever artboard it's invoked from (mobile or
// desktop). It detects its OWN container width via a ref — not the global
// viewport — so a desktop-sized canvas with multiple artboards still picks
// the right layout per artboard.
function AgentValidateModal() {
  const { t, modal, setModal, toast, setConfirm } = window.useApp();
  const overlayRef = aVUseRef(null);
  const [isMobile, setIsMobile] = aVUseState(false);
  aVUseEffect(() => {
    if (!overlayRef.current) return;
    const measure = () => {
      const r = overlayRef.current?.getBoundingClientRect();
      if (r) setIsMobile(r.width < 560);
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(overlayRef.current);
    return () => ro.disconnect();
  }, [modal]);
  if (!modal || modal.kind !== 'agentValidate') return null;
  const candidate = modal.payload;
  const applyVerdict = (v) => {
    const id = candidate.canonical_id || candidate.id || candidate.k;
    const verdict = String((v && v.verdict) || 'review');
    const action = verdict === 'confirm' ? 'confirm' : verdict === 'reject' ? 'reject' : 'review';
    setConfirm({
      title: action === 'confirm' ? 'Confirm mapping?' : action === 'reject' ? 'Reject mapping?' : 'Keep for review?',
      body: 'This applies the validation verdict to the mapping row. Auto-trade still requires a separate identical-resolution gate.',
      tone: action === 'reject' ? 'danger' : 'primary',
      confirmLabel: action === 'confirm' ? 'Confirm mapping' : action === 'reject' ? 'Reject mapping' : 'Keep review',
      onConfirm: async () => {
        if (!window.__arbiterMappingAction) {
          toast('Mapping action API unavailable', { tone:'error' });
          return;
        }
        const res = await window.__arbiterMappingAction(id, action, { note: `Applied ${verdict} from validation pane` });
        if (!res.ok) {
          toast('Mapping update failed', { sub: res.error, tone:'error' });
          return;
        }
        if (window.__arbiterTick) { try { await window.__arbiterTick(); } catch {} }
        setModal(null);
        toast(`Mapping ${action === 'review' ? 'kept for review' : action + 'ed'}`, { sub: `${candidate.k} ⇄ ${candidate.p}` });
      },
    });
  };
  return (
    <div ref={overlayRef} onClick={() => setModal(null)} style={{ position:'fixed', inset: 0, background: t.overlay, zIndex: 96, display:'flex', justifyContent:'center', alignItems: isMobile ? 'stretch' : 'center', padding: isMobile ? 0 : 24 }}>
      <div onClick={e => e.stopPropagation()} style={{ width: isMobile ? '100%' : 820, maxWidth: '100%', height: isMobile ? '100%' : 'auto', maxHeight: isMobile ? '100%' : '88vh', background: t.bgCard, border: isMobile ? 'none' : `1px solid ${t.border}`, borderRadius: isMobile ? 0 : 14, boxShadow: isMobile ? 'none' : t.shadowLg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <AgentValidateHeader candidate={candidate} onClose={() => setModal(null)} mobile={isMobile}/>
        <AgentSession candidate={candidate} mobile={isMobile} onAccept={applyVerdict}/>
      </div>
    </div>
  );
}

function AgentValidateHeader({ candidate, onClose, mobile }) {
  const { t } = window.useApp();
  return (
    <div style={{ padding: mobile ? '14px 16px 12px' : '18px 24px', borderBottom: `1px solid ${t.border}`, display:'flex', alignItems: mobile ? 'flex-start' : 'center', justifyContent:'space-between', gap: 12, flexShrink: 0 }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display:'flex', alignItems:'center', gap: 6, marginBottom: 4 }}>
          <span style={{ width: 7, height: 7, borderRadius:'50%', background: t.green, animation:'pulse 1.4s infinite', flexShrink: 0 }}/>
          <span style={{ fontSize: mobile ? 9.5 : 11, color: t.textMuted, letterSpacing:'0.08em', textTransform:'uppercase', fontWeight: 600 }}>Live verifier · Claude Opus 4.7</span>
        </div>
        <div style={{ fontSize: mobile ? 14 : 16, fontWeight: 600, color: t.text, letterSpacing:'-0.01em' }}>Validating mapping</div>
        <div style={{ fontSize: mobile ? 10 : 11.5, color: t.textDim, marginTop: 3, fontFamily: window.FONTS.mono, lineHeight: 1.4, wordBreak:'break-all' }}>{mobile ? <><div>{candidate.k}</div><div style={{ color: t.textMuted, fontSize: 9 }}>⇅</div><div>{candidate.p}</div></> : <>{candidate.k} ⇄ {candidate.p}</>}</div>
      </div>
      <button onClick={onClose} aria-label="Close" style={{ background: mobile ? t.bgSubtle : 'none', border:'none', color: t.text, fontSize: mobile ? 16 : 20, cursor:'pointer', padding: mobile ? 0 : 4, width: mobile ? 32 : 'auto', height: mobile ? 32 : 'auto', borderRadius: mobile ? 8 : 0, display:'flex', alignItems:'center', justifyContent:'center', flexShrink: 0 }}>✕</button>
    </div>
  );
}

function AgentSession({ candidate, onAccept, mobile }) {
  const { t, toast } = window.useApp();
  const [events, setEvents] = aVUseState([]);
  const [history, setHistory] = aVUseState(null);
  const [done, setDone] = aVUseState(false);
  const [loading, setLoading] = aVUseState(true);
  const [running, setRunning] = aVUseState(false);
  const [error, setError] = aVUseState('');
  const [activeTab, setActiveTab] = aVUseState('terminal'); // mobile only: 'terminal' | 'metrics'
  const scrollRef = aVUseRef(null);
  const startedRef = aVUseRef(false);
  const validationProgressTimersRef = aVUseRef([]);
  const canonicalId = candidate.canonical_id || candidate.id || `${candidate.k || ''}::${candidate.p || ''}`;
  const candidateLabel = `${candidate.k || candidate.kalshi_market_id || ''} ⇄ ${candidate.p || candidate.polymarket_slug || ''}`;

  const appendEvents = (incoming) => {
    const rows = Array.isArray(incoming) ? incoming : [];
    if (!rows.length) return;
    setEvents(prev => [...prev, ...rows.map(e => Object.assign({}, e, { ts: e.ts || Date.now() / 1000 }))]);
  };
  const clearValidationProgressTimers = () => {
    validationProgressTimersRef.current.forEach(id => clearTimeout(id));
    validationProgressTimersRef.current = [];
  };
  const queueValidationProgress = (delay, event) => {
    const id = setTimeout(() => {
      setEvents(prev => [...prev, Object.assign({}, event, { ts: Date.now() / 1000 })]);
    }, delay);
    validationProgressTimersRef.current.push(id);
  };

  const loadHistory = async () => {
    if (!window.__arbiterMappingValidationHistory) {
      setError('Validation history API is not available in this build.');
      setLoading(false);
      setDone(true);
      return;
    }
    setLoading(true);
    setError('');
    const res = await window.__arbiterMappingValidationHistory(canonicalId);
    setLoading(false);
    if (!res.ok) {
      setError(res.error || 'Could not load validation history.');
      setDone(true);
      return;
    }
    const payload = res.data || {};
    setHistory(payload);
    const auditN = Array.isArray(payload.audit_log) ? payload.audit_log.length : 0;
    const discoveryN = Array.isArray(payload.discovery_events) ? payload.discovery_events.length : 0;
    const runs = Array.isArray(payload.validation_runs) ? payload.validation_runs : [];
    const firstEvents = [
      { kind:'meta', text:`history.loaded audit=${auditN} discovery_events=${discoveryN} validation_runs=${runs.length}` },
    ];
    if (payload.verifier) {
      firstEvents.push({ kind:'meta', text:`model=${payload.verifier.model || 'unknown'} backend=${payload.verifier.backend || 'unknown'} mode=read_only` });
    }
    if (discoveryN) {
      firstEvents.push({ kind:'tool_result', tool:'discovery.history', result: payload.discovery_events.slice(-5) });
    }
    if (auditN) {
      firstEvents.push({ kind:'tool_result', tool:'mapping.audit_log', result: payload.audit_log.slice(-10) });
    }
    setEvents(firstEvents);
    if (runs.length) {
      appendEvents(runs[runs.length - 1].events || []);
      setDone(true);
    } else {
      setDone(true);
    }
  };

  aVUseEffect(() => {
    if (startedRef.current) return;
    startedRef.current = true;
    loadHistory();
    return () => clearValidationProgressTimers();
  }, [canonicalId]);

  const runValidation = async () => {
    if (!window.__arbiterRunMappingValidation) {
      setError('Run validation API is not available in this build.');
      return;
    }
    setRunning(true);
    setDone(false);
    setError('');
    clearValidationProgressTimers();
    setEvents(prev => [...prev, { kind:'meta', text:'run.starting claude_code_cli=true model=claude-opus-4-7 read_only=true' }]);
    queueValidationProgress(450, { kind:'tool_call', tool:'claude_code_cli', args:{ model:'claude-opus-4-7', mode:'read_only', candidate: canonicalId }, text:'Claude Code CLI is running the read-only verifier through the backend sidecar.' });
    queueValidationProgress(1150, { kind:'tool_call', tool:'platform_active_check', args:{ kalshi:candidate.k || candidate.kalshi_market_id, polymarket:candidate.p || candidate.polymarket_slug }, text:'Checking both platform market ids are still active and tradable.' });
    queueValidationProgress(1850, { kind:'tool_call', tool:'resolution_checker', args:{ fields:['date', 'threshold', 'source', 'polarity'] }, text:'Claude Code CLI is comparing resolution criteria, date, threshold, source, and polarity.' });
    queueValidationProgress(2650, { kind:'tool_call', tool:'llm_verifier.verify', args:{ model:'claude-opus-4-7', mode:'read_only' }, text:"llm_verifier.verify(model='claude-opus-4-7', mode='read_only')" });
    const res = await window.__arbiterRunMappingValidation(canonicalId);
    clearValidationProgressTimers();
    setRunning(false);
    setDone(true);
    if (!res.ok) {
      const msg = res.error || 'Validation run failed.';
      setError(msg);
      setEvents(prev => [...prev, { kind:'error', text: msg }]);
      return;
    }
    const session = res.data || {};
    appendEvents(session.events || []);
    setHistory(prev => {
      const base = prev || {};
      const runs = Array.isArray(base.validation_runs) ? base.validation_runs.slice() : [];
      runs.push(session);
      return Object.assign({}, base, { validation_runs: runs });
    });
    if (window.__arbiterTick) { try { await window.__arbiterTick(); } catch {} }
  };

  aVUseEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [events.length]);

  const verdict = [...events].reverse().find(e => e.kind === 'verdict');
  const metrics = events.filter(e => e.kind === 'metric');
  const runCount = history && Array.isArray(history.validation_runs) ? history.validation_runs.length : 0;

  // Terminal pane
  const terminal = (
    <div ref={scrollRef} style={{ flex: 1, overflow:'auto', padding: mobile ? '12px 14px' : '16px 20px', fontFamily: window.FONTS.mono, fontSize: mobile ? 11 : 12, lineHeight: 1.6, color: '#d4d8de', WebkitOverflowScrolling:'touch' }}>
      <CliLine prefix="$" prefixColor="#6c7280" mobile={mobile}><span style={{ color:'#a3a8af' }}>arbiter agents validate --model claude-opus-4-7</span>{!mobile && <> --candidate <span style={{ color:'#74d2bd' }}>{canonicalId}</span> --read-only</>}</CliLine>
      {mobile && <CliLine prefix=" " prefixColor="transparent"><span style={{ color:'#a3a8af' }}>--candidate</span> <span style={{ color:'#74d2bd' }}>{canonicalId}</span></CliLine>}
      <CliLine prefix=" " prefixColor="transparent"><span style={{ color:'#6c7280' }}>{candidateLabel}</span></CliLine>
      {events.map((e, i) => <CliEvent key={i} e={e} mobile={mobile}/>)}
      {(loading || running) && <CliCursor/>}
      {error && <CliEvent e={{ kind:'error', text:error }} mobile={mobile}/>}
      {done && verdict && (
        <div style={{ marginTop: 14, padding: mobile ? '10px 12px' : '12px 14px', borderRadius: 8, background: verdict.verdict === 'confirm' ? 'rgba(56, 189, 137, 0.10)' : verdict.verdict === 'reject' ? 'rgba(241, 92, 92, 0.10)' : 'rgba(245, 168, 71, 0.10)', border: `1px solid ${verdict.verdict === 'confirm' ? 'rgba(56, 189, 137, 0.35)' : verdict.verdict === 'reject' ? 'rgba(241, 92, 92, 0.35)' : 'rgba(245, 168, 71, 0.35)'}` }}>
          <div style={{ fontSize: 10, color:'#9ca0a6', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom: 4 }}>Verdict</div>
          <div style={{ fontSize: mobile ? 12.5 : 14, color: verdict.verdict === 'confirm' ? '#5ddfae' : verdict.verdict === 'reject' ? '#f88a8a' : '#f5b766', fontWeight: 600, textTransform:'uppercase', letterSpacing:'0.04em' }}>{String(verdict.verdict || 'manual_review').replace('_', ' ')} · {Number(verdict.confidence || 0).toFixed(2)}</div>
          <div style={{ fontSize: mobile ? 11.5 : 12, color:'#c9cdd2', marginTop: 6, fontFamily: window.FONTS.sans, lineHeight: 1.5 }}>{verdict.summary}</div>
        </div>
      )}
    </div>
  );

  // Metrics pane (mobile only)
  const metricsPane = (
    <div style={{ flex: 1, overflow:'auto', padding: '12px 14px', background: t.bgCard }}>
      <div style={{ fontSize: 10.5, color: t.textMuted, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom: 10, fontWeight: 600 }}>Validation metrics</div>
      {!metrics.length && <div style={{ fontSize: 12, color: t.textDim, padding: '24px 0', textAlign:'center' }}>{done ? 'Session ended without metrics.' : 'Waiting for first metric…'}</div>}
      <div style={{ display:'flex', flexDirection:'column', gap: 10 }}>
        {metrics.map((m, i) => {
          const tone = m.label === 'edge_case_risk' ? (m.value <= 0.2 ? t.green : m.value <= 0.4 ? t.amber : t.red) : (m.value >= 0.8 ? t.green : m.value >= 0.5 ? t.amber : t.red);
          return (
            <div key={i} style={{ background: t.bgSubtle, border:`1px solid ${t.border}`, borderRadius: 10, padding: 12 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: 8 }}>
                <span style={{ fontSize: 11.5, color: t.text, textTransform:'capitalize' }}>{m.label.replace(/_/g,' ')}</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: tone, fontFamily: window.FONTS.mono }}>{m.value.toFixed(2)}</span>
              </div>
              <div style={{ height: 4, background: t.border, borderRadius: 99, overflow:'hidden' }}>
                <div style={{ height:'100%', width: `${m.value * 100}%`, background: tone, transition:'width 0.4s' }}/>
              </div>
            </div>
          );
        })}
      </div>
      {done && verdict && (
        <div style={{ marginTop: 14, padding: 12, borderRadius: 10, background: verdict.verdict === 'confirm' ? t.greenSoft : verdict.verdict === 'reject' ? t.redSoft : t.amberSoft, border:`1px solid ${(verdict.verdict === 'confirm' ? t.green : verdict.verdict === 'reject' ? t.red : t.amber)}40` }}>
          <div style={{ fontSize: 9.5, color: t.textMuted, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom: 3 }}>Verdict</div>
          <div style={{ fontSize: 12.5, fontWeight: 700, color: verdict.verdict === 'confirm' ? t.green : verdict.verdict === 'reject' ? t.red : t.amber, textTransform:'uppercase', letterSpacing:'0.04em' }}>{String(verdict.verdict || 'manual_review').replace('_',' ')} · {Number(verdict.confidence || 0).toFixed(2)}</div>
          <div style={{ fontSize: 11.5, color: t.text, marginTop: 5, lineHeight: 1.5 }}>{verdict.summary}</div>
        </div>
      )}
    </div>
  );

  return (
    <div style={{ display:'flex', flexDirection:'column', flex: 1, minHeight: 0, background: '#0b0d10' }}>
      {/* Mobile tab bar */}
      {mobile && (
        <div style={{ display:'flex', background: t.bgCard, borderBottom: `1px solid ${t.border}`, flexShrink: 0 }}>
          {[['terminal','Terminal'],['metrics', `Metrics${metrics.length ? ` · ${metrics.length}` : ''}`]].map(([k, l]) => (
            <button key={k} onClick={() => setActiveTab(k)} style={{ flex: 1, padding: '10px', background:'transparent', border:'none', borderBottom: `2px solid ${activeTab === k ? t.accent : 'transparent'}`, color: activeTab === k ? t.text : t.textDim, fontSize: 12, fontWeight: 600, cursor:'pointer' }}>{l}</button>
          ))}
        </div>
      )}

      {mobile ? (activeTab === 'terminal' ? terminal : metricsPane) : terminal}

      {/* Footer */}
      <div style={{ borderTop: `1px solid ${t.border}`, background: t.bgCard, padding: mobile ? '10px 14px calc(10px + env(safe-area-inset-bottom, 0px))' : '12px 20px', display:'flex', alignItems:'center', gap: 10, flexWrap: mobile ? 'nowrap' : 'wrap', flexShrink: 0 }}>
        {!mobile && (
          <div style={{ display:'flex', gap: 14, flexWrap:'wrap', flex: 1, minWidth: 0 }}>
            {metrics.map((m, i) => (
              <div key={i} style={{ minWidth: 0 }}>
                <div style={{ fontSize: 9.5, color: t.textMuted, letterSpacing:'0.08em', textTransform:'uppercase' }}>{m.label.replace(/_/g,' ')}</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: m.value >= 0.8 ? t.green : m.value >= 0.5 ? t.amber : t.red, fontFamily: window.FONTS.mono }}>{m.value.toFixed(2)}</div>
              </div>
            ))}
            {!metrics.length && <div style={{ fontSize: 11, color: t.textMuted }}>{done ? 'Session complete' : 'Streaming…'}</div>}
          </div>
        )}
        {mobile && (
        <div style={{ flex: 1, minWidth: 0, fontSize: 11, color: t.textMuted, fontFamily: window.FONTS.mono, display:'flex', alignItems:'center', gap: 6 }}>
            <span style={{ width: 6, height: 6, borderRadius:'50%', background: running ? t.accent : done ? t.green : t.amber, animation: running ? 'pulse 1.4s infinite' : 'none' }}/>
            {running ? `${events.length} events…` : `${events.length} events · ${metrics.length} metrics`}
          </div>
        )}
        <div style={{ display:'flex', gap: 6, flexShrink: 0 }}>
          <window.Btn variant="secondary" size="sm" disabled={loading || running} hint="Run a read-only backend validation pass using the configured verifier" onClick={runValidation}>{running ? 'Running…' : runCount ? 'Run again' : 'Run validation'}</window.Btn>
        </div>
      </div>
    </div>
  );
}

function CliEvent({ e, mobile }) {
  if (e.kind === 'meta') return <CliLine prefix="◦" prefixColor="#6c7280">{e.text}</CliLine>;
  if (e.kind === 'step' || e.kind === 'thinking') return (
    <div style={{ margin: '8px 0', padding: mobile ? '7px 10px' : '8px 12px', borderLeft: '2px solid #5b8def', background: 'rgba(91, 141, 239, 0.06)', borderRadius: '0 4px 4px 0', whiteSpace:'pre-wrap' }}>
      <div style={{ fontSize: 9.5, color:'#7da3f5', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom: 3 }}>Step</div>
      <div style={{ fontFamily: window.FONTS.sans, fontSize: mobile ? 11.5 : 12.5, color:'#c9cdd2', lineHeight: 1.5 }}>{e.text}</div>
    </div>
  );
  if (e.kind === 'tool_call') return (
    <div style={{ margin: '6px 0' }}>
      <CliLine prefix="→" prefixColor="#5ddfae">
        <span style={{ color:'#5ddfae' }}>{e.tool}</span>
        <span style={{ color:'#6c7280' }}>(</span>
        <span style={{ color:'#d4d8de', wordBreak:'break-all' }}>{Object.entries(e.args || {}).map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(', ')}</span>
        <span style={{ color:'#6c7280' }}>)</span>
      </CliLine>
    </div>
  );
  if (e.kind === 'tool_result') return (
    <div style={{ margin: '4px 0 8px ' + (mobile ? '10px' : '18px'), padding: mobile ? '7px 10px' : '8px 12px', background:'rgba(116, 210, 189, 0.06)', borderRadius: 4, borderLeft:'2px solid rgba(116, 210, 189, 0.3)' }}>
      <div style={{ fontSize: 9.5, color:'#74d2bd', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom: 4 }}>← {e.tool}</div>
      <pre style={{ margin: 0, fontFamily: window.FONTS.mono, fontSize: mobile ? 10 : 11, color:'#a3a8af', whiteSpace:'pre-wrap', wordBreak:'break-all' }}>{JSON.stringify(e.result, null, 2)}</pre>
    </div>
  );
  if (e.kind === 'metric') {
    const value = Number(e.value || 0);
    return <CliLine prefix="·" prefixColor="#6c7280"><span style={{ color:'#9ca0a6' }}>metric</span> {e.label} <span style={{ color:'#f5b766' }}>{value.toFixed(3)}</span></CliLine>;
  }
  if (e.kind === 'verdict') {
    const confidence = Number(e.confidence || 0);
    return <CliLine prefix="✓" prefixColor="#5ddfae"><span style={{ color:'#5ddfae', fontWeight: 700 }}>{String(e.verdict || 'manual_review').toUpperCase()}</span> confidence={confidence.toFixed(2)}</CliLine>;
  }
  if (e.kind === 'error') return <CliLine prefix="!" prefixColor="#f88a8a"><span style={{ color:'#f88a8a' }}>{e.text}</span></CliLine>;
  return null;
}

function CliLine({ prefix, prefixColor, children, mobile }) {
  return (
    <div style={{ display:'flex', gap: 8, padding: '1px 0' }}>
      <span style={{ color: prefixColor || '#6c7280', flexShrink: 0, width: 14 }}>{prefix}</span>
      <span style={{ flex: 1, minWidth: 0, wordBreak:'break-word' }}>{children}</span>
    </div>
  );
}

function CliCursor() {
  return (
    <div style={{ display:'flex', gap: 8, padding: '4px 0' }}>
      <span style={{ color:'#6c7280', width: 14 }}>›</span>
      <span style={{ display:'inline-block', width: 8, height: 14, background:'#5ddfae', animation:'cliBlink 1s steps(2) infinite' }}/>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// RefetchMappingsModal — long-running job progress for re-pulling all
// markets from both platforms and re-scoring candidate mappings.
//
// This opens a real POST /api/batch-discover run and polls
// /api/discovery/status for stage, count, and rejection-reason updates.
// ─────────────────────────────────────────────────────────────────────

function RefetchMappingsModal() {
  const { t, modal, setModal, toast } = window.useApp();
  const overlayRef = aVUseRef(null);
  const [isMobile, setIsMobile] = aVUseState(false);
  aVUseEffect(() => {
    if (!overlayRef.current) return;
    const measure = () => {
      const r = overlayRef.current?.getBoundingClientRect();
      if (r) setIsMobile(r.width < 560);
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(overlayRef.current);
    return () => ro.disconnect();
  }, [modal]);
  if (!modal || modal.kind !== 'refetchMappings') return null;
  const job = modal.payload || {};
  return (
    <div ref={overlayRef} onClick={() => {}} style={{ position:'fixed', inset: 0, background: t.overlay, zIndex: 96, display:'flex', justifyContent:'center', alignItems: isMobile ? 'stretch' : 'center', padding: isMobile ? 0 : 24 }}>
      <div style={{ width: isMobile ? '100%' : 540, height: isMobile ? '100%' : 'auto', maxHeight: isMobile ? '100%' : '92vh', background: t.bgCard, border: isMobile ? 'none' : `1px solid ${t.border}`, borderRadius: isMobile ? 0 : 14, boxShadow: isMobile ? 'none' : t.shadowLg, overflow:'hidden', display:'flex', flexDirection:'column' }}>
        <RefetchSession job={job} onClose={() => setModal(null)} mobile={isMobile} onDone={(r) => { toast(job.autoPromote === false ? 'Validation pass complete' : 'Re-fetch complete', { sub: `${r.added} new candidates · ${r.confirmed} auto-confirmed` }); }}/>
      </div>
    </div>
  );
}

const DISCOVERY_PHASES = [
  { key: 'fetch_kalshi_markets', label: 'Pulling Kalshi markets', sub: 'Active ticker catalog', count: 'kalshi_markets' },
  { key: 'fetch_kalshi_events', label: 'Pulling Kalshi events', sub: 'Event hierarchy before outcome matching', count: 'kalshi_events' },
  { key: 'fetch_polymarket_markets', label: 'Pulling Polymarket markets', sub: 'Active slug catalog', count: 'polymarket_markets' },
  { key: 'index_polymarket', label: 'Building fingerprints', sub: 'Text tokens plus canonical event keys', count: 'polymarket_indexed' },
  { key: 'score_candidates', label: 'Scoring candidate pairs', sub: 'Structural exact matches before fuzzy fallback', count: 'candidates_selected' },
  { key: 'llm_batch', label: 'LLM verification', sub: 'Cached batch semantic checks', count: 'verdicts' },
  { key: 'validate_candidates', label: 'Promotion gates', sub: 'Resolution, polarity, liquidity, date window', count: 'evaluated' },
  { key: 'persist_candidates', label: 'Persisting mappings', sub: 'Upsert candidates and confirmed rows', count: 'candidates_written' },
];

function RefetchSession({ job = {}, onClose, onDone, mobile }) {
  const { t } = window.useApp();
  const [run, setRun] = aVUseState(() => window.MOCK.discovery || {});
  const [requestError, setRequestError] = aVUseState('');
  const [starting, setStarting] = aVUseState(false);
  const startedRef = aVUseRef(false);
  const runStartedRef = aVUseRef(false);
  const doneRef = aVUseRef(false);
  const autoStart = job.inspectOnly !== true;

  const updateRun = (next) => {
    if (!next || typeof next !== 'object') return;
    window.MOCK.discovery = Object.assign({}, window.MOCK.discovery || {}, next);
    setRun(Object.assign({}, window.MOCK.discovery));
  };
  const notifyDone = (snapshot) => {
    if (doneRef.current || !snapshot || snapshot.status !== 'completed') return;
    doneRef.current = true;
    const c = snapshot.counts || {};
    onDone({
      added: Number(c.candidates_written || 0),
      confirmed: Number(c.confirmed_in_batch || c.confirmed_total || 0),
    });
  };
  const startDiscoveryRun = async () => {
    if (runStartedRef.current) return;
    if (!window.__arbiterBatchDiscover) {
      setRequestError('Batch discovery API is not available in this build.');
      return;
    }
    runStartedRef.current = true;
    setStarting(true);
    setRequestError('');
    const res = await window.__arbiterBatchDiscover({ auto_promote: job.autoPromote !== false });
    setStarting(false);
    if (!res.ok) {
      setRequestError(res.error || 'Discovery request failed');
      runStartedRef.current = false;
      if (window.__arbiterDiscoveryStatus) {
        const status = await window.__arbiterDiscoveryStatus();
        if (status.ok) updateRun(status.data);
      }
      return;
    }
    const snapshot = res.data?.discovery || res.data;
    updateRun(snapshot);
    notifyDone(snapshot);
    if (window.__arbiterTick) { try { await window.__arbiterTick(); } catch {} }
  };

  aVUseEffect(() => {
    if (startedRef.current) return;
    startedRef.current = true;
    let cancelled = false;

    const poll = async () => {
      if (!window.__arbiterDiscoveryStatus) return;
      const res = await window.__arbiterDiscoveryStatus();
      if (cancelled) return;
      if (res.ok) {
        updateRun(res.data);
        notifyDone(res.data);
      }
    };

    poll();
    const pollId = setInterval(poll, 1500);
    if (autoStart) startDiscoveryRun();

    return () => {
      cancelled = true;
      clearInterval(pollId);
    };
  }, []);

  const counts = run.counts || {};
  const reasons = run.rejection_reasons || {};
  const events = Array.isArray(run.events) ? run.events : [];
  const phase = run.phase || 'idle';
  const phaseIndex = DISCOVERY_PHASES.findIndex(p => p.key === phase);
  const completed = run.status === 'completed';
  const failed = run.status === 'failed' || !!requestError;
  const pct = Math.max(0, Math.min(100, Math.round(Number(run.progress_pct || 0))));
  const statusLabel = failed ? 'Attention' : completed ? 'Complete' : run.status === 'running' ? 'Re-fetching' : autoStart ? 'Ready' : 'History';
  const latestMessage = requestError || run.message || (autoStart ? 'Waiting for discovery status.' : 'Inspecting latest discovery history. Run manually when ready.');
  const reasonEntries = Object.entries(reasons).sort((a, b) => Number(b[1]) - Number(a[1])).slice(0, 5);

  return (
    <div>
      <div style={{ padding: '20px 24px', borderBottom: `1px solid ${t.border}` }}>
        <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 6 }}>
          <span style={{ width: 8, height: 8, borderRadius:'50%', background: failed ? t.red : completed ? t.green : t.accent, animation: completed || failed ? 'none' : 'pulse 1.4s infinite' }}/>
          <span style={{ fontSize: 11, color: failed ? t.red : t.textMuted, letterSpacing:'0.08em', textTransform:'uppercase', fontWeight: 600 }}>{statusLabel}</span>
        </div>
        <div style={{ fontSize: 17, fontWeight: 600, color: t.text, letterSpacing:'-0.01em' }}>{job.title || 'Re-fetch market mappings'}</div>
        <div style={{ fontSize: 12, color: t.textDim, marginTop: 4 }}>{latestMessage}</div>
      </div>

      <div style={{ padding: 24 }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom: 6, fontSize: 11, color: t.textDim }}>
          <span>Overall</span>
          <span style={{ fontFamily: window.FONTS.mono, color: t.text }}>{pct}%</span>
        </div>
        <div style={{ height: 6, background: t.bgSubtle, borderRadius: 99, overflow:'hidden', marginBottom: 18 }}>
          <div style={{ height:'100%', width: `${pct}%`, background: failed ? t.red : completed ? t.green : t.accent, transition: 'width 0.3s' }}/>
        </div>

        <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr 1fr' : 'repeat(4, 1fr)', gap: 8, marginBottom: 16 }}>
          <MiniRunStat label="Kalshi" value={counts.kalshi_markets || 0}/>
          <MiniRunStat label="Polymarket" value={counts.polymarket_markets || 0}/>
          <MiniRunStat label="Selected" value={counts.candidates_selected || 0}/>
          <MiniRunStat label="Promoted" value={counts.promoted || counts.confirmed_in_batch || 0}/>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap: 10 }}>
          {DISCOVERY_PHASES.map((p, i) => {
            const active = p.key === phase && !completed && !failed;
            const seen = events.some(e => e.phase === p.key);
            const done = completed || (phaseIndex > i) || (seen && !active);
            const value = Number(counts[p.count] || 0);
            return (
              <div key={p.key} style={{ display:'flex', alignItems:'center', gap: 12, padding: '10px 12px', background: active ? t.bgSubtle : 'transparent', borderRadius: 7, opacity: !done && !active && !completed ? 0.48 : 1 }}>
                <div style={{ width: 22, height: 22, borderRadius:'50%', background: done ? t.green : active ? t.accent : t.bgSubtle, display:'flex', alignItems:'center', justifyContent:'center', fontSize: 11, color: done || active ? '#fff' : t.textMuted, flexShrink: 0, fontWeight: 700 }}>{done ? '✓' : i + 1}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display:'flex', alignItems:'baseline', gap: 8 }}>
                    <span style={{ fontSize: 12.5, color: t.text, fontWeight: active ? 600 : 500, flex: 1, minWidth: 0, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.label}</span>
                    <span style={{ fontSize: 11, color: t.textDim, fontFamily: window.FONTS.mono }}>{value ? value.toLocaleString() : '—'}</span>
                  </div>
                  <div style={{ fontSize: 10.5, color: t.textMuted, marginTop: 1 }}>{p.sub}</div>
                </div>
              </div>
            );
          })}
        </div>

        {reasonEntries.length > 0 && (
          <div style={{ marginTop: 14, padding: '12px 14px', background: t.bgSubtle, borderRadius: 8, border: `1px solid ${t.border}` }}>
            <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom: 8 }}>Top validation blockers</div>
            {reasonEntries.map(([reason, n]) => (
              <div key={reason} style={{ display:'flex', justifyContent:'space-between', fontSize: 11.5, padding:'3px 0', color: t.textDim, fontFamily: window.FONTS.mono }}>
                <span>{reason}</span>
                <span>{Number(n).toLocaleString()}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{ marginTop: 14, padding: '12px 14px', background: t.bgSubtle, borderRadius: 8, border: `1px solid ${t.border}` }}>
          <div style={{ fontSize: 11, color: t.textMuted, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom: 8 }}>Recent run history</div>
          {events.length === 0 ? (
            <div style={{ fontSize: 11.5, color: t.textDim, lineHeight: 1.45 }}>No discovery run has emitted history since this API process started.</div>
          ) : (
            events.slice(-6).map((event, i) => (
              <div key={`${event.ts || i}-${event.phase || event.status || i}`} style={{ display:'grid', gridTemplateColumns:'86px minmax(0, 1fr)', gap: 8, fontSize: 11.5, padding:'4px 0', color: t.textDim, fontFamily: window.FONTS.mono }}>
                <span style={{ color: t.textMuted }}>{event.phase || event.status || 'event'}</span>
                <span style={{ overflowWrap:'anywhere' }}>{event.message || event.detail || event.error || JSON.stringify(event)}</span>
              </div>
            ))
          )}
        </div>
      </div>

      <div style={{ padding: '14px 24px', borderTop: `1px solid ${t.border}`, background: t.bgSubtle, display:'flex', justifyContent:'space-between', alignItems:'center', gap: 8 }}>
        <span style={{ fontSize: 11, color: failed ? t.red : t.textMuted, fontFamily: window.FONTS.mono }}>{completed ? `${Number(counts.candidates_written || 0).toLocaleString()} written · ${Number(counts.confirmed_total || 0).toLocaleString()} confirmed total` : failed ? latestMessage : !autoStart && run.status !== 'running' ? 'Inspecting history - run manually when ready' : 'Running in background - safe to close'}</span>
        <div style={{ display:'flex', gap: 8, alignItems:'center' }}>
          {!autoStart && run.status !== 'running' && !starting && <window.Btn variant="primary" size="sm" onClick={startDiscoveryRun}>Run now</window.Btn>}
          {starting && <window.Btn variant="secondary" size="sm" disabled>Starting...</window.Btn>}
          <window.Btn variant={completed ? 'primary' : failed ? 'danger' : 'secondary'} size="sm" onClick={onClose}>{completed || failed ? 'Done' : 'Close'}</window.Btn>
        </div>
      </div>
    </div>
  );
}

function MiniRunStat({ label, value }) {
  const { t } = window.useApp();
  return (
    <div style={{ background: t.bgSubtle, border: `1px solid ${t.border}`, borderRadius: 8, padding: '9px 10px' }}>
      <div style={{ fontSize: 10.5, color: t.textMuted, marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 13, color: t.text, fontFamily: window.FONTS.mono, fontWeight: 600 }}>{Number(value || 0).toLocaleString()}</div>
    </div>
  );
}

window.AgentValidateModal = AgentValidateModal;
window.RefetchMappingsModal = RefetchMappingsModal;

</script>
<script type="text/babel" data-presets="env,react" data-filename="mobile.jsx">
// Mobile dashboard — single-screen tab bar + key views.
const { useState: mobUseState } = React;
const ARB_MOBILE_TAB_KEY = 'arbiter-mobile-tab';
const ARB_MOBILE_TABS = ['home', 'opps', 'trades', 'maps', 'me'];

function readStoredMobileTab() {
  try {
    const stored = localStorage.getItem(ARB_MOBILE_TAB_KEY);
    return ARB_MOBILE_TABS.includes(stored) ? stored : 'home';
  } catch {
    return 'home';
  }
}

function persistMobileTab(tab) {
  if (!ARB_MOBILE_TABS.includes(tab)) return;
  try { localStorage.setItem(ARB_MOBILE_TAB_KEY, tab); } catch {}
}

function MobileDashboard() {
  const { t, scanner, setScanner, tradingMode } = window.useApp();
  const [tab, setTab] = mobUseState(readStoredMobileTab);
  const [meSub, setMeSub] = mobUseState(null); // 'funds' | 'pnl' | 'health' | 'settings' | null
  const M = window.MOCK;

  const totalPnl = M.pnl.recorded_trading_pnl.kalshi + M.pnl.recorded_trading_pnl.polymarket;

  // When switching primary tabs, clear sub-page
  const switchTab = (k) => {
    persistMobileTab(k);
    setTab(k);
    setMeSub(null);
    setTimeout(() => {
      const el = document.querySelector('[data-mobile-scroll="true"]');
      if (el) el.scrollTop = 0;
    }, 0);
  };

  return (
    <div style={{ position:'relative', width: '100%', height: '100%', background: t.bg, color: t.text, fontFamily: window.FONTS.sans, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ padding: '14px 14px 12px', display:'flex', alignItems:'center', gap: 6 }}>
        {meSub ? (
          <button onClick={() => setMeSub(null)} aria-label="Back" style={{ background:'none', border:'none', color: t.text, fontSize: 22, cursor:'pointer', padding: 0, marginLeft: -8, width: 44, height: 44, display:'flex', alignItems:'center', justifyContent:'center', flexShrink: 0 }}>‹</button>
        ) : (
          <div style={{ width: 26, height: 26, borderRadius: 7, background: t.text, color: t.bgCard, display:'flex', alignItems:'center', justifyContent:'center', fontSize: 12, fontWeight: 700, marginLeft: 4 }}>A</div>
        )}
        <div style={{ fontSize: 13, fontWeight: 600, marginLeft: meSub ? 0 : 4 }}>{meSub ? ({ funds:'Funds & Deposits', pnl:'P&L', health:'System Health', settings:'Settings' }[meSub]) : 'Arbiter'}</div>
        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap: 4, padding: '3px 8px', background: tradingMode === 'live' ? t.greenSoft : t.amberSoft, color: tradingMode === 'live' ? t.green : t.amber, borderRadius: 99, fontSize: 10.5, fontWeight: 600 }}>

      </div>

      <div data-mobile-scroll="true" style={{ flex: 1, overflow:'auto', padding: '0 16px', paddingBottom: 'calc(80px + env(safe-area-inset-bottom, 0px))', WebkitOverflowScrolling:'touch' }}>

        {meSub === 'pnl' && <MobPnL/>}
        {meSub === 'health' && <MobHealth/>}
        {meSub === 'settings' && <MobSettings/>}
        {!meSub && tab === 'home' && <MobHome totalBal={totalBal} totalPnl={totalPnl}/>}
        {!meSub && tab === 'opps' && <MobOpps/>}
        {!meSub && tab === 'trades' && <MobTrades/>}
        {!meSub && tab === 'maps' && <MobMappings/>}
        {!meSub && tab === 'me' && <MobMe onSub={setMeSub}/>}
      </div>

      {/* Tab bar */}
      <div style={{ position:'absolute', bottom: 0, left: 0, right: 0, padding: '6px 8px calc(10px + env(safe-area-inset-bottom, 14px))', background: t.bgCard, borderTop: `1px solid ${t.border}`, display:'flex', justifyContent:'space-around' }}>
        {[
          ['home','Home','⌂'],['opps','Edge','◇'],['trades','Trades','↗'],['maps','Maps','⇄'],['me','Account','◐'],
        ].map(([k, l, ic]) => {
          const active = tab === k && !meSub;
          return (
            <button key={k} onClick={() => switchTab(k)} aria-label={l} aria-pressed={active} style={{ flex: 1, minHeight: 48, padding: '6px 4px', background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap: 2, color: active ? t.accent : t.textMuted, fontSize: 10, transition:'color 0.15s' }}>
              <span style={{ fontSize: 18, fontFamily: window.FONTS.mono }}>{ic}</span>
              <span style={{ fontWeight: active ? 600 : 400 }}>{l}</span>

          );
        })}
      </div>
    </div>
  );
}

          <div style={{ display:'flex', justifyContent:'center' }}>
            <window.Donut size={88} thickness={12} slices={[
              { value: M.balances.kalshi.balance, color: t.green },
              { value: M.balances.polymarket.balance, color: t.purple },

  const deployed = M.pnl.deployed_capital || 0;
  const execs = Array.isArray(M.executions) ? M.executions : [];
  const statusRows = (() => {
    const total = Math.max(1, execs.length);
    const profitable = execs.filter(e => e.status === 'filled' && Number(e.realized_pnl || 0) > 0).length;
    const breakeven = execs.filter(e => e.status === 'filled' && Number(e.realized_pnl || 0) === 0).length;
    const recovering = execs.filter(e => e.status === 'recovering' || e.status === 'submitted').length;
    const failed = execs.filter(e => e.status === 'failed' || e.status === 'aborted').length;
    return [
      ['Filled & profitable', profitable, profitable / total * 100, t.green],
      ['Filled & break-even', breakeven, breakeven / total * 100, t.textDim],
      ['Recovering / submitted', recovering, recovering / total * 100, t.amber],
      ['Failed / aborted', failed, failed / total * 100, t.red],

  })();
  return (
    <div style={{ paddingTop: 8 }}>

function MobMappings() {

    raw: r,
    canonical_id: r.canonical_id || `${r.kalshi_market_id || r.kalshi_ticker || ''}::${r.polymarket_slug || r.poly_slug || ''}`,
    score: Number(r.mapping_score ?? r.score ?? r.confidence ?? 0),
    k: r.kalshi_market_id || r.kalshi_ticker || r.kalshi || r.ticker || '',
    p: r.polymarket_slug || r.poly_slug || r.polymarket || '',
    description: r.description || r.polymarket_question || r.question || '',
    s: r.status || 'candidate',
    match: r.resolution_match_status || 'pending_operator_review',
    auto: !!r.allow_auto_trade,
    reason: r.auto_promote_reason || '',
  }));
  const statusOf = c => String(c.s || '').toLowerCase();
  const matchOf = c => String(c.match || '').toLowerCase();
  const reasonOf = c => String(c.reason || '').toLowerCase();
  const isPending = c => ['candidate', 'pending', 'review'].includes(statusOf(c));
  const isLive = c => statusOf(c) === 'confirmed' && !!c.auto && matchOf(c) === 'identical';
  const isStale = c => statusOf(c) === 'expired' || matchOf(c) === 'expired' || reasonOf(c).includes('expired') || reasonOf(c).includes('stale');
  const reviewable = candidates.filter(isPending);
  const confirmed = candidates.filter(c => statusOf(c) === 'confirmed').length;
  const liveCount = candidates.filter(isLive).length;
  const staleCount = candidates.filter(isStale).length;
  const rejectedCount = candidates.filter(c => statusOf(c) === 'rejected').length;
  const MOBILE_MAPPING_FILTERS = [
    { key:'all', label:'All', count:candidates.length },
    { key:'confirmed', label:'Confirmed', count:confirmed },
    { key:'pending', label:'Pending', count:reviewable.length },
    { key:'live', label:'Live', count:liveCount },
    { key:'stale', label:'Stale', count:staleCount },
    { key:'rejected', label:'Rejected', count:rejectedCount },
  ];
  const active = candidates.filter(c => {
    if (mappingFilter === 'confirmed') return statusOf(c) === 'confirmed';
    if (mappingFilter === 'pending') return isPending(c);
    if (mappingFilter === 'live') return isLive(c);
    if (mappingFilter === 'stale') return isStale(c);
    if (mappingFilter === 'rejected') return statusOf(c) === 'rejected';
    return statusOf(c) === 'confirmed' || isPending(c) || statusOf(c) === 'rejected' || isStale(c);
  });
  const discovery = M.discovery || {};
  const discoveryCounts = discovery.counts || {};
  const discoveryStatus = String(discovery.status || 'idle').toLowerCase();
  return (
    <div style={{ paddingTop: 8 }}>
      <div style={{ fontSize: 18, fontWeight: 600, color: t.text, marginBottom: 4, padding: '0 4px' }}>Mappings</div>
      <div style={{ fontSize: 11.5, color: t.textDim, marginBottom: 14, padding: '0 4px' }}>{confirmed.toLocaleString()} confirmed · {reviewable.length.toLocaleString()} pending agent review</div>

      {/* Action buttons — full feature parity with desktop */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap: 8, marginBottom: 14 }}>
        <button onClick={() => setModal({ kind:'refetchMappings' })} style={{ padding: '11px', background: t.bgCard, border:`1px solid ${t.border}`, borderRadius: 10, fontSize: 12, color: t.text, fontWeight: 600, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap: 6 }}>
          <span style={{ fontFamily: window.FONTS.mono }}>↻</span> Re-fetch
        </button>

          <span style={{ fontFamily: window.FONTS.mono }}>◇</span> Validate all
        </button>

            <div style={{ display:'grid', gridTemplateColumns:'42px minmax(0, 1fr)', columnGap: 10, rowGap: 8, alignItems:'start' }}>

}

function MiniMapStat({ label, value, tone, onClick, active }) {
  const { t } = window.useApp();

function MapLine({ label, value, tone }) {

window.MobileDashboard = MobileDashboard;

<script type="text/babel" data-presets="env,react" data-filename="login.jsx">

function LoginScreen({ onSignIn }) {
  const { t, name, toggle } = window.useApp();

  const submit = async () => {
    if (busy) return;

    setBusy(true);

        const res = await window.__arbiterLogin(e, p);

  return (

        <div style={{ flex: 1, display:'flex', flexDirection:'column', justifyContent:'center', maxWidth: 360 }}>

          <div style={{ fontSize: 28, fontWeight: 600, color: t.text, letterSpacing:'-0.02em', lineHeight: 1.2, marginBottom: 12 }}>Resume operations</div>

          <div style={{ marginBottom: 14 }}>

          )}

          <button disabled={busy} onClick={submit} style={{ padding: '12px 16px', background: t.text, color: t.bgCard, border:'none', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: busy ? 'wait' : 'pointer', marginBottom: 14, opacity: busy ? 0.6 : 1 }}>{busy ? 'Signing in…' : 'Sign in →'}</button>

          <div style={{ display:'flex', alignItems:'center', gap: 10, marginBottom: 14 }}>
            <div style={{ flex: 1, height: 1, background: t.border }}/>
            <span style={{ fontSize: 11, color: t.textMuted }}>or continue with</span>
            <div style={{ flex: 1, height: 1, background: t.border }}/>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap: 8 }}>
            <button onClick={() => setError('SSO sign-in is not configured for this deployment.')} style={{ padding: '10px', background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, fontSize: 12, color: t.text, cursor:'pointer', fontWeight: 500 }}>SSO / Okta</button>

        <div style={{ fontSize: 10.5, color: t.textMuted, lineHeight: 1.5, paddingTop: 24, borderTop: `1px solid ${t.border}` }}>

      {/* Right side - status (hidden on mobile) */}

        <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 22, marginBottom: 16 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: t.textDim, fontWeight: 500 }}>Last 24 hours</div>
            <div style={{ display:'flex', gap: 12, fontFamily: window.FONTS.mono, fontSize: 11.5 }}>
              <span style={{ color: t.textDim }}>Scans <span style={{ color: t.text, fontWeight: 600 }}>{(M.health.scanner.scan_count || 0).toLocaleString()}</span></span>
              <span style={{ color: t.textDim }}>Trades <span style={{ color: t.text, fontWeight: 600 }}>{(M.health.execution.total_executions || 0).toLocaleString()}</span></span>
              <span style={{ color: t.textDim }}>Best edge <span style={{ color: t.green, fontWeight: 600 }}>{(() => { const hist = M.health.scanner.history || []; const best = hist.length ? Math.max(...hist.map(h => Number(h.best_edge_cents || 0))) : 0; return best ? window.fmtC(best) : '—'; })()}</span></span>

          <div style={{ width: 28, height: 28, borderRadius: 7, background: t.redSoft, color: t.red, display:'flex', alignItems:'center', justifyContent:'center', fontSize: 14, fontWeight: 700 }}>!</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: t.text }}>Need to halt trading?</div>
            <div style={{ fontSize: 11, color: t.textDim }}>Operators can engage the kill switch from the audit page after sign-in.</div>

      </div>

function StatusTile({ ok, label, detail }) {

  return (
    <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, padding: 16 }}>
      <div style={{ display:'flex', alignItems:'center', gap: 6, marginBottom: 6 }}>
        <span style={{ width: 7, height: 7, borderRadius:'50%', background: ok ? t.green : t.red, animation: 'pulse 2s infinite' }}/>
        <span style={{ fontSize: 11, color: t.textDim, fontWeight: 500 }}>{label}</span>
      </div>
      <div style={{ fontSize: 13, fontWeight: 600, color: ok ? t.green : t.red, marginBottom: 2 }}>{ok ? 'Operational' : 'Degraded'}</div>

window.LoginScreen = LoginScreen;

</script>
