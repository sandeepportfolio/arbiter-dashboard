<script>
// ─────────────────────────────────────────────────────────────────────
// Arbiter API integration layer
//
// Fetches real data from /api/* endpoints, normalises into the same
// shape as window.MOCK (defined in mock-data.js), and falls back to the
// mock values on failure. The function mutates window.MOCK in place so
// every component picking it up at render time gets fresh values.
// ─────────────────────────────────────────────────────────────────────
(() => {
  const API = window.location.protocol === 'file:' ? 'http://localhost:8080' : window.location.origin;
  const AUTH_TOKEN_KEY = 'arbiter-auth-token';
  window.__arbiterAPI = API;

  function readAuthToken() {
    // Prefer sessionStorage, but keep a localStorage fallback so a browser
    // refresh/resume does not leave the shell visually signed in while write
    // endpoints fail with 401.  /api/auth/me still validates the token before
    // exposing operator actions.
    try {
      const sessionToken = sessionStorage.getItem(AUTH_TOKEN_KEY);
      if (sessionToken) return sessionToken;
    } catch (_) {}
    try {
      return localStorage.getItem(AUTH_TOKEN_KEY) || '';
    } catch (_) {
      return '';
    }
  }

  function rememberAuthToken(token) {
    try {
      if (token) sessionStorage.setItem(AUTH_TOKEN_KEY, String(token));
    } catch (_) {}
    try {
      if (token) localStorage.setItem(AUTH_TOKEN_KEY, String(token));
    } catch (_) {}
  }

  function clearAuthToken() {
    try { sessionStorage.removeItem(AUTH_TOKEN_KEY); } catch (_) {}
    try { localStorage.removeItem(AUTH_TOKEN_KEY); } catch (_) {}
  }

  function authHeaders(extra) {
    const headers = Object.assign({}, extra || {});
    const token = readAuthToken();
    if (token && !headers.Authorization) {
      headers.Authorization = 'Bearer ' + token;
    }
    return headers;
  }

  async function authFetch(path, opts) {
    const options = Object.assign({ credentials: 'same-origin' }, opts || {});
    options.headers = authHeaders(options.headers);
    return fetch(API + path, options);
  }

  async function safeJson(path, opts) {
    try {
      const r = await authFetch(path, opts);
      if (!r.ok) return null;
      return await r.json();
    } catch (e) {
      return null;
    }
  }

  function asNumber(x, fallback) {
    const n = Number(x);
    return Number.isFinite(n) ? n : fallback;
  }

  function mergeBalances(M, balances) {
    if (!balances || typeof balances !== 'object') return;
    for (const platform of ['kalshi', 'polymarket']) {
      const b = balances[platform];
      if (b && typeof b === 'object') {
        M.balances[platform] = {
          balance: asNumber(b.balance, M.balances[platform].balance),
          timestamp: asNumber(b.timestamp, M.balances[platform].timestamp),
          is_low: !!b.is_low,
        };
      }
    }
  }

  function mergePnl(M, pnl) {
    if (!pnl || typeof pnl !== 'object') return;
    if (pnl.starting_balances) M.pnl.starting_balances = Object.assign({}, M.pnl.starting_balances, pnl.starting_balances);
    if (pnl.current_balances)  M.pnl.current_balances  = Object.assign({}, M.pnl.current_balances,  pnl.current_balances);
    if (pnl.total_deposits)    M.pnl.total_deposits    = Object.assign({}, M.pnl.total_deposits,    pnl.total_deposits);
    if (pnl.recorded_trading_pnl) M.pnl.recorded_trading_pnl = Object.assign({}, M.pnl.recorded_trading_pnl, pnl.recorded_trading_pnl);
    if (pnl.total_balance != null) M.pnl.total_balance = asNumber(pnl.total_balance, M.pnl.total_balance);
    if (pnl.total_deposits_all_platforms != null) M.pnl.total_deposits_all_platforms = asNumber(pnl.total_deposits_all_platforms, M.pnl.total_deposits_all_platforms);
    if (pnl.net_balance_change != null) M.pnl.net_balance_change = asNumber(pnl.net_balance_change, M.pnl.net_balance_change);
    if (pnl.deployed_capital != null) M.pnl.deployed_capital = asNumber(pnl.deployed_capital, M.pnl.deployed_capital);
    if (pnl.expected_settlement != null) M.pnl.expected_settlement = asNumber(pnl.expected_settlement, M.pnl.expected_settlement);
    if (pnl.expected_profit_at_settlement != null) M.pnl.expected_profit_at_settlement = asNumber(pnl.expected_profit_at_settlement, M.pnl.expected_profit_at_settlement);
    if (pnl.open_positions != null) M.pnl.open_positions = asNumber(pnl.open_positions, M.pnl.open_positions);
  }

  function mergeOpportunities(M, opps) {
    if (!Array.isArray(opps) || opps.length === 0) return;
    M.opportunities = opps.map((o) => {
      const yes = o.yes_platform || 'kalshi';
      const no = o.no_platform || 'polymarket';
      const yesPrice = asNumber(o.yes_price, 0.5);
      const noPrice = asNumber(o.no_price, 0.5);
      const edgeCents = asNumber(o.net_edge_cents, asNumber(o.net_edge, 0) * 100);
      const qty = asNumber(o.suggested_qty, asNumber(o.max_quantity, 100));
      // Backend ArbitrageOpportunity.to_dict uses yes_fee_rate / no_fee_rate
      // and a single min_available_liquidity. Fall back to legacy field names
      // (fee_rate_yes / yes_volume) if anyone hand-rolls payloads.
      const feeYes = asNumber(o.yes_fee_rate, asNumber(o.fee_rate_yes, yes === 'kalshi' ? 0.025 : 0.020));
      const feeNo  = asNumber(o.no_fee_rate,  asNumber(o.fee_rate_no,  no  === 'kalshi' ? 0.025 : 0.020));
      const liquidity = asNumber(o.min_available_liquidity, 5000);
      const ts = asNumber(o.timestamp, asNumber(o.last_seen, Math.floor(Date.now() / 1000)));
      return {
        description: o.description || o.market_name || o.canonical_id || 'Untitled market',
        canonical_id: o.canonical_id || o.id || 'UNKNOWN',
        yes_platform: yes,
        no_platform: no,
        yes_price: yesPrice,
        no_price: noPrice,
        net_edge_cents: edgeCents,
        net_edge: edgeCents / 100,
        status: o.status || 'tradable',
        suggested_qty: qty,
        expected_profit: asNumber(o.expected_profit, asNumber(o.max_profit_usd, edgeCents * qty / 100)),
        yes_volume: asNumber(o.yes_volume, liquidity),
        no_volume: asNumber(o.no_volume, liquidity),
        min_available_liquidity: liquidity,
        fee_rate_yes: feeYes,
        fee_rate_no: feeNo,
        yes_fee_rate: feeYes,
        no_fee_rate: feeNo,
        last_seen: ts,
        timestamp: ts,
        persistence_scans: asNumber(o.persistence_count, asNumber(o.persistence_scans, 1)),
        persistence_count: asNumber(o.persistence_count, asNumber(o.persistence_scans, 1)),
      };
    });
  }

  function mergeExecutions(M, execs) {
    if (!Array.isArray(execs) || execs.length === 0) return;
    M.executions = execs.map((e) => {
      const opp = e.opportunity || {};
      const yp = opp.yes_platform || e.yes_platform || 'kalshi';
      const np = opp.no_platform || e.no_platform || 'polymarket';
      const qty = asNumber(opp.suggested_qty, 0);
      const edgeCents = asNumber(opp.net_edge_cents, asNumber(e.net_edge_cents, 0));
      const expectedProfit = asNumber(e.expected_profit, asNumber(opp.max_profit_usd, edgeCents * qty / 100));
      const normalizedOpp = Object.assign({}, opp, {
        description: opp.description || e.description || opp.canonical_id || e.canonical_id || 'Trade',
        canonical_id: opp.canonical_id || e.canonical_id || 'UNKNOWN',
        yes_platform: yp,
        no_platform: np,
        yes_price: asNumber(opp.yes_price, 0),
        no_price: asNumber(opp.no_price, 0),
        net_edge_cents: edgeCents,
        net_edge: asNumber(opp.net_edge, edgeCents / 100),
        suggested_qty: qty,
        max_profit_usd: asNumber(opp.max_profit_usd, expectedProfit),
        persistence_scans: asNumber(opp.persistence_scans, asNumber(opp.persistence_count, 0)),
        persistence_count: asNumber(opp.persistence_count, asNumber(opp.persistence_scans, 0)),
      });
      return {
        arb_id: e.arb_id || e.id || 'ARB-?',
        status: e.status || 'filled',
        realized_pnl: asNumber(e.realized_pnl, 0),
        expected_profit: expectedProfit,
        expected_cost: asNumber(e.expected_cost, (asNumber(opp.yes_price, 0) + asNumber(opp.no_price, 0)) * qty),
        expected_vs_realized: asNumber(e.expected_vs_realized, asNumber(e.realized_pnl, 0) - expectedProfit),
        status_group: e.status_group || ((['filled','closed','settled','simulated'].includes(String(e.status || '').toLowerCase())) ? 'completed' : (['pending','submitted','recovering'].includes(String(e.status || '').toLowerCase()) ? 'open' : (['failed','aborted','rejected'].includes(String(e.status || '').toLowerCase()) ? 'failed' : String(e.status || 'unknown').toLowerCase()))),
        timestamp: asNumber(e.timestamp, Math.floor(Date.now() / 1000)),
        opportunity: normalizedOpp,
        leg_yes: {
          status: (e.leg_yes && e.leg_yes.status) || 'filled',
          fill_qty: asNumber(e.leg_yes && e.leg_yes.fill_qty, 0),
          fill_price: asNumber(e.leg_yes && e.leg_yes.fill_price, 0),
        },
        leg_no: {
          status: (e.leg_no && e.leg_no.status) || 'filled',
          fill_qty: asNumber(e.leg_no && e.leg_no.fill_qty, 0),
          fill_price: asNumber(e.leg_no && e.leg_no.fill_price, 0),
        },
      };
    });
  }

  function mergeDeposits(M, deps) {
    if (!deps || typeof deps !== 'object') return;
    if (Array.isArray(deps.deposits) && deps.deposits.length) {
      M.deposits.deposits = deps.deposits.map((d) => ({
        type: d.type || 'deposit',
        amount: asNumber(d.amount, 0),
        platform: d.platform || 'kalshi',
        timestamp: asNumber(d.timestamp, Math.floor(Date.now() / 1000)),
      }));
    }
    if (deps.total_all != null) M.deposits.total_all = asNumber(deps.total_all, M.deposits.total_all);
  }

  function mergeHealth(M, health) {
    if (!health || typeof health !== 'object') return;
    if (health.status) M.health.status = health.status;
    if (health.uptime_seconds != null) M.health.uptime_seconds = asNumber(health.uptime_seconds, M.health.uptime_seconds);
    if (health.live_trading_ready != null) M.health.live_trading_ready = !!health.live_trading_ready;
    if (health.scanner) {
      const s = health.scanner;
      M.health.scanner.scan_count = asNumber(s.scan_count, M.health.scanner.scan_count);
      M.health.scanner.published = asNumber(s.published, M.health.scanner.published);
      M.health.scanner.scan_time_ms = asNumber(s.scan_time_ms, asNumber(s.last_scan_ms, M.health.scanner.scan_time_ms));
      M.health.scanner.active_opportunities = asNumber(s.active_opportunities, M.health.scanner.active_opportunities);
      M.health.scanner.tradable_opportunities = asNumber(s.tradable_opportunities, M.health.scanner.tradable_opportunities);
      M.health.scanner.manual_opportunities = asNumber(s.manual_opportunities, M.health.scanner.manual_opportunities);
      M.health.scanner.best_edge_cents = asNumber(s.best_edge_cents, M.health.scanner.best_edge_cents);
      M.health.scanner.persistence_scans = asNumber(s.persistence_scans, M.health.scanner.persistence_scans);
      M.health.scanner.max_quote_age_seconds = asNumber(s.max_quote_age_seconds, M.health.scanner.max_quote_age_seconds);
      M.health.scanner.min_liquidity = asNumber(s.min_liquidity, M.health.scanner.min_liquidity);
      M.health.scanner.confidence_threshold = asNumber(s.confidence_threshold, M.health.scanner.confidence_threshold);
      if (s.paused != null) M.health.scanner.paused = !!s.paused;
      // Keep history if backend doesn't expose one (dashboard chart needs data).
      if (Array.isArray(s.history) && s.history.length) M.health.scanner.history = s.history;
    }
    if (health.execution) {
      const x = health.execution;
      M.health.execution.total_executions = asNumber(x.total_executions, M.health.execution.total_executions);
      M.health.execution.filled = asNumber(x.filled, M.health.execution.filled);
      M.health.execution.failed = asNumber(x.failed, M.health.execution.failed);
      M.health.execution.recovering = asNumber(x.recovering, M.health.execution.recovering);
    }
    if (health.audit) {
      if (health.audit.audit_score != null) M.health.audit.audit_score = asNumber(health.audit.audit_score, M.health.audit.audit_score);
      if (health.audit.audits_run != null) M.health.audit.audits_run = asNumber(health.audit.audits_run, M.health.audit.audits_run);
      if (health.audit.total_flags != null) M.health.audit.total_flags = asNumber(health.audit.total_flags, M.health.audit.total_flags);
      if (health.audit.critical_flags != null) M.health.audit.critical_flags = asNumber(health.audit.critical_flags, M.health.audit.critical_flags);
      if (health.audit.pass_rate != null) M.health.audit.pass_rate = asNumber(health.audit.pass_rate, M.health.audit.pass_rate);
      if (Array.isArray(health.audit.recent_results)) M.health.audit.recent_results = health.audit.recent_results;
    } else if (health.execution && health.execution.audit && Array.isArray(health.execution.audit.recent_results)) {
      M.health.audit.recent_results = health.execution.audit.recent_results;
    }
    if (health.profitability) {
      if (health.profitability.verdict) M.health.profitability.verdict = health.profitability.verdict;
      if (health.profitability.cumulative_pnl != null) M.health.profitability.cumulative_pnl = asNumber(health.profitability.cumulative_pnl, M.health.profitability.cumulative_pnl);
      if (health.profitability.published_opportunities != null) M.health.profitability.published_opportunities = asNumber(health.profitability.published_opportunities, M.health.profitability.published_opportunities);
      if (health.profitability.active_opportunities != null) M.health.profitability.active_opportunities = asNumber(health.profitability.active_opportunities, M.health.profitability.active_opportunities);
      if (health.profitability.average_edge_cents != null) M.health.profitability.average_edge_cents = asNumber(health.profitability.average_edge_cents, M.health.profitability.average_edge_cents);
      if (health.profitability.best_edge_cents != null) M.health.profitability.best_edge_cents = asNumber(health.profitability.best_edge_cents, M.health.profitability.best_edge_cents);
    }
    if (health.reconciliation) {
      if (health.reconciliation.reconciliation_count != null) M.health.reconciliation.reconciliation_count = asNumber(health.reconciliation.reconciliation_count, M.health.reconciliation.reconciliation_count);
      if (health.reconciliation.flag_count != null) M.health.reconciliation.flag_count = asNumber(health.reconciliation.flag_count, M.health.reconciliation.flag_count);
    }
    if (health.readiness) {
      if (health.readiness.gates != null) M.health.readiness.gates = asNumber(health.readiness.gates, M.health.readiness.gates);
      if (health.readiness.passing != null) M.health.readiness.passing = asNumber(health.readiness.passing, M.health.readiness.passing);
      if (Array.isArray(health.readiness.checks)) {
        M.health.readiness.gates = health.readiness.checks.length;
        M.health.readiness.passing = health.readiness.checks.filter(c => c && c.status === 'pass').length;
      }
      if (health.readiness.ready_for_live_trading != null) M.health.readiness.ready = !!health.readiness.ready_for_live_trading;
      else if (health.readiness.ready != null) M.health.readiness.ready = !!health.readiness.ready;
    }
  }

  function mergeMappings(M, rows) {
    if (!Array.isArray(rows) || rows.length === 0) return;
    M.mappings = rows;
  }

  function mergeDiscovery(M, discovery) {
    if (!discovery || typeof discovery !== 'object') return;
    M.discovery = Object.assign({}, M.discovery || {}, discovery);
    if (!M.discovery.counts || typeof M.discovery.counts !== 'object') M.discovery.counts = {};
    if (!M.discovery.rejection_reasons || typeof M.discovery.rejection_reasons !== 'object') M.discovery.rejection_reasons = {};
    if (!Array.isArray(M.discovery.events)) M.discovery.events = [];
  }

  function mergeSettings(M, settings) {
    if (!settings || typeof settings !== 'object') return;
    M.settings = settings;
  }

  function mergeReconciliation(M, recon) {
    if (!recon || typeof recon !== 'object') return;
    if (recon.reconciliation_count != null) M.health.reconciliation.reconciliation_count = asNumber(recon.reconciliation_count, M.health.reconciliation.reconciliation_count);
    if (recon.flag_count != null) M.health.reconciliation.flag_count = asNumber(recon.flag_count, M.health.reconciliation.flag_count);
  }

  function mergeReadiness(M, readiness) {
    if (!readiness || typeof readiness !== 'object') return;
    if (readiness.gates != null) M.health.readiness.gates = asNumber(readiness.gates, M.health.readiness.gates);
    if (readiness.passing != null) M.health.readiness.passing = asNumber(readiness.passing, M.health.readiness.passing);
    if (Array.isArray(readiness.checks)) {
      M.health.readiness.gates = readiness.checks.length;
      M.health.readiness.passing = readiness.checks.filter(c => c && c.status === 'pass').length;
    }
    if (readiness.ready_for_live_trading != null) M.health.readiness.ready = !!readiness.ready_for_live_trading;
    else if (readiness.ready != null) M.health.readiness.ready = !!readiness.ready;
  }

  function mergeProfitability(M, prof) {
    if (!prof || typeof prof !== 'object') return;
    if (prof.verdict) M.health.profitability.verdict = prof.verdict;
    if (prof.cumulative_pnl != null) M.health.profitability.cumulative_pnl = asNumber(prof.cumulative_pnl, M.health.profitability.cumulative_pnl);
    if (prof.published_opportunities != null) M.health.profitability.published_opportunities = asNumber(prof.published_opportunities, M.health.profitability.published_opportunities);
    if (prof.active_opportunities != null) M.health.profitability.active_opportunities = asNumber(prof.active_opportunities, M.health.profitability.active_opportunities);
    if (prof.average_edge_cents != null) M.health.profitability.average_edge_cents = asNumber(prof.average_edge_cents, M.health.profitability.average_edge_cents);
    if (prof.best_edge_cents != null) M.health.profitability.best_edge_cents = asNumber(prof.best_edge_cents, M.health.profitability.best_edge_cents);
  }

  function mergeFailedTrades(M, rows) {
    M.failedTrades = Array.isArray(rows) ? rows : [];
  }

  function mergeErrors(M, rows) {
    M.errors = Array.isArray(rows) ? rows : [];
  }

  function mergePortfolio(M, p) {
    if (!p || typeof p !== 'object') return;
    M.portfolio = {
      positions: Array.isArray(p.positions) ? p.positions : [],
      violations: Array.isArray(p.violations) ? p.violations : [],
      total_exposure: asNumber(p.total_exposure, 0),
      unrealized_pnl: asNumber(p.unrealized_pnl, 0),
    };
  }

  // Equity curve builder: backend has no historical equity store yet, so
  // we synthesize one. On first load we walk back through executions and
  // subtract realized_pnl in reverse to estimate the balance at each fill,
  // anchoring the rightmost point at the current total balance. On every
  // subsequent refresh we just append a fresh point (ring-buffered so the
  // chart doesn't grow unbounded over a long session).
  const EQUITY_MAX_POINTS = 240;
  function ensureEquityFallback(M) {
    const total = asNumber(M.pnl.total_balance, 0)
      || asNumber(M.balances.kalshi.balance, 0) + asNumber(M.balances.polymarket.balance, 0);
    const now = Math.floor(Date.now() / 1000);

    // First-time seeding: build from execution history (newest → oldest), then
    // sort ascending so the chart renders left-to-right.
    if (!Array.isArray(M.equity) || M.equity.length === 0) {
      const execs = Array.isArray(M.executions) ? [...M.executions] : [];
      execs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      // Walk forward from a synthesized starting balance, accumulating P&L.
      const totalPnlSeen = execs.reduce((s, e) => s + asNumber(e.realized_pnl, 0), 0);
      let running = total - totalPnlSeen;
      const seeded = [];
      // Add a starting anchor at least 1h before the first exec (or now − 1h).
      const firstTs = execs.length ? (execs[0].timestamp || now) - 60 : now - 3600;
      seeded.push({ t: firstTs, v: +running.toFixed(2) });
      for (const e of execs) {
        running += asNumber(e.realized_pnl, 0);
        seeded.push({ t: asNumber(e.timestamp, now), v: +running.toFixed(2) });
      }
      // Always cap with current balance as the rightmost point.
      seeded.push({ t: now, v: +total.toFixed(2) });
      M.equity = seeded;
      return;
    }

    // Subsequent refreshes: append a new point if the value or timestamp
    // moved meaningfully, then trim to the ring-buffer cap.
    const last = M.equity[M.equity.length - 1];
    const drift = Math.abs((last?.v ?? 0) - total);
    const dt = now - (last?.t ?? 0);
    if (dt >= 5 || drift >= 0.005) {
      M.equity.push({ t: now, v: +total.toFixed(2) });
    }
    if (M.equity.length > EQUITY_MAX_POINTS) {
      M.equity.splice(0, M.equity.length - EQUITY_MAX_POINTS);
    }
  }

  // Scanner history ring buffer. The /api/health response gives us the
  // *current* scan_count / scan_time_ms / etc. — the dashboard charts
  // need a time series, so we build one client-side: every refresh
  // pushes a new point. Capped at SCANNER_MAX_POINTS so the buffer stays
  // bounded over a long session.
  const SCANNER_MAX_POINTS = 60;

  function edgeTelemetrySamples(M) {
    const rows = [];
    const seen = new Set();
    const push = (row) => {
      const edge = asNumber(row.net_edge_cents, 0);
      if (!Number.isFinite(edge) || edge <= 0) return;
      const key = `${row.source || 'sample'}:${row.canonical_id || ''}:${row.timestamp || ''}:${edge.toFixed(4)}:${row.yes_platform || ''}:${row.no_platform || ''}`;
      if (seen.has(key)) return;
      seen.add(key);
      rows.push(Object.assign({}, row, { net_edge_cents: +edge.toFixed(4) }));
    };
    for (const o of Array.isArray(M.opportunities) ? M.opportunities : []) {
      push({ source: 'active', canonical_id: o.canonical_id, description: o.description, yes_platform: o.yes_platform, no_platform: o.no_platform, timestamp: o.timestamp || o.last_seen, net_edge_cents: o.net_edge_cents });
    }
    const audits = Array.isArray(M.health && M.health.audit && M.health.audit.recent_results) ? M.health.audit.recent_results : [];
    for (const r of audits) {
      const shadow = r.shadow || {};
      if (shadow.net_edge_cents == null) continue;
      push({ source: 'audit', canonical_id: r.canonical_id, description: r.canonical_id || 'Audited market', yes_platform: r.yes_platform, no_platform: r.no_platform, timestamp: r.timestamp, net_edge_cents: shadow.net_edge_cents, expected_profit: shadow.max_profit_usd });
    }
    if (!rows.length && asNumber(M.health && M.health.scanner && M.health.scanner.best_edge_cents, 0) > 0) {
      push({ source: 'scanner', canonical_id: 'scanner-best-edge', description: 'Scanner best edge', timestamp: Math.floor(Date.now() / 1000), net_edge_cents: M.health.scanner.best_edge_cents });
    }
    if (!rows.length && asNumber(M.health && M.health.profitability && M.health.profitability.best_edge_cents, 0) > 0) {
      push({ source: 'profitability', canonical_id: 'profitability-best-edge', description: 'Profitability best edge', timestamp: Math.floor(Date.now() / 1000), net_edge_cents: M.health.profitability.best_edge_cents });
      if (asNumber(M.health && M.health.profitability && M.health.profitability.average_edge_cents, 0) > 0) {
        push({ source: 'profitability', canonical_id: 'profitability-average-edge', description: 'Profitability average edge', timestamp: Math.floor(Date.now() / 1000) - 1, net_edge_cents: M.health.profitability.average_edge_cents });
      }
    }
    return rows.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  }

  function bestTelemetryEdge(M) {
    const samples = edgeTelemetrySamples(M);
    const sampleBest = samples.length ? Math.max(...samples.map(s => asNumber(s.net_edge_cents, 0))) : 0;
    return Math.max(sampleBest, asNumber(M.health && M.health.scanner && M.health.scanner.best_edge_cents, 0), asNumber(M.health && M.health.profitability && M.health.profitability.best_edge_cents, 0));
  }

  window.edgeTelemetrySamples = edgeTelemetrySamples;
  window.bestTelemetryEdge = bestTelemetryEdge;

  function appendScannerHistory(M) {
    const now = Math.floor(Date.now() / 1000);
    const opps = Array.isArray(M.opportunities) ? M.opportunities : [];
    const tradableFromRows = opps.filter(o => o.status === 'tradable').length;
    const activeFromHealth = asNumber(M.health.scanner.active_opportunities, 0);
    const tradable = asNumber(M.health.scanner.tradable_opportunities, tradableFromRows);
    const bestEdge = bestTelemetryEdge(M);
    const point = {
      t: now,
      timestamp: now,
      scan_count: asNumber(M.health.scanner.scan_count, 0),
      scan_time_ms: asNumber(M.health.scanner.scan_time_ms, 0),
      published: asNumber(M.health.scanner.published, 0),
      active_opportunities: activeFromHealth || opps.length,
      tradable,
      best_edge_cents: +bestEdge.toFixed(2),
    };
    if (!Array.isArray(M.health.scanner.history)) M.health.scanner.history = [];
    M.health.scanner.history.push(point);
    if (M.health.scanner.history.length > SCANNER_MAX_POINTS) {
      M.health.scanner.history.splice(0, M.health.scanner.history.length - SCANNER_MAX_POINTS);
    }
  }

  // Edge-bucket histogram for the Overview "Edge distribution" card.
  // Computed at refresh time from current opportunities; fixed buckets
  // mirror the strategy thresholds so operators can quickly see how many
  // opportunities are clearing each tier.
  function computeEdgeBuckets(M) {
    const buckets = [
      { range: '0–1¢',  min: 0,   max: 1,  count: 0 },
      { range: '1–2¢',  min: 1,   max: 2,  count: 0 },
      { range: '2–3¢',  min: 2,   max: 3,  count: 0 },
      { range: '3–5¢',  min: 3,   max: 5,  count: 0 },
      { range: '5¢+',   min: 5,   max: Infinity, count: 0 },
    ];
    const samples = edgeTelemetrySamples(M);
    for (const o of samples) {
      const e = asNumber(o.net_edge_cents, 0);
      for (const b of buckets) {
        if (e >= b.min && e < b.max) { b.count += 1; break; }
      }
    }
    M.edgeBuckets = buckets.map(({ range, count }) => ({ range, count }));
    M.edgeBucketSampleCount = samples.length;
    M.edgeBucketSource = samples.some(s => s.source === 'active') ? 'active' : samples.some(s => s.source === 'audit') ? 'audit' : samples.length ? 'telemetry' : 'none';
  }

  async function refresh() {
    const M = window.MOCK;
    if (!M) return;
    const [health, balances, opps, execs, pnl, deposits,
           confirmedMappings, candidateMappings, reviewMappings, rejectedMappings, expiredMappings,
           settings, reconciliation, readiness, profitability,
           failedTrades, errors, portfolio, discovery] = await Promise.all([
      safeJson('/api/health'),
      safeJson('/api/balances'),
      safeJson('/api/opportunities'),
      safeJson('/api/executions'),
      safeJson('/api/pnl'),
      safeJson('/api/deposits'),
      safeJson('/api/mappings?status=confirmed&limit=5000'),
      safeJson('/api/mappings?status=candidate&limit=5000'),
      safeJson('/api/mappings?status=review&limit=5000'),
      safeJson('/api/mappings?status=rejected&limit=200'),
      safeJson('/api/mappings?status=expired&limit=200'),
      safeJson('/api/settings'),
      safeJson('/api/reconciliation'),
      safeJson('/api/readiness'),
      safeJson('/api/profitability'),
      safeJson('/api/failed-trades'),
      safeJson('/api/errors'),
      safeJson('/api/portfolio'),
      safeJson('/api/discovery/status'),
    ]);
    mergeHealth(M, health);
    mergeBalances(M, balances);
    mergeOpportunities(M, opps);
    mergeExecutions(M, execs);
    mergePnl(M, pnl);
    mergeDeposits(M, deposits);
    mergeMappings(M, [
      ...(Array.isArray(confirmedMappings) ? confirmedMappings : []),
      ...(Array.isArray(candidateMappings) ? candidateMappings : []),
      ...(Array.isArray(reviewMappings) ? reviewMappings : []),
      ...(Array.isArray(rejectedMappings) ? rejectedMappings : []),
      ...(Array.isArray(expiredMappings) ? expiredMappings : []),
    ]);
    mergeSettings(M, settings);
    mergeReconciliation(M, reconciliation);
    mergeReadiness(M, readiness);
    mergeProfitability(M, profitability);
    mergeFailedTrades(M, failedTrades);
    mergeErrors(M, errors);
    mergePortfolio(M, portfolio);
    mergeDiscovery(M, discovery);
    // Synthesize the time-series data the dashboard charts need but the
    // backend doesn't yet expose: equity curve, scanner history, edge
    // bucket histogram. Each runs every refresh to keep charts moving.
    ensureEquityFallback(M);
    appendScannerHistory(M);
    computeEdgeBuckets(M);
    M.lastFetch = Date.now();
    M.loaded = true;
  }

  async function readError(r) {
    try {
      const j = await r.json();
      if (j && j.error) return j.error;
    } catch {}
    return 'HTTP ' + r.status;
  }

  // ── Operator actions (write endpoints) ──────────────────────────────
  // POST /api/kill-switch expects {action: "arm"|"reset", reason?, note?}.
  // arm: requires non-empty reason; reset: respects safety cooldown.
  async function killSwitch(armed, opts) {
    opts = opts || {};
    try {
      const body = armed
        ? { action: 'arm',   reason: String(opts.reason || '').trim() }
        : { action: 'reset', note:   String(opts.note || 'operator reset').trim() };
      if (armed && !body.reason) {
        return { ok: false, error: 'reason required to arm kill switch' };
      }
      const r = await authFetch('/api/kill-switch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, state: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  async function retryFailedTrade(arbId) {
    try {
      const r = await authFetch('/api/failed-trades/' + encodeURIComponent(arbId) + '/retry', {
        method: 'POST',
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  // POST /api/deposits — record a deposit/withdrawal (or set initial capital
  // when type === 'initial_capital'). Body: {platform, amount, type?}.
  async function recordDeposit({ platform, amount, type } = {}) {
    try {
      const body = { platform: String(platform || '').toLowerCase(), amount: Number(amount) };
      if (type) body.type = String(type);
      if (!body.platform || !Number.isFinite(body.amount) || body.amount === 0) {
        return { ok: false, error: 'platform and non-zero amount required' };
      }
      const r = await authFetch('/api/deposits', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  // GET /api/live-prices/{canonical_id} — fresh per-platform quotes for one
  // market. Returned by the dashboard when an operator wants to inspect a
  // failed-arb retry or scan a single market on demand.
  async function liveMarketPrices(canonicalId) {
    if (!canonicalId) return { ok: false, error: 'canonical_id required' };
    try {
      const r = await authFetch('/api/live-prices/' + encodeURIComponent(canonicalId));
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  // POST /api/settings — operator settings patch. Body matches the nested
  // structure returned by GET /api/settings (scanner / alerts / auto_executor
  // / mapping). Returns the post-update snapshot on success.
  async function updateSettings(patch) {
    if (!patch || typeof patch !== 'object') {
      return { ok: false, error: 'settings patch required' };
    }
    try {
      const r = await authFetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(patch),
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  // POST /api/scanner/control — pause or resume the scanning loop.
  // action ∈ {"pause", "resume"}.
  async function scannerControl(action) {
    const norm = String(action || '').toLowerCase();
    if (norm !== 'pause' && norm !== 'resume') {
      return { ok: false, error: 'action must be pause or resume' };
    }
    try {
      const r = await authFetch('/api/scanner/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: norm }),
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  async function discoveryStatus() {
    try {
      const r = await fetch(API + '/api/discovery/status', {
        method: 'GET',
        credentials: 'same-origin',
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  async function batchDiscover(payload) {
    try {
      const r = await authFetch('/api/batch-discover', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {}),
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  // POST /api/market-mappings/{canonical_id} — operator action on a candidate
  // mapping. Body: {action, note?, resolution_criteria?, resolution_match_status?}.
  // Common actions: "confirm", "review", "reject", "enable_auto_trade",
  // "disable_auto_trade".
  async function mappingAction(canonicalId, action, extra) {
    const id = String(canonicalId || '').trim();
    const act = String(action || '').toLowerCase().trim();
    if (!id || !act) {
      return { ok: false, error: 'canonical_id and action required' };
    }
    try {
      const body = Object.assign({ action: act }, extra || {});
      const r = await authFetch('/api/market-mappings/' + encodeURIComponent(id), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  async function mappingValidationHistory(canonicalId) {
    const id = String(canonicalId || '').trim();
    if (!id) return { ok: false, error: 'canonical_id required' };
    try {
      const r = await authFetch('/api/market-mappings/' + encodeURIComponent(id) + '/validation', {
        method: 'GET',
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  async function runMappingValidation(canonicalId) {
    const id = String(canonicalId || '').trim();
    if (!id) return { ok: false, error: 'canonical_id required' };
    try {
      const r = await authFetch('/api/market-mappings/' + encodeURIComponent(id) + '/validate', {
        method: 'POST',
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  // POST /api/auth/login — returns {status, email, token}; backend also sets
  // the arbiter_session cookie. Body: {email, password}.
  async function login(email, password) {
    const e = String(email || '').trim();
    const p = String(password || '');
    if (!e || !p) return { ok: false, error: 'email and password required' };
    try {
      const r = await fetch(API + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ email: e, password: p }),
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      const data = await r.json();
      rememberAuthToken(data && data.token);
      return { ok: true, data };
    } catch (err) {
      return { ok: false, error: String((err && err.message) || err) };
    }
  }

  async function authMe() {
    try {
      const r = await authFetch('/api/auth/me', { method: 'GET' });
      if (!r.ok) return { ok: false, status: r.status, error: await readError(r) };
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, status: 0, error: String((e && e.message) || e) };
    }
  }

  // POST /api/auth/logout — invalidates the session cookie.
  async function logout() {
    try {
      const r = await authFetch('/api/auth/logout', {
        method: 'POST',
      });
      if (!r.ok) return { ok: false, error: await readError(r) };
      clearAuthToken();
      return { ok: true, data: await r.json() };
    } catch (e) {
      return { ok: false, error: String((e && e.message) || e) };
    }
  }

  window.__arbiterRefresh = refresh;
  window.__arbiterKillSwitch = killSwitch;
  window.__arbiterRetry = retryFailedTrade;
  window.__arbiterDeposit = recordDeposit;
  window.__arbiterLivePrices = liveMarketPrices;
  window.__arbiterUpdateSettings = updateSettings;
  window.__arbiterScannerControl = scannerControl;
  window.__arbiterDiscoveryStatus = discoveryStatus;
  window.__arbiterBatchDiscover = batchDiscover;
  window.__arbiterMappingAction = mappingAction;
  window.__arbiterMappingValidationHistory = mappingValidationHistory;
  window.__arbiterRunMappingValidation = runMappingValidation;
  window.__arbiterLogin = login;
  window.__arbiterLogout = logout;
  window.__arbiterAuthMe = authMe;
  window.__arbiterRememberAuthToken = rememberAuthToken;
  window.__arbiterClearAuthToken = clearAuthToken;

  // Translate UI setting keys (used by the Settings page sliders) into the
  // backend's nested settings payload. Returns null when the key isn't
  // mapped to a server-side field — callers should still update local
  // state in that case.
  window.__arbiterSettingsPatch = function(uiKey, value) {
    switch (uiKey) {
      case 'minEdge':     return { scanner: { min_edge_cents: Number(value) } };
      case 'minVolume':   return { scanner: { min_liquidity: Number(value) } };
      case 'persistence': return { scanner: { persistence_scans: parseInt(value, 10) } };
      case 'maxPos':      return { scanner: { max_position_usd: Number(value) } };
      case 'autoExec':    return { auto_executor: { enabled: value === 'on' || value === true } };
      default: return null;
    }
  };
})();
</script>
<script type="text/babel" data-presets="env,react" data-filename="charts.jsx">
// SVG chart primitives — area chart, sparkline, bar, donut.
// Pure React components, no external libs. All accept a `theme` prop with
// stroke/fill/grid colors so they can be reskinned per aesthetic.

const { useMemo, useState, useRef, useEffect } = React;

function buildPath(points, width, height, pad = 4) {
  if (!points.length) return { area: '', line: '', dots: [], yMin: 0, yMax: 0 };
  const W = width - pad * 2;
  const H = height - pad * 2;
  // Single-point series — render as a flat line at the point's value so the
  // chart conveys "we have a value, no movement yet" instead of vanishing.
  if (points.length === 1) {
    const v = points[0].y;
    const midY = pad + H / 2;
    const mapped = [
      { x: pad,         y: midY },
      { x: pad + W,     y: midY },
    ];
    const line = `M${mapped[0].x},${mapped[0].y} L${mapped[1].x},${mapped[1].y}`;
    const area = `${line} L${mapped[1].x},${pad + H} L${mapped[0].x},${pad + H} Z`;
    return { area, line, dots: mapped, yMin: v, yMax: v };
  }
  const xs = points.map(p => p.x);
  const ys = points.map(p => p.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const xRange = xMax - xMin || 1;
  const yRange = yMax - yMin || 1;
  const mapped = points.map(p => ({
    x: pad + ((p.x - xMin) / xRange) * W,
    // When all y-values are identical (yRange === 0), pin the line to the
    // vertical center of the chart so it reads as "flat" rather than
    // collapsing to the bottom edge.
    y: yMax === yMin ? pad + H / 2 : pad + H - ((p.y - yMin) / yRange) * H,
  }));
  const line = mapped.map((p, i) => (i === 0 ? `M${p.x},${p.y}` : `L${p.x},${p.y}`)).join(' ');
  const area = `${line} L${mapped[mapped.length - 1].x},${pad + H} L${mapped[0].x},${pad + H} Z`;
  return { area, line, dots: mapped, yMin, yMax };
}

const RANGE_SECONDS = {
  '1h': 60 * 60,
  '6h': 6 * 60 * 60,
  '24h': 24 * 60 * 60,
  '7d': 7 * 24 * 60 * 60,
  '30d': 30 * 24 * 60 * 60,
  '90d': 90 * 24 * 60 * 60,
  all: Infinity,
};
function rangeSeconds(range) {
  const key = String(range || 'All').toLowerCase();
  return Object.prototype.hasOwnProperty.call(RANGE_SECONDS, key) ? RANGE_SECONDS[key] : Infinity;
}
function pointTimestamp(row, index, key) {
  const raw = row && (key ? row[key] : (row.t ?? row.timestamp ?? row.time));
  const n = Number(raw);
  return Number.isFinite(n) ? n : index;
}
window.filterTimeSeries = function(data, range) {
  const arr = Array.isArray(data) ? data.filter(Boolean) : [];
  const seconds = rangeSeconds(range);
  if (!arr.length || !Number.isFinite(seconds)) return arr;
  const cutoff = Math.floor(Date.now() / 1000) - seconds;
  const meta = arr.map((d, i) => ({ d, i, ts: pointTimestamp(d, i) }));
  const filtered = meta.filter(p => p.ts >= cutoff);
  const before = [...meta].reverse().find(p => p.ts < cutoff);
  let out = before && filtered.length ? [before, ...filtered] : filtered;
  if (!out.length) out = meta.slice(-1);
  if (out.length === 1 && meta.length > 1) {
    const idx = out[0].i;
    if (idx > 0) out = [meta[idx - 1], out[0]];
  }
  return out.map(p => p.d);
};
window.filterRowsByRange = function(rows, range, key) {
  const arr = Array.isArray(rows) ? rows : [];
  const seconds = rangeSeconds(range);
  if (!arr.length || !Number.isFinite(seconds)) return arr;
  const cutoff = Math.floor(Date.now() / 1000) - seconds;
  return arr.filter((row, i) => pointTimestamp(row, i, key || 'timestamp') >= cutoff);
};
window.seriesDelta = function(series) {
  const arr = Array.isArray(series) ? series : [];
  if (arr.length < 2) return 0;
  const first = Number(arr[0]?.v);
  const last = Number(arr[arr.length - 1]?.v);
  if (!Number.isFinite(first) || !Number.isFinite(last)) return 0;
  return +(last - first).toFixed(2);
};

// ── AreaChart ─────────────────────────────────────────────────────────
function AreaChart({ data, width = 600, height = 200, stroke, fill, grid, showAxis = true, showGrid = true, currency = true, accentDot = true, axisColor, dotRingColor }) {
  const { t: theme } = window.useApp() || { t: window.THEMES.light };
  stroke = stroke || theme.accent;
  grid = grid || theme.border;
  axisColor = axisColor || theme.textMuted;
  dotRingColor = dotRingColor || theme.bgCard;
  const [hover, setHover] = useState(null);
  const ref = useRef(null);
  const gradId = useMemo(() => 'area-grad-' + Math.random().toString(36).slice(2), []);
  const safeData = Array.isArray(data) ? data : [];
  const points = safeData.map((d, i) => ({ x: pointTimestamp(d, i), y: Number(d.v), t: d.t })).filter(p => Number.isFinite(p.y));
  const { area, line, dots, yMin = 0, yMax = 0 } = buildPath(points, width, height, 8);

  const onMove = e => {
    if (!ref.current) return;
    const rect = ref.current.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * width;
    let nearest = 0, dmin = Infinity;
    for (let i = 0; i < dots.length; i++) {
      const d = Math.abs(dots[i].x - x);
      if (d < dmin) { dmin = d; nearest = i; }
    }
    setHover(nearest);
  };

  const fmt = v => currency ? '$' + v.toFixed(2) : v.toFixed(2);
  const ticks = showGrid ? [0.25, 0.5, 0.75].map(p => 8 + (height - 16) * p) : [];

  return (
    <svg ref={ref} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%', display: 'block' }} onMouseMove={onMove} onMouseLeave={() => setHover(null)}>
      {ticks.map((y, i) => (
        <line key={i} x1="0" x2={width} y1={y} y2={y} stroke={grid} strokeDasharray="2 4" />
      ))}
      <defs>
        <linearGradient id={gradId} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={stroke} stopOpacity="0.32" />
          <stop offset="100%" stopColor={stroke} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${gradId})`} />
      <path d={line} fill="none" stroke={stroke} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
      {accentDot && dots.length > 0 && (
        <circle cx={dots[dots.length - 1].x} cy={dots[dots.length - 1].y} r="3" fill={stroke} />
      )}
      {hover != null && dots[hover] && (
        <g>
          <line x1={dots[hover].x} x2={dots[hover].x} y1="0" y2={height} stroke={stroke} strokeOpacity="0.4" strokeDasharray="2 2" />
          <circle cx={dots[hover].x} cy={dots[hover].y} r="3.5" fill={stroke} stroke={dotRingColor} strokeWidth="1" />
        </g>
      )}
      {showAxis && (
        <>
          <text x="4" y="14" fontSize="9" fill={axisColor} fontFamily="ui-monospace,monospace">{fmt(yMax)}</text>
          <text x="4" y={height - 4} fontSize="9" fill={axisColor} fontFamily="ui-monospace,monospace">{fmt(yMin)}</text>
        </>
      )}
    </svg>
  );
}

// ── Sparkline ────────────────────────────────────────────────────────
function Sparkline({ data, width = 120, height = 32, stroke, fill }) {
  const { t: theme } = window.useApp() || { t: window.THEMES.light };
  stroke = stroke || theme.accent;
  fill = fill || (theme.accent + '22');
  const safeData = Array.isArray(data) ? data : [];
  const points = safeData.map((v, i) => ({ x: i, y: typeof v === 'object' && v !== null ? v.v : v }));
  const { area, line } = buildPath(points, width, height, 2);
  return (
    <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%', display: 'block' }}>
      <path d={area} fill={fill} />
      <path d={line} fill="none" stroke={stroke} strokeWidth="1.5" strokeLinejoin="round" />
    </svg>
  );
}

// ── BarChart ─────────────────────────────────────────────────────────
function BarChart({ data, width = 360, height = 160, color, labelColor, valueLabel = true, accent, emptyLabel }) {
  const { t: theme } = window.useApp() || { t: window.THEMES.light };
  color = color || theme.bgHover;
  labelColor = labelColor || theme.textDim;
  const safeData = Array.isArray(data) ? data : [];
  // No bars at all — show a placeholder line of text inside the SVG so the
  // chart area conveys "we know it's empty" rather than blank space.
  const total = safeData.reduce((s, d) => s + (d.count || 0), 0);
  if (!safeData.length || total === 0) {
    const msg = emptyLabel || 'No data yet';
    return (
      <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%', display: 'block' }}>
        <text x={width / 2} y={height / 2} textAnchor="middle" fontSize="11" fill={labelColor} fontFamily={window.FONTS.sans}>{msg}</text>
      </svg>
    );
  }
  const max = Math.max(1, ...safeData.map(d => d.count || 0));
  const padX = 12;
  const padY = 10;
  // Reserve space for the longest range label (chars * ~6.2px at fontSize 10 mono) and value label
  const labelW = Math.max(...safeData.map(d => String(d.range).length)) * 6.4 + 8;
  const valueW = valueLabel ? (String(max).length * 6.4 + 8) : 0;
  const trackX = padX + labelW;
  const trackW = width - trackX - padX - valueW;
  const rowH = (height - padY * 2) / safeData.length;
  const barH = Math.max(8, rowH - 6);
  return (
    <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%', display: 'block' }}>
      {safeData.map((d, i) => {
        const w = ((d.count || 0) / max) * trackW;
        const y = padY + i * rowH + (rowH - barH) / 2;
        const cy = y + barH / 2 + 3.5;
        const isAccent = accent && d.count >= max * 0.55;
        return (
          <g key={i}>
            <text x={trackX - 6} y={cy} textAnchor="end" fontSize="10" fill={labelColor} fontFamily="ui-monospace,monospace">{d.range}</text>
            <rect x={trackX} y={y} width={Math.max(2, w)} height={barH} fill={isAccent ? (accent || color) : color} rx="2" />
            {valueLabel && <text x={trackX + Math.max(2, w) + 6} y={cy} fontSize="10" fill={labelColor} fontFamily="ui-monospace,monospace">{d.count}</text>}
          </g>
        );
      })}
    </svg>
  );
}

// ── Donut ────────────────────────────────────────────────────────────
function Donut({ slices, size = 140, thickness = 18, label, sublabel, labelColor, dimColor, trackColor }) {
  const { t: theme } = window.useApp() || { t: window.THEMES.light };
  labelColor = labelColor || theme.text;
  dimColor = dimColor || theme.textMuted;
  trackColor = trackColor || theme.bgSubtle;
  const safeSlices = Array.isArray(slices) ? slices : [];
  const total = safeSlices.reduce((a, s) => a + (s.value || 0), 0);
  const r = (size - thickness) / 2;
  const c = size / 2;
  const circ = 2 * Math.PI * r;
  let acc = 0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{ width: '100%', height: '100%' }}>
      <circle cx={c} cy={c} r={r} fill="none" stroke={trackColor} strokeWidth={thickness} />
      {total > 0 && safeSlices.map((s, i) => {
        const len = ((s.value || 0) / total) * circ;
        const dash = `${len} ${circ - len}`;
        const offset = -acc;
        acc += len;
        return (
          <circle key={i} cx={c} cy={c} r={r} fill="none" stroke={s.color} strokeWidth={thickness} strokeDasharray={dash} strokeDashoffset={offset} transform={`rotate(-90 ${c} ${c})`} strokeLinecap="butt" />
        );
      })}
      {label && <text x={c} y={c - 2} textAnchor="middle" fontSize="20" fontWeight="700" fill={labelColor} fontFamily="ui-monospace,monospace">{label}</text>}
      {sublabel && <text x={c} y={c + 14} textAnchor="middle" fontSize="9" fill={dimColor} letterSpacing="1">{sublabel}</text>}
    </svg>
  );
}

// ── EdgeStrip — horizontal heatmap of recent edges ───────────────────
function EdgeStrip({ history, width = 600, height = 48, scale, emptyLabel }) {
  const { t: theme } = window.useApp() || { t: window.THEMES.light };
  scale = scale || [theme.bgSubtle, theme.accentSoft, theme.accent + '90', theme.green];
  const safeHistory = Array.isArray(history) && history.length ? history : [];
  // When there's no scanner history yet, paint a lightly shaded full-width
  // band so the card doesn't read as broken.
  if (!safeHistory.length) {
    return (
      <svg viewBox={`0 0 ${width} ${height}`} style={{ width: '100%', height: '100%', display: 'block' }}>
        <rect x={0} y={0} width={width} height={height} fill={scale[0]} />
        <text x={width / 2} y={height / 2 + 3} textAnchor="middle" fontSize="10" fill={theme.textMuted} fontFamily={window.FONTS.sans}>{emptyLabel || 'Awaiting first scan…'}</text>
      </svg>
    );
  }
  const cell = width / safeHistory.length;
  const colorFor = v => {
    const t = Math.min(1, (v || 0) / 5);
    if (t < 0.25) return scale[0];
    if (t < 0.5) return scale[1];
    if (t < 0.75) return scale[2];
    return scale[3];
  };
  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width: '100%', height: '100%', display: 'block' }}>
      {safeHistory.map((h, i) => (
        <rect key={i} x={i * cell} y={0} width={Math.max(0, cell - 0.5)} height={height} fill={colorFor(h.best_edge_cents)} />
      ))}
    </svg>
  );
}

window.AreaChart = AreaChart;
window.Sparkline = Sparkline;
window.BarChart = BarChart;
window.Donut = Donut;
window.EdgeStrip = EdgeStrip;

</script>
<script type="text/babel" data-presets="env,react" data-filename="ui-primitives.jsx">
// Shared UI primitives + format helpers used across all pages.
const fmt$ = (v, d = 2) => v == null ? '—' : (v < 0 ? '−$' : '$') + Math.abs(v).toFixed(d);
const fmt$Sign = (v, d = 2) => v == null ? '—' : (v >= 0 ? '+$' : '−$') + Math.abs(v).toFixed(d);
const fmtC = v => v == null ? '—' : v.toFixed(1) + '¢';
const fmtPct = (v, d = 2) => v == null ? '—' : (v >= 0 ? '+' : '') + (v * 100).toFixed(d) + '%';
const ago = ts => {
  const s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
};
const tsTime = ts => {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
};
const tsDate = ts => {
  const d = new Date(ts * 1000);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
};

window.fmt$ = fmt$;
window.fmt$Sign = fmt$Sign;
window.fmtC = fmtC;
window.fmtPct = fmtPct;
window.ago = ago;
window.tsTime = tsTime;
window.tsDate = tsDate;

// ── Card ────────────────────────────────────────────────────────────
function Card({ title, action, children, padding = 20, style = {} }) {
  const { t } = window.useApp();
  return (
    <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, ...style }}>
      {(title || action) && (
        <div style={{ padding: '14px 18px', borderBottom: `1px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: t.text, letterSpacing: '-0.005em' }}>{title}</div>
          {action}
        </div>
      )}
      <div style={{ padding }}>{children}</div>
    </div>
  );
}

// ── Stat ────────────────────────────────────────────────────────────
function Stat({ label, value, sub, tone, mono, big }) {
  const { t } = window.useApp();
  const tones = {
    green: t.green, red: t.red, amber: t.amber, accent: t.accent, default: t.text,
  };
  const c = tones[tone] || tones.default;
  return (
    <div>
      <div style={{ fontSize: 11, color: t.textMuted, letterSpacing: '0.04em', textTransform: 'uppercase', marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: big ? 26 : 20, fontWeight: 600, color: c, letterSpacing: '-0.015em', fontFamily: mono ? window.FONTS.mono : window.FONTS.sans }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: t.textDim, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

// ── Status descriptions (shared) ────────────────────────────────────
const STATUS_INFO = {
  // Execution statuses
  filled:     { tone: 'green',  icon: '✓', desc: 'Order fully executed at target price' },
  closed:     { tone: 'green',  icon: '✓', desc: 'Trade completed and closed; realized P&L is final' },
  pending:    { tone: 'amber',  icon: '◌', desc: 'Trade has been submitted or queued and is not final yet' },
  submitted:  { tone: 'purple', icon: '◌', desc: 'Order sent to exchange, awaiting fill confirmation' },
  failed:     { tone: 'red',    icon: '✕', desc: 'Order rejected or timed out — no capital at risk' },
  recovering: { tone: 'blue',   icon: '↻', desc: 'One leg filled, system working to close the other side' },
  aborted:    { tone: 'default',icon: '⊘', desc: 'Safety kill — prevented naked leg exposure' },
  // Opportunity statuses
  tradable:   { tone: 'green',  icon: '●', desc: 'Edge confirmed, liquidity verified — ready to execute' },
  candidate:  { tone: 'blue',   icon: '◎', desc: 'Potential arb detected, awaiting persistence confirmation' },
  review:     { tone: 'purple', icon: '⌕', desc: 'Needs manual review — mapping or polarity uncertain' },
  stale:      { tone: 'default',icon: '◦', desc: 'Quote too old (>30s) — edge may no longer exist' },
  illiquid:   { tone: 'red',    icon: '△', desc: 'Insufficient orderbook depth to fill at quoted price' },
  expired:    { tone: 'default',icon: '—', desc: 'Market has closed or settled' },
  // Mapping statuses
  confirmed:  { tone: 'green',  icon: '✓', desc: 'Cross-platform pair verified and active for trading' },
  pending:    { tone: 'amber',  icon: '◌', desc: 'Awaiting agent validation before auto-trading' },
  rejected:   { tone: 'red',    icon: '✕', desc: 'Mapping rejected — platforms do not match' },
  // System
  pass:       { tone: 'green',  icon: '✓', desc: 'Gate check passed' },
  fail:       { tone: 'red',    icon: '✕', desc: 'Gate check failed — action may be needed' },
  connected:  { tone: 'green',  icon: '●', desc: 'Exchange API connected and responsive' },
  settled:    { tone: 'green',  icon: '✓', desc: 'Position fully settled, P&L realized' },
};
window.STATUS_INFO = STATUS_INFO;

// ── Tooltip (hover on desktop, tap on mobile) ───────────────────────
function Tooltip({ text, children, placement = 'top' }) {
  const { t } = window.useApp();
  const [show, setShow] = React.useState(false);
  const ref = React.useRef(null);
  // Trust touch capability over viewport size — a wide tablet in landscape
  // still has no hover, so it should still tap-to-reveal.
  const isMobile = typeof window !== 'undefined' && window.matchMedia
    ? window.matchMedia('(hover: none), (max-width: 1023px)').matches
    : false;

  React.useEffect(() => {
    if (!show) return;
    const tapOut = (e) => { if (ref.current && !ref.current.contains(e.target)) setShow(false); };
    const onKey = (e) => { if (e.key === 'Escape') setShow(false); };
    document.addEventListener('touchstart', tapOut, { passive: true });
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('touchstart', tapOut);
      document.removeEventListener('keydown', onKey);
    };
  }, [show]);

  if (!text) return <>{children}</>;
  const above = placement !== 'bottom';

  return (
    <span ref={ref} style={{ position: 'relative', display: 'inline-flex', alignItems: 'center' }}
      onMouseEnter={isMobile ? undefined : () => setShow(true)}
      onMouseLeave={isMobile ? undefined : () => setShow(false)}
      onFocus={() => setShow(true)}
      onBlur={() => setShow(false)}
      onClick={isMobile ? (e) => { e.stopPropagation(); setShow(s => !s); } : undefined}
    >
      {children}
      {show && (
        <span role="tooltip" style={{
          position: 'absolute',
          [above ? 'bottom' : 'top']: 'calc(100% + 6px)',
          left: '50%', transform: 'translateX(-50%)',
          background: t.bg2 || t.bgSubtle, color: t.text, border: `1px solid ${t.border}`,
          padding: '7px 11px', borderRadius: 8, fontSize: 11.5, lineHeight: 1.45,
          whiteSpace: 'normal', width: 'max-content', maxWidth: 260, zIndex: 9999,
          boxShadow: '0 6px 24px rgba(0,0,0,0.45)', pointerEvents: 'none',
          fontWeight: 400, letterSpacing: 0, textTransform: 'none', textAlign: 'left',
        }}>
          <span style={{
            position: 'absolute',
            [above ? 'top' : 'bottom']: '100%',
            left: '50%', transform: 'translateX(-50%)',
            width: 0, height: 0,
            borderLeft: '5px solid transparent', borderRight: '5px solid transparent',
            [above ? 'borderTop' : 'borderBottom']: `5px solid ${t.border}`,
          }}/>
          {text}
        </span>
      )}
    </span>
  );
}
window.Tooltip = Tooltip;

// ── Pill / Badge ────────────────────────────────────────────────────
function Pill({ children, tone = 'default', size = 'sm', hint, icon }) {
  const { t } = window.useApp();
  const map = {
    green:   [t.green, t.greenSoft],
    red:     [t.red, t.redSoft],
    amber:   [t.amber, t.amberSoft],
    blue:    [t.blue, t.blueSoft],
    purple:  [t.purple, t.purpleSoft],
    accent:  [t.accent, t.accentSoft],
    default: [t.textDim, t.bgSubtle],
  };
  const [fg, bg] = map[tone] || map.default;
  const sm = size === 'sm';
  const pill = (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: sm ? '2px 8px' : '4px 11px', background: bg, color: fg, borderRadius: 99, fontSize: sm ? 10.5 : 11.5, fontWeight: 600, letterSpacing: '0.02em', whiteSpace:'nowrap', lineHeight: 1.5, textTransform: 'capitalize', verticalAlign: 'middle', cursor: hint ? 'help' : undefined }}>
      {icon && <span style={{ fontSize: sm ? 9 : 10, lineHeight: 1, opacity: 0.85 }}>{icon}</span>}
      {children}
    </span>
  );
  if (hint) return <window.Tooltip text={hint}>{pill}</window.Tooltip>;
  return pill;
}

// ── StatusBadge — auto-colorized + tooltip from STATUS_INFO ─────────
function StatusBadge({ status, size = 'sm', showIcon = true }) {
  const info = STATUS_INFO[status] || { tone: 'default', icon: '', desc: '' };
  return <Pill tone={info.tone} size={size} hint={info.desc} icon={showIcon ? info.icon : null}>{status}</Pill>;
}
window.StatusBadge = StatusBadge;

// ── PlatformChip — Kalshi / Polymarket ──────────────────────────────
function PlatformChip({ name, side }) {
  const { t } = window.useApp();
  const cfg = name === 'kalshi'
    ? { fg: t.green, bg: t.greenSoft, label: 'Kalshi' }
    : { fg: t.purple, bg: t.purpleSoft, label: 'Polymarket' };
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap: 5, padding:'2px 8px', background: cfg.bg, color: cfg.fg, borderRadius: 5, fontSize: 11, fontWeight: 600, whiteSpace:'nowrap', flexShrink: 0 }}>
      <span style={{ width: 5, height: 5, borderRadius: '50%', background: cfg.fg, flexShrink: 0 }}/>
      {cfg.label}{side && <span style={{ opacity: 0.7, marginLeft: 2 }}>· {side}</span>}
    </span>
  );
}

// ── Button ──────────────────────────────────────────────────────────
// `hint` shows a tooltip on hover/tap describing the action.
// `disabledHint` overrides `hint` when the button is disabled, so the user
// learns *why* it's disabled instead of just seeing the action description.
function Btn({ children, variant = 'secondary', size = 'md', onClick, icon, disabled, hint, disabledHint }) {
  const { t } = window.useApp();
  const sm = size === 'sm';
  const variants = {
    primary:   { bg: t.text, fg: t.bgCard, bd: t.text },
    secondary: { bg: t.bgCard, fg: t.text, bd: t.border },
    ghost:     { bg: 'transparent', fg: t.text, bd: 'transparent' },
    danger:    { bg: t.red, fg: '#fff', bd: t.red },
    accent:    { bg: t.accent, fg: '#fff', bd: t.accent },
  };
  const v = variants[variant];
  const btn = (
    <button onClick={onClick} disabled={disabled} style={{
      display:'inline-flex', alignItems:'center', gap: 6,
      padding: sm ? '5px 10px' : '7px 14px',
      background: v.bg, color: v.fg, border: `1px solid ${v.bd}`, borderRadius: 7,
      fontSize: sm ? 11.5 : 12.5, fontWeight: 500, fontFamily: 'inherit',
      cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.5 : 1,
      letterSpacing: '-0.005em', whiteSpace: 'nowrap',
    }}>
      {icon && <span style={{ fontFamily: window.FONTS.mono, fontSize: sm ? 11 : 12 }}>{icon}</span>}
      {children}
    </button>
  );
  const tip = disabled ? (disabledHint || hint) : hint;
  if (tip) return <window.Tooltip text={tip}>{btn}</window.Tooltip>;
  return btn;
}

// ── DataTable ───────────────────────────────────────────────────────
function DataTable({ columns, rows, onRowClick, emptyTitle, emptyHint, emptyIcon }) {
  const { t } = window.useApp();
  // Defensive: callers occasionally pass undefined when API responses haven't
  // landed yet. Treat as an empty list so we render a helpful state instead
  // of throwing on `rows.map`.
  const safeRows = Array.isArray(rows) ? rows : [];
  // For each column, build a track. Fixed widths (e.g. '110px') stay fixed;
  // '1fr' becomes minmax(<minw>, 1fr) so flex columns never collapse.
  const trackFor = (c) => {
    const w = c.w || '1fr';
    if (w === '1fr' || /fr$/.test(w)) {
      const min = c.min || 220;
      return `minmax(${min}px, ${w})`;
    }
    return w;
  };
  // Sum of fixed-px widths + each flex col's min — gives table its min-width
  // so the row scrolls horizontally instead of crushing on narrow viewports.
  const minTotal = columns.reduce((acc, c) => {
    const w = c.w || '1fr';
    if (/^\d+px$/.test(w)) return acc + parseInt(w, 10);
    if (w === '1fr' || /fr$/.test(w)) return acc + (c.min || 220);
    return acc + 100;
  }, 0) + 36; // padding
  const tracks = columns.map(trackFor).join(' ');
  return (
    <div style={{ overflowX: 'auto', overflowY: 'hidden' }}>
      <div style={{ minWidth: minTotal }}>
        <div style={{ display:'grid', gridTemplateColumns: tracks, padding: '10px 18px', fontSize: 10.5, fontWeight: 600, color: t.textMuted, letterSpacing: '0.06em', textTransform: 'uppercase', borderBottom: `1px solid ${t.border}`, background: t.bgSubtle, gap: 12 }}>
          {columns.map((c, i) => <div key={i} style={{ textAlign: c.align || 'left', minWidth: 0 }}>{c.label}</div>)}
        </div>
        {safeRows.length === 0 ? (
          <div style={{ padding: '40px 24px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap: 8, color: t.textDim, textAlign:'center' }}>
            <div style={{ width: 36, height: 36, borderRadius: 9, background: t.bgSubtle, display:'flex', alignItems:'center', justifyContent:'center', fontSize: 16, color: t.textMuted, marginBottom: 4 }}>{emptyIcon || '∅'}</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: t.text }}>{emptyTitle || 'Nothing to show yet'}</div>
            <div style={{ fontSize: 11.5, color: t.textDim, lineHeight: 1.5, maxWidth: 360 }}>{emptyHint || 'Rows will appear here once the backend returns data.'}</div>
          </div>
        ) : safeRows.map((r, i) => (
          <div key={i} onClick={() => onRowClick?.(r, i)} style={{
            display:'grid', gridTemplateColumns: tracks, padding: '12px 18px', fontSize: 12.5, color: t.text, borderBottom: i < safeRows.length - 1 ? `1px solid ${t.border}` : 'none', cursor: onRowClick ? 'pointer' : 'default', alignItems: 'center', gap: 12,
          }} onMouseEnter={e => { if (onRowClick) e.currentTarget.style.background = t.bgSubtle; }} onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}>
            {columns.map((c, j) => <div key={j} style={{ textAlign: c.align || 'left', minWidth: 0, overflow: 'hidden' }}>{c.render ? c.render(r) : r[c.key]}</div>)}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── PageHeader ──────────────────────────────────────────────────────
function PageHeader({ kicker, title, sub, children }) {
  const { t } = window.useApp();
  return (
    <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', margin: '0 0 22px', gap: 24 }}>
      <div>
        {kicker && <div style={{ fontSize: 10.5, fontWeight: 600, color: t.textMuted, letterSpacing: '0.08em', textTransform:'uppercase', marginBottom: 6 }}>{kicker}</div>}
        <div style={{ fontSize: 24, fontWeight: 600, color: t.text, letterSpacing: '-0.02em', marginBottom: sub ? 6 : 0 }}>{title}</div>
        {sub && <div style={{ fontSize: 13, color: t.textDim, maxWidth: 540, lineHeight: 1.5 }}>{sub}</div>}
      </div>
      {children && <div style={{ display:'flex', gap: 8, alignItems: 'center' }}>{children}</div>}
    </div>
  );
}

window.Card = Card;
window.Stat = Stat;
window.Pill = Pill;
window.PlatformChip = PlatformChip;
window.Btn = Btn;
window.DataTable = DataTable;
window.PageHeader = PageHeader;

</script>
<script type="text/babel" data-presets="env,react" data-filename="app-shell.jsx">
// App shell: sidebar, topbar, command palette, alerts inbox, theme toggle.
const { useState: useS, useEffect: useE, useMemo: useM, createContext, useContext } = React;

const AppCtx = createContext(null);
window.useApp = () => useContext(AppCtx);

const ARB_PAGE_KEY = 'arbiter-current-page';
const ARB_PAGE_IDS = ['overview', 'opportunities', 'trades', 'pnl', 'markets', 'mappings', 'scanner', 'audit', 'deposits', 'settings'];

function normalizePageId(value) {
  const raw = String(value || '').replace(/^#\/?/, '').trim();
  return ARB_PAGE_IDS.includes(raw) ? raw : 'overview';
}

function readStoredPage() {
  const hashPage = String(window.location.hash || '').replace(/^#\/?/, '').trim();
  if (ARB_PAGE_IDS.includes(hashPage)) return hashPage;
  try { return normalizePageId(localStorage.getItem(ARB_PAGE_KEY)); } catch { return 'overview'; }
}

function persistPage(page) {
  const next = normalizePageId(page);
  try { localStorage.setItem(ARB_PAGE_KEY, next); } catch {}
  try {
    const desired = next === 'overview' ? window.location.pathname + window.location.search : '#' + next;
    const current = window.location.hash ? window.location.hash : window.location.pathname + window.location.search;
    if (current !== desired) window.history.replaceState(null, '', desired);
  } catch {}
}

function useTheme() {
  const [name, setName] = useS(() => {
    const saved = localStorage.getItem('arbiter-theme');
    if (saved === 'light' || saved === 'dark') return saved;
    return window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  });
  useE(() => {
    localStorage.setItem('arbiter-theme', name);
    document.documentElement.setAttribute('data-theme', name);
  }, [name]);
  const t = window.THEMES[name];
  return { t, name, setName, toggle: () => setName(n => n === 'light' ? 'dark' : 'light') };
}

function AppProvider({ children, onSignOut }) {
  const theme = useTheme();
  const [page, setPageState] = useS(readStoredPage);
  const [drawer, setDrawer] = useS(null);   // { kind, payload }
  const [modal, setModal] = useS(null);
  const [palette, setPalette] = useS(false);
  const [alerts, setAlerts] = useS(false);
  const [scanner, setScanner] = useS(true);
  const [tradingMode, setTradingMode] = useS('live'); // 'live' | 'standby' | 'killed'
  const [minEdge, setMinEdge] = useS(1.0);
  const [autoExec, setAutoExec] = useS(true);
  const [toasts, setToasts] = useS([]);
  const [confirm, setConfirm] = useS(null);
  const [userMenu, setUserMenu] = useS(false);
  const [profile, setProfile] = useS({ name:'Sam Park', email:'sam@arbiter.app', initials:'SP' });
  const [watchlist, setWatchlist] = useS(['BTC-150K-EOY-2026']);
  const [filters, setFilters] = useS({ trades: {}, markets: {}, audit: {} });
  const [settings, setSettings] = useS({
    minEdge: 1.0, minVolume: 500, persistence: 3, maxPos: 200, autoExec: 'on',
    slippage: 0.5, scanInterval: 5.0, concurrency: 32,
  });
  const [notifPrefs, setNotifPrefs] = useS({
    killSwitch: true, recovery: true, fail: true, daily: true, mapping: false, deposit: true,
  });

  const toast = (msg, opts = {}) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(t => [...t, { id, msg, ...opts }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), opts.duration || 2800);
  };
  const signOut = async () => {
    if (window.__arbiterLogout) { try { await window.__arbiterLogout(); } catch {} }
    onSignOut?.();
  };
  const setPage = (next) => {
    const pageId = normalizePageId(next);
    persistPage(pageId);
    setPageState(pageId);
  };

  useE(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setPalette(p => !p); }
      if (e.key === 'Escape') { setPalette(false); setDrawer(null); setModal(null); setAlerts(false); setConfirm(null); setUserMenu(false); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  useE(() => {
    const onHash = () => {
      const next = readStoredPage();
      try { localStorage.setItem(ARB_PAGE_KEY, next); } catch {}
      setPageState(next);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const value = { ...theme, page, setPage, drawer, setDrawer, modal, setModal,
    palette, setPalette, alerts, setAlerts,
    scanner, setScanner, tradingMode, setTradingMode, minEdge, setMinEdge, autoExec, setAutoExec,
    toasts, setToasts, toast, confirm, setConfirm,
    userMenu, setUserMenu, profile, setProfile, signOut,
    watchlist, setWatchlist, filters, setFilters,
    settings, setSettings, notifPrefs, setNotifPrefs,
  };
  return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
}

const NAV = [
  { id: 'overview',     label: 'Overview',      icon: '⌂' },
  { id: 'opportunities',label: 'Opportunities', icon: '◇', badgeKey: 'oppCount' },
  { id: 'trades',       label: 'Trades',        icon: '↗' },
  { id: 'pnl',          label: 'P&L',           icon: '$' },
  { id: 'markets',      label: 'Markets',       icon: '◈' },
  { id: 'mappings',     label: 'Mappings',      icon: '⇄' },
  { id: 'scanner',      label: 'Scanner',       icon: '⚡' },
  { id: 'audit',        label: 'Audit',         icon: '✓' },
  { id: 'deposits',     label: 'Funds',         icon: '◐' },
  { id: 'settings',     label: 'Settings',      icon: '⚙' },
];

function Sidebar() {
  const { t, page, setPage } = window.useApp();
  const opps = Array.isArray(window.MOCK?.opportunities) ? window.MOCK.opportunities : [];
  const tradableCount = opps.filter(o => o.status === 'tradable').length;
  return (
    <div style={{ width: 220, background: t.bgCard, borderRight: `1px solid ${t.border}`, padding: '20px 14px', display:'flex', flexDirection:'column', flexShrink: 0 }}>
      <div style={{ display:'flex', alignItems:'center', gap: 10, padding: '4px 8px 22px', cursor:'pointer' }} onClick={() => setPage('overview')}>
        <div style={{ width: 28, height: 28, borderRadius: 7, background: t.text, display:'flex', alignItems:'center', justifyContent:'center', color: t.bgCard, fontSize: 13, fontWeight: 700 }}>A</div>
        <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.01em', color: t.text }}>Arbiter</div>
      </div>
      <div style={{ fontSize: 10.5, fontWeight: 600, color: t.textMuted, letterSpacing: '0.08em', padding: '0 8px 8px' }}>WORKSPACE</div>
      {NAV.map(n => {
        const active = page === n.id;
        return (
          <div
            key={n.id}
            role="button"
            tabIndex={0}
            aria-current={active ? 'page' : undefined}
            onClick={() => setPage(n.id)}
            onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setPage(n.id); } }}
            onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = t.bgSubtle; }}
            onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = 'transparent'; }}
            style={{
              display:'flex', alignItems:'center', gap: 10, padding: '7px 10px', borderRadius: 6, cursor: 'pointer',
              background: active ? t.bgSubtle : 'transparent',
              color: active ? t.text : t.textDim,
              fontSize: 13, fontWeight: active ? 500 : 400, marginBottom: 2,
              outline: 'none', transition: 'background 120ms ease, color 120ms ease',
            }}
            onFocus={(e) => { e.currentTarget.style.boxShadow = `0 0 0 2px ${t.accentSoft}`; }}
            onBlur={(e) => { e.currentTarget.style.boxShadow = 'none'; }}
          >
            <span style={{ width: 14, fontSize: 13, color: active ? t.accent : t.textMuted, fontFamily: window.FONTS.mono, textAlign:'center' }}>{n.icon}</span>
            <span>{n.label}</span>
            {n.id === 'opportunities' && tradableCount > 0 && <span style={{ marginLeft:'auto', fontSize: 10, padding: '1px 6px', background: t.accent, color: '#fff', borderRadius: 99, fontWeight: 500 }}>{tradableCount}</span>}
          </div>
        );
      })}
      <div style={{ marginTop: 'auto' }}>
        <ReadinessMini/>
      </div>
    </div>
  );
}

function ReadinessMini() {
  const { t, setPage, tradingMode } = window.useApp();
  const M = window.MOCK;
  const ok = tradingMode === 'live';
  const c = ok ? t.green : tradingMode === 'standby' ? t.amber : t.red;
  const cs = ok ? t.greenSoft : tradingMode === 'standby' ? t.amberSoft : t.redSoft;
  const txt = ok ? 'Live trading' : tradingMode === 'standby' ? 'Standby' : 'KILLED';
  const gates = M.health.readiness.gates || 7;
  const passing = M.health.readiness.passing || (M.health.readiness.ready ? gates : 0);
  const sub = ok ? `${passing}/${gates} readiness gates` : tradingMode === 'standby' ? 'Auto-exec disabled' : 'Manual restart required';
  return (
    <div onClick={() => setPage('audit')} style={{ padding: 12, background: cs, border: `1px solid ${c}30`, borderRadius: 8, cursor:'pointer' }}>
      <div style={{ display:'flex', alignItems:'center', gap: 6, fontSize: 11, color: c, fontWeight: 600, marginBottom: 4 }}>
        <span style={{ width: 6, height: 6, borderRadius:'50%', background: c, animation: ok ? 'pulse 2s infinite' : 'none' }}/>
        {txt}
      </div>
      <div style={{ fontSize: 10.5, color: t.textDim, lineHeight: 1.4 }}>{sub}</div>
    </div>

}

function TopBar({ title, sub, actions }) {
  const { t, setPalette, setAlerts, toggle, name, scanner, setScanner, tradingMode, setTradingMode, setUserMenu, profile, toast } = window.useApp();
  const [narrow, setNarrow] = useS(() => typeof window !== 'undefined' && window.innerWidth < 1180);
  const [refreshing, setRefreshing] = useS(false);
  useE(() => {
    const onR = () => setNarrow(window.innerWidth < 1180);
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, []);
  const onRefresh = async () => {
    if (refreshing) return;
    setRefreshing(true);
    try {
      if (window.__arbiterTick) await window.__arbiterTick();
      else if (window.__arbiterRefresh) await window.__arbiterRefresh();
      toast?.('Data refreshed', { sub: 'live store synced' });
    } catch (e) {
      toast?.('Refresh failed', { sub: String(e && e.message || e), tone: 'error' });
    } finally {
      setRefreshing(false);
    }
  };
  return (
    <div style={{ padding: '14px 28px', borderBottom: `1px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'space-between', background: t.bg, gap: 16, flexShrink: 0 }}>
      <div style={{ minWidth: 0, flex: '1 1 auto', overflow: 'hidden' }}>
        <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{sub || 'Workspace · Live'}</div>
        <div style={{ fontSize: 19, fontWeight: 600, letterSpacing: '-0.01em', color: t.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{title}</div>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap: 8, flexShrink: 0 }}>
        <ScannerToggle scanner={scanner} setScanner={setScanner} />
        <ModeToggle mode={tradingMode} setMode={setTradingMode} />
        {narrow ? (
