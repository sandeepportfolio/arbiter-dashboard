<body>
<div id="root"></div>
<div id="boot-splash">
  <div class="ring"></div>
  <div class="msg">Loading Arbiter…</div>
  <div class="err">
    <h1>Couldn't load the dashboard</h1>
    <p id="boot-err-msg">A required script failed to load. Check your network connection, then reload.</p>
    <button onclick="location.reload()">Reload</button>
  </div>
</div>
<script>
  // CDN/script-load failure handler. Wired via onerror on the <script integrity=…>
  // tags above and the global error/unhandledrejection listeners below.
  window.__arbiterCdnFail = function (which) {
    var s = document.getElementById('boot-splash');
    if (!s || s.classList.contains('failed')) return;
    s.classList.add('failed');
    var m = document.getElementById('boot-err-msg');
    if (m && which) {
      m.innerHTML = 'Failed to load <code>' + which + '</code> from the CDN. ' +
        'Check your network connection or any blockers (ad blockers, corporate proxies, ' +
        'subresource-integrity mismatches), then reload.';
    }
  };
  window.addEventListener('error', function (e) {
    // Catch script load errors that bypass onerror= (e.g. SRI mismatch).
    if (e && e.target && e.target.tagName === 'SCRIPT' && e.target.src) {
      var u = e.target.src;
      window.__arbiterCdnFail(u.indexOf('react-dom') >= 0 ? 'react-dom'
        : u.indexOf('react') >= 0 ? 'react'
        : u.indexOf('babel') >= 0 ? 'babel'
        : 'a required script');
    }
  }, true);
  // If mount() never succeeds within 12s (e.g. CDN slow or SRI fail without
  // surfacing an error event), surface the failure UI so the splash isn't
  // an infinite spinner.
  window.__arbiterBootDeadline = setTimeout(function () {
    var s = document.getElementById('boot-splash');
    if (!s) return;
    var m = document.getElementById('boot-err-msg');
    if (m) {
      m.textContent = 'Bootstrap timed out after 12 seconds. The page may be blocked ' +
        'by a network policy or the React/Babel CDN may be unreachable.';
    }
    s.classList.add('failed');
  }, 12000);
</script>
<script type="text/babel" data-presets="env,react">
  // ─────────────────────────────────────────────────────────────────────
  // Top-level App: viewport-aware, polls the API every 10s and re-renders.
  // ─────────────────────────────────────────────────────────────────────
  const { useState, useEffect } = React;

  function PageRouter() {
    const { page, t } = window.useApp();
    const scrollRef = React.useRef(null);
    React.useEffect(() => {
      if (scrollRef.current) scrollRef.current.scrollTop = 0;
    }, [page]);
    const map = {
      overview: window.PageOverview,
      opportunities: window.PageOpportunities,
      trades: window.PageTrades,
      pnl: window.PagePnL,
      markets: window.PageMarkets,
      mappings: window.PageMappings,
      scanner: window.PageScanner,
      audit: window.PageAudit,
      deposits: window.PageDeposits,
      settings: window.PageSettings,
    };
    const tradableCount = (window.MOCK.opportunities || []).filter(o => o.status === 'tradable').length;
    const confirmedMarketCount = window.marketRowsFromMappings
      ? window.marketRowsFromMappings(window.MOCK, 'confirmed').length
      : (window.MOCK.mappings || []).filter(r => (r.status || '').toLowerCase() === 'confirmed').length;
    const titles = {
      overview: ['Overview', 'Operator desk · Live'],
      opportunities: ['Opportunities', `Live scan · ${tradableCount} tradable`],
      trades: ['Trades', `Execution ledger · ${(window.MOCK.executions || []).length} trades`],
      pnl: ['P&L', 'Performance · since inception'],
      markets: ['Markets', `Mapped universe · ${confirmedMarketCount.toLocaleString()} confirmed`],
      mappings: ['Mappings', 'Cross-platform · review queue'],
      scanner: ['Scanner', `Real-time · ${(window.MOCK.health.scanner.scan_count || 0).toLocaleString()} scans`],
      audit: ['Audit & Readiness', `System integrity · ${window.MOCK.health.readiness.passing || 0}/${window.MOCK.health.readiness.gates || 7} gates`],
      deposits: ['Funds', 'Capital · 2 platforms connected'],
      settings: ['Settings', 'Configuration'],
    };
    const Page = map[page] || window.PageOverview;
    const [title, sub] = titles[page] || titles.overview;
    return (
      <div style={{ display:'flex', height:'100%', background: t.bg, overflow:'hidden' }}>
        <window.Sidebar/>
        <div style={{ flex: 1, display:'flex', flexDirection:'column', overflow:'hidden', minWidth: 0 }}>
          <window.TopBar title={title} sub={sub}/>
          <div ref={scrollRef} style={{ flex: 1, overflow:'auto' }}>
            <Page/>
          </div>
        </div>
      </div>
    );
  }

  function DesktopShell() {
    const { t } = window.useApp();
    return (
      <div style={{ width: '100%', height: '100%', background: t.bg, color: t.text, fontFamily: window.FONTS.sans, position:'relative' }}>
        <PageRouter/>
        <window.OppDrawer/>
        <window.Modal/>
        <window.ExtraModal/>
        <window.AgentValidateModal/>
        <window.RefetchMappingsModal/>
        <window.CommandPalette/>
        <window.AlertsInbox/>
        <window.UserMenu/>
        <window.ConfirmDialog/>
        <window.ToastHost/>
      </div>
    );
  }

  // Inner desktop shell: sidebar + page router + every overlay/modal.
  function DesktopShellInner() {
    return (
      <>
        <DesktopShell/>
      </>
    );
  }

  // Inner mobile shell: bottom-nav dashboard + only the overlays mobile uses.
  function MobileShellInner() {
    return (
      <>
        <window.MobileDashboard/>
        <window.Modal/>
        <window.ExtraModal/>
        <window.AgentValidateModal/>
        <window.RefetchMappingsModal/>
        <window.ConfirmDialog/>
      </>
    );
  }

  // ─────────────────────────────────────────────────────────────────────
  // ErrorBoundary: a render error in any subtree shouldn't blank the app.
  // ─────────────────────────────────────────────────────────────────────
  class ErrorBoundary extends React.Component {
    constructor(props) {
      super(props);
      this.state = { error: null };
    }
    static getDerivedStateFromError(error) { return { error }; }
    componentDidCatch(error, info) {
      // Log so it's visible in the console even if rendering recovers.
      console.error('Arbiter render error:', error, info);
    }
    render() {
      if (this.state.error) {
        const msg = (this.state.error && this.state.error.message) || String(this.state.error);
        return (
          <div style={{
            minHeight: '100%', display:'flex', alignItems:'center', justifyContent:'center',
            padding: 24, fontFamily: '"Inter", system-ui, sans-serif', color:'#1A1A17', background:'#FAFAF9',
          }}>
            <div style={{ maxWidth: 540, padding: 28, background:'#FFFFFF', border:'1px solid #E8E6E0', borderRadius: 12, boxShadow:'0 12px 32px rgba(0,0,0,0.08)' }}>
              <div style={{ fontSize: 11, color:'#6B6B66', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom: 6 }}>Render error</div>
              <h1 style={{ fontSize: 18, fontWeight: 600, margin:'0 0 10px' }}>Something broke while rendering the dashboard.</h1>
              <p style={{ fontSize: 13, color:'#6B6B66', lineHeight: 1.55, margin:'0 0 14px' }}>
                The error has been logged to the browser console. Trading and execution are server-side and not affected by UI errors.
              </p>
              <pre style={{ fontFamily:'ui-monospace, "JetBrains Mono", monospace', fontSize: 11.5, background:'#F4F4F2', padding:'10px 12px', borderRadius: 7, color:'#1A1A17', whiteSpace:'pre-wrap', wordBreak:'break-word', margin:'0 0 14px', maxHeight: 200, overflow:'auto' }}>{msg}</pre>
              <div style={{ display:'flex', gap: 8 }}>
                <button onClick={() => this.setState({ error: null })} style={{ padding:'8px 14px', background:'#FFFFFF', color:'#1A1A17', border:'1px solid #D4D2CC', borderRadius: 7, fontSize: 12.5, fontWeight: 600, cursor:'pointer' }}>Try again</button>
                <button onClick={() => location.reload()} style={{ padding:'8px 14px', background:'#1A1A17', color:'#FAFAF9', border:'none', borderRadius: 7, fontSize: 12.5, fontWeight: 600, cursor:'pointer' }}>Reload page</button>
              </div>
            </div>
          </div>
        );
      }
      return this.props.children;
    }
  }

  function App() {
    // Below 1024px the sidebar (220px) + 4-col KPI grids overflow available
    // space; the mobile shell handles those widths cleanly down to 320px.
    const MOBILE_MAX = 1023;
    const [isMobile, setIsMobile] = useState(() => window.innerWidth <= MOBILE_MAX);
    const [signedIn, setSignedIn] = useState(() => {
      try { return localStorage.getItem('arbiter-signed-in') === '1'; } catch { return false; }
    });
    const [checkingSession, setCheckingSession] = useState(() => {
      try { return localStorage.getItem('arbiter-signed-in') === '1'; } catch { return false; }
    });
    const [, setTick] = useState(0);

    // Track viewport size; re-render between desktop and mobile shells.
    useEffect(() => {
      const onResize = () => setIsMobile(window.innerWidth <= MOBILE_MAX);
      window.addEventListener('resize', onResize);
      return () => window.removeEventListener('resize', onResize);
    }, []);

    // Surface unhandled promise rejections to the console so they don't
    // disappear silently. (Render errors go through ErrorBoundary above.)
    useEffect(() => {
      const onRej = (e) => console.error('Arbiter unhandled rejection:', e.reason);
      window.addEventListener('unhandledrejection', onRej);
      return () => window.removeEventListener('unhandledrejection', onRej);
    }, []);

    // A stale local signed-in flag should never expose an operator shell whose
    // write actions will just 401. Confirm the server session before loading.
    useEffect(() => {
      if (!signedIn) {
        setCheckingSession(false);
        return;
      }
      let cancelled = false;
      const verify = async () => {
        if (!window.__arbiterAuthMe) {
          if (!cancelled) setCheckingSession(false);
          return;
        }
        const res = await window.__arbiterAuthMe();
        if (cancelled) return;
        const explicitAuthFailure = res.status === 401 || res.status === 403;
        if (explicitAuthFailure || (res.ok && (!res.data || res.data.authenticated !== true))) {
          try { localStorage.removeItem('arbiter-signed-in'); } catch {}
          if (window.__arbiterClearAuthToken) window.__arbiterClearAuthToken();
          window.MOCK.loaded = false;
          setSignedIn(false);
        } else if (!res.ok) {
          console.warn('Session check deferred; keeping local sign-in state during transient auth check failure.', res.error || res.status);
        }
        setCheckingSession(false);
      };
      setCheckingSession(true);
      verify();
      return () => { cancelled = true; };
    }, [signedIn]);

    // Initial fetch + 10s polling, but only after sign-in. On each refresh,
    // bump tick so the tree re-renders and reads the freshly-mutated
    // window.MOCK. The tick fn is also exposed on window so operator-action
    // handlers can request a synchronous refresh after a successful POST.
    useEffect(() => {
      if (!signedIn) return;
      let cancelled = false;
      const tick = async () => {
        if (window.__arbiterRefresh) {
          try { await window.__arbiterRefresh(); } catch (e) { console.warn('refresh failed', e); }
        }
        if (!cancelled) setTick(x => x + 1);
      };
      window.__arbiterTick = tick;
      tick();
      const id = setInterval(tick, 10000);
      return () => {
        cancelled = true;
        clearInterval(id);
        if (window.__arbiterTick === tick) window.__arbiterTick = null;
      };
    }, [signedIn]);

    const handleSignIn = (session) => {
      if (session && session.token && window.__arbiterRememberAuthToken) {
        window.__arbiterRememberAuthToken(session.token);
      }
      try { localStorage.setItem('arbiter-signed-in', '1'); } catch {}
      setSignedIn(true);
      setCheckingSession(false);
    };
    const handleSignOut = () => {
      try { localStorage.removeItem('arbiter-signed-in'); } catch {}
      if (window.__arbiterClearAuthToken) window.__arbiterClearAuthToken();
      window.MOCK.loaded = false;
      setSignedIn(false);
    };

    // Once signed in, hold the dashboard shell behind a loading state until
    // the first /api/* refresh resolves. Empty defaults shouldn't be shown
    // as if they were the live picture of the system.
    const dashboard = checkingSession
      ? <BootLoading/>
      : !window.MOCK.loaded
      ? <BootLoading/>
      : (isMobile ? <MobileShellInner/> : <DesktopShellInner/>);

    return (
      <window.AppProvider onSignOut={handleSignOut}>
        <ErrorBoundary>
          {!signedIn
            ? <window.LoginScreen onSignIn={handleSignIn}/>
            : dashboard}
          <window.ToastHost/>
        </ErrorBoundary>
      </window.AppProvider>
    );
  }

  function BootLoading() {
    const theme = window.THEMES[document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light'];
    return (
      <div style={{ width: '100%', height: '100%', background: theme.bg, color: theme.textDim, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap: 14, fontFamily: window.FONTS.sans }}>
        <div style={{ width: 28, height: 28, border: `2px solid ${theme.border}`, borderTopColor: theme.accent, borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}/>
        <div style={{ fontSize: 12.5 }}>Loading live data…</div>
      </div>
    );
  }

  function mount() {
    const required = [
      'AppProvider', 'Sidebar', 'TopBar', 'LoginScreen',
      'PageOverview', 'PageOpportunities', 'PageTrades', 'PagePnL',
      'PageMarkets', 'PageMappings', 'PageScanner', 'PageAudit',
      'PageDeposits', 'PageSettings',
      'OppDrawer', 'Modal', 'ExtraModal', 'AgentValidateModal',
      'RefetchMappingsModal', 'CommandPalette', 'AlertsInbox', 'UserMenu',
      'ConfirmDialog', 'ToastHost', 'MobileDashboard',
      'AreaChart', 'Sparkline', 'BarChart', 'Donut',
      'Card', 'Stat', 'Pill', 'PlatformChip', 'Btn', 'DataTable', 'PageHeader',
    ];
    for (const k of required) {
      if (!window[k]) return setTimeout(mount, 50);
    }
    if (window.__arbiterBootDeadline) {
      clearTimeout(window.__arbiterBootDeadline);
      window.__arbiterBootDeadline = null;
    }
    const splash = document.getElementById('boot-splash');
    if (splash) splash.remove();
    try {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    } catch (e) {
      console.error('Arbiter mount failed:', e);
      // Re-create the splash so the user isn't staring at a blank page.
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;' +
          'justify-content:center;font-family:Inter,system-ui,sans-serif;color:#6B6B66;' +
          'padding:24px;text-align:center;">Failed to start the dashboard. ' +
          'Check the browser console and reload.</div>';
      }
    }
  }
  mount();
</script>
</body>
</html>
