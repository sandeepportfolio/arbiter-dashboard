  /* Honor saved theme on initial paint so we don't flash the wrong palette

  html[data-theme="dark"], html[data-theme="dark"] body { background: #0B0C10; color: #E8ECF1; }
  * { box-sizing: border-box; }

  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 8px; height: 8px; }

  #boot-splash .ring { width: 28px; height: 28px; border:2px solid #E8E6E0; border-top-color:#5B5BD6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  html[data-theme="dark"] #boot-splash { background: #0B0C10; color: #8B92A0; }
  html[data-theme="dark"] #boot-splash .ring { border-color: #22262F; border-top-color: #8B8DF5; }
  html[data-theme="dark"] #boot-splash .err h1 { color:#E8ECF1; }

  @media (prefers-color-scheme: dark) {
    html:not([data-theme]), html:not([data-theme]) body { background: #0B0C10; color: #8B92A0; }
    html:not([data-theme]) #boot-splash { background: #0B0C10; color: #8B92A0; }
    html:not([data-theme]) #boot-splash .ring { border-color: #22262F; border-top-color: #8B8DF5; }
    html:not([data-theme]) #boot-splash .err h1 { color:#E8ECF1; }
    html:not([data-theme]) #boot-splash .err p { color:#8B92A0; }
    html:not([data-theme]) #boot-splash .err code { background:#191C24; color:#E8ECF1; }
    html:not([data-theme]) #boot-splash .err button { background:#E8ECF1; color:#0B0C10; }
  }
  /* Splash failure UI — surfaced when a CDN script fails to load or boot times out. */
  #boot-splash .err { display:none; max-width: 480px; }
  #boot-splash.failed .ring { display: none; }
  #boot-splash.failed .msg { display: none; }
  #boot-splash.failed .err { display: block; }
  #boot-splash .err h1 { font-size: 16px; font-weight: 600; color:#1A1A17; margin: 0 0 8px; }
  #boot-splash .err p { font-size: 13px; line-height: 1.55; color:#6B6B66; margin: 0 0 14px; }
  #boot-splash .err code { font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 11.5px; background:#F4F4F2; padding: 1px 5px; border-radius: 4px; color:#1A1A17; }
  #boot-splash .err button { padding: 8px 14px; background:#1A1A17; color:#FAFAF9; border:none; border-radius: 7px; font-size: 12.5px; font-weight: 600; cursor:pointer; font-family: inherit; }
</style>
<script>
// Apply the saved theme to <html> before any paint, so the splash and
// initial styles match the user's choice. AppProvider keeps this in sync
// when the theme is toggled.
(function () {
  try {
    var saved = localStorage.getItem('arbiter-theme');
    var name = saved === 'light' || saved === 'dark'
      ? saved
      : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', name);
  } catch (_) { /* localStorage may be blocked; fall back to media query CSS */ }
})();
</script>

<script>

// Kept on the legacy `window.MOCK` global for backwards-compat with components,
// but contains no mock data.

window.MOCK = (() => {
  const NOW = Math.floor(Date.now() / 1000);

  return {
    NOW,
    // Flips true once the first refresh() pass completes. Components can show
    // a loading state until then so empty defaults aren't mistaken for "the
    // system is idle".
    loaded: false,
    lastFetch: 0,

    // Balances ─ /api/balances
    balances: {
      kalshi:     { balance: 0, timestamp: 0, is_low: false },

      current_balances:  { kalshi: 0, polymarket: 0 },
      total_deposits:    { kalshi: 0, polymarket: 0 },
